<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Magic E ✨</title>
<link rel="stylesheet" href="shared.css">
<style>
  .magic-hero { background: linear-gradient(135deg,#6c3fc5,#f59e2e);padding:32px 20px;text-align:center; }
  .transform-box {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 22px;
    padding: 28px 20px;
    margin: 16px 0;
    text-align: center;
  }
  .word-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-wrap: wrap;
    margin: 16px 0;
  }
  .letter-box {
    width: 60px; height: 70px;
    border: 3px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 2.2rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .letter-box.vowel { border-color: #ffcdd2; color: var(--vowel); }
  .letter-box.cons  { border-color: #bbdefb; color: var(--consonant); }
  .letter-box.magic-e {
    border-color: #f59e2e;
    color: #f59e2e;
    background: #fff8ed;
    box-shadow: 0 0 0 0 rgba(245,158,46,0.4);
  }
  .letter-box.magic-e.active {
    animation: magicGlow 1s ease infinite;
  }
  @keyframes magicGlow {
    0%,100% { box-shadow: 0 0 0 0 rgba(245,158,46,0.4); }
    50%      { box-shadow: 0 0 20px 8px rgba(245,158,46,0.3); }
  }
  .arrow { font-size: 2rem; color: var(--muted); margin: 0 8px; }
  .word-label {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 800;
    color: var(--muted);
    margin-top: 8px;
  }
  .words-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    margin: 16px 0;
  }
  .transform-card {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 18px;
    padding: 18px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .transform-card:hover { transform: translateY(-4px); border-color: #f59e2e; }
  .transform-card:active { transform: scale(0.93); }
  .transform-card.selected { border-color: #f59e2e; background: #fff8ed; }
  .tc-before { font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--text); }
  .tc-arrow  { font-size:1.2rem;margin:4px 0; }
  .tc-after  { font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--primary); }
  .tc-e      { color:#f59e2e; }
  .tc-emojis { font-size:1.3rem;margin-top:6px; }

  .quiz-box {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    margin: 20px 0;
  }
  .quiz-q { font-family:var(--font-display);font-size:1.15rem;font-weight:800;color:var(--primary);text-align:center;margin-bottom:14px; }
  .quiz-word-big { font-family:var(--font-display);font-size:3rem;font-weight:800;color:var(--text);text-align:center;margin:14px 0;cursor:pointer; }
  .quiz-choices { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px; }
  .quiz-choice { padding:18px;border:3px solid var(--border);border-radius:16px;background:white;font-family:var(--font-display);font-size:1.1rem;font-weight:800;cursor:pointer;text-align:center;transition:all 0.18s;touch-action:manipulation; }
  .quiz-choice:hover { transform:translateY(-3px);border-color:var(--primary); }
  .quiz-choice.correct { border-color:var(--success);background:#f0faf4; }
  .quiz-choice.wrong   { border-color:var(--danger);background:#fff5f5; }
</style>
</head>
<body>
<div class="ph-header">
  <h1>✨ Magic E</h1>
  <p>A silent E at the end changes everything!</p>
  <span class="ph-stage-badge">Stage 4</span>
</div>
<div class="ph-wrap">

  <!-- Interactive transformer -->
  <div class="transform-box">
    <p style="font-weight:800;color:var(--muted);font-size:0.9rem">Tap to see the transformation!</p>
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;margin:16px 0">
      <div>
        <div class="word-display" id="before-display"></div>
        <div class="word-label">Before: short vowel</div>
      </div>
      <div style="font-size:2rem">✨</div>
      <div>
        <div class="word-display" id="after-display"></div>
        <div class="word-label">After: long vowel + silent E</div>
      </div>
    </div>
    <div class="ph-btn-row">
      <button class="ph-btn ph-btn-primary" onclick="playTransform()">▶ Watch the Magic!</button>
      <button class="ph-btn ph-btn-outline" onclick="nextPair()">Next Pair ▶</button>
    </div>
  </div>

  <!-- Word pairs grid -->
  <div class="ph-section-title">✨ Magic E Word Pairs</div>
  <div class="words-grid" id="words-grid"></div>

  <!-- Quiz -->
  <div class="quiz-box">
    <div class="quiz-q">🎯 Magic E or No Magic E?</div>
    <div class="quiz-word-big" id="quiz-word" onclick="speak(document.getElementById('quiz-word').textContent,0.72)">cap</div>
    <p style="text-align:center;font-size:0.82rem;font-weight:700;color:var(--muted)">(tap the word to hear it)</p>
    <div class="quiz-choices">
      <div class="quiz-choice" onclick="checkMagic(this, true)">✨ Magic E!<br><small>Long vowel</small></div>
      <div class="quiz-choice" onclick="checkMagic(this, false)">📖 No Magic E<br><small>Short vowel</small></div>
    </div>
    <div style="text-align:center;margin-top:12px;font-weight:700;color:var(--muted)" id="magic-feedback"></div>
    <div style="text-align:center;font-size:0.82rem;font-weight:700;color:var(--muted);margin-top:6px" id="magic-score">Score: 0/0</div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const PAIRS = [
  {before:'cap',after:'cape',e1:'🧢',e2:'🦸',vowel:'a'},
  {before:'kit',after:'kite',e1:'🧰',e2:'🪁',vowel:'i'},
  {before:'hop',after:'hope',e1:'🐸',e2:'🌟',vowel:'o'},
  {before:'cut',after:'cute',e1:'✂️',e2:'🥰',vowel:'u'},
  {before:'pin',after:'pine',e1:'📌',e2:'🌲',vowel:'i'},
  {before:'bit',after:'bite',e1:'🔣',e2:'🦷',vowel:'i'},
  {before:'hug',after:'huge',e1:'🤗',e2:'🏔️',vowel:'u'},
  {before:'mad',after:'made',e1:'😡',e2:'🎨',vowel:'a'},
  {before:'rob',after:'robe',e1:'🦹',e2:'👘',vowel:'o'},
  {before:'rid',after:'ride',e1:'🚮',e2:'🏇',vowel:'i'},
];

const QUIZ_WORDS = [
  {w:'cake',m:true},{w:'cat',m:false},{w:'bike',m:true},{w:'bit',m:false},
  {w:'note',m:true},{w:'hop',m:false},{w:'cube',m:true},{w:'cup',m:false},
  {w:'pine',m:true},{w:'pin',m:false},{w:'cape',m:true},{w:'cap',m:false},
];

let pairIdx = 0, quizIdx = 0, quizScore = 0, quizTotal = 0;
let quizShuffled = [...QUIZ_WORDS].sort(() => Math.random()-0.5);

function buildLetters(word, isAfter, pair) {
  return word.split('').map((l, i) => {
    const isVowel = 'aeiou'.includes(l);
    const isMagicE = isAfter && i === word.length - 1 && l === 'e';
    let cls = isMagicE ? 'magic-e' : (isVowel ? 'vowel' : 'cons');
    return `<div class="letter-box ${cls}" onclick="speak('${isMagicE ? 'silent e' : l}',0.7)">${l}</div>`;
  }).join('');
}

function showPair() {
  const pair = PAIRS[pairIdx];
  document.getElementById('before-display').innerHTML = buildLetters(pair.before, false, pair);
  document.getElementById('after-display').innerHTML  = buildLetters(pair.after,  true,  pair);
  document.querySelectorAll('#after-display .magic-e').forEach(el => el.classList.add('active'));
}

function playTransform() {
  const pair = PAIRS[pairIdx];
  speak(pair.before, 0.75, 1.1, () => {
    setTimeout(() => {
      speak('Add a magic E!', 0.82);
      setTimeout(() => speak(pair.after + '!', 0.72), 1200);
    }, 500);
  });
  awardStars('magic-e', 1);
}

function nextPair() {
  pairIdx = (pairIdx + 1) % PAIRS.length;
  if (pairIdx === 0) { markComplete('magic-e'); celebrate('You know all Magic E pairs! 🌟', 3); }
  showPair();
  speak(PAIRS[pairIdx].before + ' becomes ' + PAIRS[pairIdx].after + ' with magic E!', 0.82);
}

function buildGrid() {
  document.getElementById('words-grid').innerHTML = PAIRS.map((p,i) => `
    <div class="transform-card" onclick="selectPair(${i})">
      <div class="tc-before">${p.before} ${p.e1}</div>
      <div class="tc-arrow">✨ →</div>
      <div class="tc-after">${p.after.slice(0,-1)}<span class="tc-e">e</span> ${p.e2}</div>
    </div>`).join('');
}

function selectPair(i) {
  pairIdx = i;
  document.querySelectorAll('.transform-card').forEach((c,j) => c.classList.toggle('selected', j===i));
  showPair();
  playTransform();
}

function loadQuiz() {
  const item = quizShuffled[quizIdx % quizShuffled.length];
  document.getElementById('quiz-word').textContent = item.w;
  document.querySelectorAll('.quiz-choice').forEach(c => c.classList.remove('correct','wrong'));
  document.getElementById('magic-feedback').textContent = '';
  speak(item.w, 0.72);
}

function checkMagic(el, chose) {
  const item = quizShuffled[quizIdx % quizShuffled.length];
  quizTotal++;
  if (chose === item.m) {
    el.classList.add('correct');
    quizScore++;
    awardStars('magic-e-quiz', 1);
    const msg = item.m
      ? item.w + ' ends with a silent E! The vowel says its name!'
      : item.w + ' has no Magic E! Short vowel sound!';
    document.getElementById('magic-feedback').textContent = '✅ ' + msg;
    speak('Correct! ' + msg);
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.quiz-choice').forEach(c => {
      if ((chose === true && !el.classList.contains('wrong')) || (chose === false)) {
        c.classList.toggle('correct', c !== el);
      }
    });
    document.getElementById('magic-feedback').textContent = '❌ Try again!';
    shakeWrong(el);
  }
  quizIdx++;
  document.getElementById('magic-score').textContent = 'Score: ' + quizScore + '/' + quizTotal;
  setTimeout(loadQuiz, 2000);
}

document.addEventListener('DOMContentLoaded', () => {
  buildGrid();
  showPair();
  loadQuiz();
  injectMascot(["Magic E makes the vowel say its name! 🦉","Cap becomes Cape! 🪄","Tap the word pairs below to practise!"]);
  speak("Magic E! When E comes at the end of a word, it stays silent, but it makes the vowel say its name!", 0.82);
});
</script>
</body>
</html>
