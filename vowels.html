<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vowels Practice 🗣️</title>
<link rel="stylesheet" href="shared.css">
<style>
  .vowel-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin: 16px 0;
  }
  @media(max-width:480px){ .vowel-grid{grid-template-columns:repeat(3,1fr);gap:10px;} }
  .vowel-card {
    background: white;
    border: 3px solid #ffcdd2;
    border-radius: 18px;
    padding: 18px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    touch-action: manipulation;
  }
  .vowel-card:hover  { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(231,76,60,0.2); }
  .vowel-card:active { transform: scale(0.93); }
  .vowel-card.active { border-color: var(--vowel); background: #fff0f0; transform: scale(1.06); }

  .vowel-letter { font-family:var(--font-display);font-size:2.8rem;font-weight:800;color:var(--vowel);display:block;line-height:1; }
  .vowel-lower  { font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:#c0392b; }
  .vowel-emoji  { font-size:1.8rem;display:block;margin-top:6px; }
  .vowel-word   { font-size:0.75rem;font-weight:700;color:var(--muted);margin-top:4px; }

  .detail-box {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin: 16px 0;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .detail-box.visible { display: block; }
  .detail-title { font-family:var(--font-display);font-size:1.6rem;font-weight:800;color:var(--vowel);text-align:center; }

  .words-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 14px 0;
    justify-content: center;
  }
  .word-pill {
    background: #fff5f5;
    border: 2px solid #ffcdd2;
    border-radius: 12px;
    padding: 10px 16px;
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .word-pill:hover  { transform: translateY(-3px); background: #ffe0e0; }
  .word-pill:active { transform: scale(0.92); }
  .word-pill .wp-emoji { font-size: 1.2rem; }

  .mouth-box {
    text-align: center;
    background: #fff8ed;
    border: 2px solid #ffd9a0;
    border-radius: 14px;
    padding: 16px;
    margin: 10px 0;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
  }
  .mouth-emoji { font-size: 3rem; display: block; margin-bottom: 8px; }

  .sorting-game {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
  }
  .sorting-q {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--primary);
    text-align: center;
    margin-bottom: 16px;
  }
  .sorting-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .sort-btn {
    padding: 18px;
    border: 3px solid var(--border);
    border-radius: 16px;
    background: white;
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
  }
  .sort-btn:hover  { transform: translateY(-3px); }
  .sort-btn.correct{ border-color: var(--success); background: #f0faf4; }
  .sort-btn.wrong  { border-color: var(--danger);  background: #fff5f5; }
  .sort-short { color: var(--vowel); border-color: #ffcdd2; }
  .sort-long  { color: var(--consonant); border-color: #bbdefb; }
</style>
</head>
<body>
<div class="ph-header">
  <h1>🗣️ Vowels A E I O U</h1>
  <p>Tap a vowel to explore its sounds!</p>
  <span class="ph-stage-badge">Stage 2</span>
</div>

<div class="ph-wrap">
  <div class="ph-toggle-wrap">
    <span style="color:var(--vowel);font-weight:800">🔴 Short</span>
    <label class="ph-toggle">
      <input type="checkbox" id="vowel-toggle" onchange="toggleMode()">
      <span class="ph-toggle-slider"></span>
    </label>
    <span style="color:var(--consonant);font-weight:800">🔵 Long</span>
  </div>

  <div class="vowel-grid" id="vowel-grid"></div>

  <div class="detail-box" id="detail-box">
    <div class="detail-title" id="detail-title">A</div>
    <div class="mouth-box" id="mouth-box"></div>
    <div class="words-row" id="words-row"></div>
    <div class="ph-btn-row">
      <button class="ph-btn ph-btn-primary" id="detail-speak" onclick="speakDetail()">🔊 Hear Sound</button>
    </div>
  </div>

  <hr class="ph-divider">

  <!-- SORTING GAME -->
  <div class="sorting-game" id="sorting-game">
    <div class="sorting-q">🎮 Is this a SHORT or LONG vowel sound?</div>
    <div style="text-align:center;margin-bottom:14px">
      <button class="ph-btn ph-btn-primary" style="min-width:160px" onclick="playSort()">🔊 <span id="sort-word">-</span></button>
    </div>
    <div class="sorting-choices">
      <button class="sort-btn sort-short" onclick="checkSort('short')">🔴 Short<br><small>like "hat"</small></button>
      <button class="sort-btn sort-long"  onclick="checkSort('long')">🔵 Long<br><small>like "cake"</small></button>
    </div>
    <div style="text-align:center;margin-top:12px;font-weight:700;color:var(--muted)" id="sort-result"></div>
    <div style="text-align:center;margin-top:8px;font-size:0.82rem;font-weight:700;color:var(--muted)" id="sort-score">Score: 0/0</div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const VOWELS = {
  A: {
    short: { sound: 'short a — as in apple', word: 'apple', mouth:'😮', words:[{w:'ant',e:'🐜'},{w:'apple',e:'🍎'},{w:'add',e:'➕'},{w:'ax',e:'🪓'}] },
    long:  { sound: 'long a — as in cake',   word: 'cake',  mouth:'😁', words:[{w:'cake',e:'🎂'},{w:'rain',e:'🌧️'},{w:'play',e:'🎮'},{w:'day',e:'☀️'}] },
    color: '#e74c3c'
  },
  E: {
    short: { sound: 'short e — as in egg',   word: 'egg',   mouth:'😬', words:[{w:'egg',e:'🥚'},{w:'end',e:'🔚'},{w:'bed',e:'🛏️'},{w:'pet',e:'🐾'}] },
    long:  { sound: 'long e — as in tree',   word: 'tree',  mouth:'😃', words:[{w:'tree',e:'🌳'},{w:'sleep',e:'😴'},{w:'feet',e:'🦶'},{w:'bee',e:'🐝'}] },
    color: '#e74c3c'
  },
  I: {
    short: { sound: 'short i — as in igloo', word: 'igloo', mouth:'😐', words:[{w:'igloo',e:'🧊'},{w:'ink',e:'🖊️'},{w:'pig',e:'🐷'},{w:'bit',e:'🔣'}] },
    long:  { sound: 'long i — as in kite',   word: 'kite',  mouth:'😄', words:[{w:'kite',e:'🪁'},{w:'bike',e:'🚲'},{w:'night',e:'🌙'},{w:'pie',e:'🥧'}] },
    color: '#e74c3c'
  },
  O: {
    short: { sound: 'short o — as in ox',    word: 'ox',    mouth:'😲', words:[{w:'ox',e:'🐂'},{w:'fog',e:'🌫️'},{w:'hot',e:'🥵'},{w:'rock',e:'🪨'}] },
    long:  { sound: 'long o — as in boat',   word: 'boat',  mouth:'😙', words:[{w:'boat',e:'⛵'},{w:'snow',e:'❄️'},{w:'note',e:'📝'},{w:'road',e:'🛣️'}] },
    color: '#e74c3c'
  },
  U: {
    short: { sound: 'short u — as in umbrella', word:'umbrella', mouth:'😑', words:[{w:'umbrella',e:'☂️'},{w:'up',e:'⬆️'},{w:'bug',e:'🐛'},{w:'fun',e:'🎉'}] },
    long:  { sound: 'long u — as in cube',   word: 'cube',  mouth:'🤭', words:[{w:'cube',e:'🧊'},{w:'blue',e:'🔵'},{w:'tune',e:'🎵'},{w:'cute',e:'🥰'}] },
    color: '#e74c3c'
  }
};
const SORT_WORDS = [
  {w:'hat',t:'short'},{w:'cake',t:'long'},{w:'bed',t:'short'},{w:'tree',t:'long'},
  {w:'pig',t:'short'},{w:'kite',t:'long'},{w:'hot',t:'short'},{w:'boat',t:'long'},
  {w:'bug',t:'short'},{w:'blue',t:'long'},{w:'cat',t:'short'},{w:'rain',t:'long'},
  {w:'fox',t:'short'},{w:'bike',t:'long'},{w:'sun',t:'short'},{w:'feet',t:'long'}
];

let isLong = false, currentVowel = null, sortIdx = 0, sortScore = 0, sortTotal = 0;
let sortShuffled = [...SORT_WORDS].sort(() => Math.random()-0.5);

function toggleMode() {
  isLong = document.getElementById('vowel-toggle').checked;
  buildGrid();
  if (currentVowel) showDetail(currentVowel);
}

function buildGrid() {
  const grid = document.getElementById('vowel-grid');
  grid.innerHTML = '';
  Object.keys(VOWELS).forEach(v => {
    const data = VOWELS[v][isLong ? 'long' : 'short'];
    const card = document.createElement('div');
    card.className = 'vowel-card ph-vowel';
    card.innerHTML = `
      <span class="vowel-letter">${v}</span>
      <span class="vowel-lower">${v.toLowerCase()}</span>
      <span class="vowel-emoji">${data.words[0].e}</span>
      <span class="vowel-word">${data.words[0].w}</span>`;
    card.onclick = () => { showDetail(v); card.classList.add('active'); };
    grid.appendChild(card);
  });
}

function showDetail(v) {
  currentVowel = v;
  document.querySelectorAll('.vowel-card').forEach(c => c.classList.remove('active'));
  const mode = isLong ? 'long' : 'short';
  const data = VOWELS[v][mode];
  document.getElementById('detail-title').textContent = `${v}${v.toLowerCase()} — ${data.sound}`;
  document.getElementById('mouth-box').innerHTML = `<span class="mouth-emoji">${data.mouth}</span>Make this shape with your mouth to say "${data.word}"!`;
  const row = document.getElementById('words-row');
  row.innerHTML = data.words.map(wd => `
    <div class="word-pill" onclick="speak('${wd.w}',0.72)">
      <span class="wp-emoji">${wd.e}</span>${wd.w}
    </div>`).join('');
  document.getElementById('detail-box').classList.add('visible');
  speak(`${v}... ${data.sound}... like ${data.words[0].w}!`, 0.78);
}

function speakDetail() {
  if (!currentVowel) return;
  const data = VOWELS[currentVowel][isLong ? 'long' : 'short'];
  speak(data.sound + '... ' + data.words.map(w=>w.w).join(', '), 0.78);
}

function playSort() {
  const item = sortShuffled[sortIdx % sortShuffled.length];
  document.getElementById('sort-word').textContent = item.w;
  document.querySelectorAll('.sort-btn').forEach(b => { b.classList.remove('correct','wrong'); });
  document.getElementById('sort-result').textContent = '';
  speak(item.w, 0.72);
}

function checkSort(chosen) {
  const item = sortShuffled[sortIdx % sortShuffled.length];
  sortTotal++;
  const btns = document.querySelectorAll('.sort-btn');
  if (chosen === item.t) {
    sortScore++;
    btns.forEach(b => { if (b.classList.contains('sort-'+chosen)) b.classList.add('correct'); });
    document.getElementById('sort-result').textContent = '✅ Correct! ' + item.w + ' has a ' + item.t + ' vowel!';
    speak('Correct! ' + item.w + ' has a ' + item.t + ' vowel sound!');
    awardStars('vowel-sort', 1);
  } else {
    btns.forEach(b => { if (b.classList.contains('sort-'+chosen)) b.classList.add('wrong'); });
    btns.forEach(b => { if (b.classList.contains('sort-'+item.t)) b.classList.add('correct'); });
    document.getElementById('sort-result').textContent = 'Try again! ' + item.w + ' is ' + item.t + '!';
    speak('Try again! ' + item.w + ' has a ' + item.t + ' vowel sound!');
  }
  sortIdx++;
  document.getElementById('sort-score').textContent = 'Score: ' + sortScore + '/' + sortTotal;
  if (sortTotal >= 10) { markComplete('vowels'); awardStars('vowels', 2); }
  setTimeout(playSort, 2000);
}

document.addEventListener('DOMContentLoaded', () => {
  buildGrid();
  injectMascot(["Tap a vowel letter to explore it! 🦉","Vowels are A, E, I, O, U!","Toggle between short and long sounds!"]);
  speak("Let's practice vowels! A, E, I, O, U!", 0.85);
  setTimeout(playSort, 800);
});
</script>
</body>
</html>
