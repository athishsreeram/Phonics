<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Read Practice 📗</title>
<link rel="stylesheet" href="shared.css">
<style>
  .passage-tabs { display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0; }
  .pt { padding:7px 16px;border:2.5px solid var(--border);background:white;border-radius:20px;font-family:var(--font-display);font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.2s; }
  .pt.active,.pt:hover { border-color:var(--primary);background:#f0ecff;color:var(--primary); }
  .passage-box { background:white;border:2.5px solid var(--border);border-radius:22px;padding:24px 20px;margin:14px 0; }
  .pb-scene { text-align:center;font-size:4rem;margin-bottom:12px; }
  .pb-title { font-family:var(--font-display);font-size:1.2rem;font-weight:800;color:var(--primary);text-align:center;margin-bottom:16px; }
  .pb-text { font-family:var(--font-display);font-size:clamp(1.3rem,4.5vw,1.7rem);font-weight:700;line-height:2;color:var(--text); }
  .pb-word { cursor:pointer;border-radius:6px;padding:2px 3px;transition:background 0.2s;display:inline; }
  .pb-word:hover { background:#e8e0f8; }
  .pb-word.active { background:#FFD93D;font-weight:800; }
  .controls-bar { display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0;align-items:center; }
  .speed-label { font-weight:800;font-size:0.85rem;color:var(--muted); }
  .speed-btn { padding:6px 14px;border:2px solid var(--border);border-radius:12px;background:white;font-family:var(--font-display);font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.2s; }
  .speed-btn.active,.speed-btn:hover { border-color:var(--primary);background:#f0ecff;color:var(--primary); }
  .comprehension-box { background:#fff8ed;border:2.5px solid #ffd9a0;border-radius:20px;padding:22px;margin:16px 0; }
  .comp-q { font-family:var(--font-display);font-size:1.05rem;font-weight:800;color:#9a6c00;margin-bottom:14px; }
  .comp-choices { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
  .comp-choice { background:white;border:3px solid #ffd9a0;border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;font-family:var(--font-display);font-size:1.1rem;font-weight:800;transition:all 0.18s;touch-action:manipulation; }
  .comp-choice:hover { transform:translateY(-3px);border-color:#f59e2e; }
  .comp-choice.correct { border-color:var(--success);background:#f0faf4; }
  .comp-choice.wrong   { border-color:var(--danger);background:#fff5f5; }
</style>
</head>
<body>
<div class="ph-header">
  <h1>📗 Read Practice</h1>
  <p>Read along — tap any word to hear it!</p>
  <span class="ph-stage-badge">Stage 5</span>
</div>
<div class="ph-wrap">
  <div class="passage-tabs" id="passage-tabs"></div>

  <div class="passage-box">
    <div class="pb-scene" id="pb-scene">🐱</div>
    <div class="pb-title" id="pb-title">The Cat on the Mat</div>
    <div class="pb-text" id="pb-text"></div>
  </div>

  <div class="controls-bar">
    <span class="speed-label">Speed:</span>
    <button class="speed-btn active" onclick="setSpeed(0.65,this)">🐢 Slow</button>
    <button class="speed-btn" onclick="setSpeed(0.85,this)">🐇 Normal</button>
    <button class="speed-btn" onclick="setSpeed(1.05,this)">🚀 Fast</button>
  </div>
  <div class="ph-btn-row">
    <button class="ph-btn ph-btn-primary" onclick="readPassage()">▶ Read Aloud</button>
    <button class="ph-btn ph-btn-outline" onclick="stopReading()">⏹ Stop</button>
  </div>

  <div class="comprehension-box" id="comp-box">
    <div class="comp-q" id="comp-q">❓ Loading question...</div>
    <div class="comp-choices" id="comp-choices"></div>
    <div style="text-align:center;margin-top:10px;font-weight:700;color:var(--muted)" id="comp-fb"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const PASSAGES = [
  {
    title:'The Cat on the Mat',scene:'🐱',
    text:'The cat sat on the mat. The cat is fat. The fat cat sat. Pat the cat. The cat ran. The cat ran fast. The cat is happy now.',
    q:'Where did the cat sit?',choices:[{t:'On the mat',c:true,e:'🛒'},{t:'On the bed',c:false,e:'🛏️'}],
  },{
    title:'The Big Red Dog',scene:'🐶',
    text:'Sam has a big dog. The dog is red. The big red dog can run. Run dog run! The dog ran to Sam. Sam hugged the dog. The dog is Sam\'s best friend.',
    q:'What color is the dog?',choices:[{t:'Red',c:true,e:'🔴'},{t:'Blue',c:false,e:'🔵'}],
  },{
    title:'The Little Fish',scene:'🐟',
    text:'I see a fish. The fish is in the sea. The fish can swim. It swims fast. It swims up. It swims down. The little fish is happy in the sea.',
    q:'Where is the fish?',choices:[{t:'In the sea',c:true,e:'🌊'},{t:'In a cup',c:false,e:'☕'}],
  },{
    title:'The Sun and Rain',scene:'☀️',
    text:'The sun is up. The sun is hot. Then the rain came down. Drip drip drip. The rain is cool. A rainbow came. The rainbow is big and bright. I love the rainbow!',
    q:'What came after the rain?',choices:[{t:'A rainbow',c:true,e:'🌈'},{t:'More sun',c:false,e:'☀️'}],
  },{
    title:'My Teddy Bear',scene:'🧸',
    text:'I have a teddy bear. My teddy bear is soft. I hug my teddy bear. My teddy bear is brown. We sleep together. My teddy bear is my best friend. I love my teddy bear so much!',
    q:'What is the teddy bear like?',choices:[{t:'Soft',c:true,e:'🤗'},{t:'Hard',c:false,e:'🧱'}],
  }
];

let currentP = 0, readSpeed = 0.65, words = [], wordEls = [], reading = false, utterance = null;

function buildTabs() {
  document.getElementById('passage-tabs').innerHTML = PASSAGES.map((p,i)=>`
    <button class="pt${i===currentP?' active':''}" onclick="loadPassage(${i})">${i+1}. ${p.scene}</button>`).join('');
}

function loadPassage(i) {
  currentP = i;
  buildTabs();
  stopReading();
  const p = PASSAGES[i];
  document.getElementById('pb-scene').textContent = p.scene;
  document.getElementById('pb-title').textContent = p.title;
  words = p.text.split(' ');
  document.getElementById('pb-text').innerHTML = words.map((w,idx) =>
    `<span class="pb-word" id="w${idx}" onclick="speak('${w.replace(/[^a-zA-Z]/g,'')}',0.72)">${w} </span>`
  ).join('');
  wordEls = words.map((_,i) => document.getElementById('w'+i));
  loadComprehension(p);
  speak('Reading: ' + p.title, 0.85);
}

function loadComprehension(p) {
  document.getElementById('comp-q').textContent = '❓ ' + p.q;
  document.getElementById('comp-fb').textContent = '';
  document.getElementById('comp-choices').innerHTML = p.choices.map(c=>`
    <div class="comp-choice" onclick="checkComp(this,${c.c})">${c.e}<br>${c.t}</div>`).join('');
}

function checkComp(el, correct) {
  document.querySelectorAll('.comp-choice').forEach(c=>c.onclick=null);
  if (correct) {
    el.classList.add('correct');
    document.getElementById('comp-fb').textContent = '✅ Correct! Great reading!';
    speak('Correct! Great reading!');
    awardStars('read', 2);
    markComplete('read');
  } else {
    el.classList.add('wrong');
    shakeWrong(el);
    document.getElementById('comp-fb').textContent = 'Try again! Read the story again for the answer.';
    speak('Try again! Read the story again!');
    setTimeout(() => document.querySelectorAll('.comp-choice').forEach(c=>c.onclick=function(){checkComp(this,c.textContent!==el.textContent);}), 1500);
  }
}

function readPassage() {
  stopReading();
  reading = true;
  let idx = 0;
  function readNext() {
    if (!reading || idx >= words.length) { reading = false; return; }
    wordEls.forEach(el => el.classList.remove('active'));
    if (wordEls[idx]) { wordEls[idx].classList.add('active'); wordEls[idx].scrollIntoView({behavior:'smooth',block:'nearest'}); }
    const clean = words[idx].replace(/[^a-zA-Z']/g,'');
    utterance = new SpeechSynthesisUtterance(clean);
    utterance.rate = readSpeed;
    utterance.lang = 'en-US';
    utterance.onend = () => { idx++; setTimeout(readNext, 80); };
    window.speechSynthesis.speak(utterance);
  }
  readNext();
}

function stopReading() {
  reading = false;
  window.speechSynthesis.cancel();
  if (wordEls.length) wordEls.forEach(el => el.classList.remove('active'));
}

function setSpeed(s, btn) {
  readSpeed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

document.addEventListener('DOMContentLoaded', () => {
  buildTabs();
  loadPassage(0);
  injectMascot(["Tap any word to hear it! 🦉","Press Read Aloud and follow the yellow highlight!","Answer the question at the bottom! ❓"]);
  speak("Read practice! Tap any word to hear it, or press Read Aloud to hear the whole story!", 0.85);
});
</script>
</body>
</html>
