<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Letter Tracing ✍️</title>
<link rel="stylesheet" href="shared.css">
<style>
  .trace-header-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:white;border-bottom:2px solid var(--border);flex-wrap:wrap;gap:8px;}
  .letter-nav{display:flex;gap:8px;align-items:center;}
  .nav-btn{width:44px;height:44px;border:2.5px solid var(--border);background:white;border-radius:12px;font-size:1.1rem;font-weight:800;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
  .nav-btn:hover{border-color:var(--primary);}
  .cur-letter{font-family:var(--font-display);font-size:2.5rem;font-weight:800;color:var(--primary);min-width:50px;text-align:center;}
  .case-toggle{display:flex;gap:6px;}
  .ct-btn{padding:6px 14px;border:2.5px solid var(--border);background:white;border-radius:12px;font-family:var(--font-display);font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .ct-btn.active{border-color:var(--primary);background:#f0ecff;color:var(--primary);}
  .canvas-wrap{position:relative;background:white;border-bottom:2px solid var(--border);}
  #trace-canvas{display:block;width:100%;touch-action:none;}
  .guide-label{position:absolute;left:8px;font-size:0.68rem;font-weight:800;color:#ccc;pointer-events:none;}
  .action-bar{display:flex;gap:10px;justify-content:center;padding:14px 16px;background:white;border-top:2px solid var(--border);flex-wrap:wrap;}
  .word-info{background:white;border-top:2px solid var(--border);padding:14px 20px;text-align:center;}
  .wi-word{font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--primary);cursor:pointer;}
  .wi-emoji{font-size:2.5rem;display:block;margin:4px 0;}
  .alphabet-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px 16px;background:#faf9ff;border-top:2px solid var(--border);}
  .al-btn{width:36px;height:36px;border:2px solid var(--border);background:white;border-radius:8px;font-family:var(--font-display);font-size:0.9rem;font-weight:800;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
  .al-btn:hover{border-color:var(--primary);}
  .al-btn.traced{border-color:var(--success);background:#f0faf4;color:var(--success);}
  .al-btn.vowel{color:var(--vowel);}
  .progress-text{font-size:0.78rem;font-weight:800;color:var(--muted);text-align:center;padding:4px;}
  .feedback-bar{text-align:center;padding:8px 16px;font-family:var(--font-display);font-size:1rem;font-weight:800;min-height:36px;color:var(--primary);}
</style>
</head>
<body style="display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;">

<div class="ph-header" style="padding:16px 20px 14px">
  <h1 style="font-size:1.6rem">✍️ Letter Tracing</h1>
  <p>Trace the letter with your finger!</p>
</div>

<div class="trace-header-bar">
  <div class="letter-nav">
    <button class="nav-btn" onclick="changeLetter(-1)">◀</button>
    <div class="cur-letter" id="cur-letter">A</div>
    <button class="nav-btn" onclick="changeLetter(1)">▶</button>
  </div>
  <div class="case-toggle">
    <button class="ct-btn active" id="case-upper" onclick="setCase('upper')">ABC Upper</button>
    <button class="ct-btn" id="case-lower" onclick="setCase('lower')">abc Lower</button>
  </div>
</div>

<div class="canvas-wrap" id="canvas-wrap">
  <canvas id="trace-canvas"></canvas>
  <div class="guide-label" id="g-top"   style="top:8px">sky line</div>
  <div class="guide-label" id="g-mid"   style="top:33%">mid line</div>
  <div class="guide-label" id="g-base"  style="top:66%">base line</div>
</div>

<div class="feedback-bar" id="feedback-bar">Trace over the dotted letter with your finger! 👆</div>

<div class="action-bar">
  <button class="ph-btn ph-btn-outline" onclick="clearCanvas()">🗑️ Clear</button>
  <button class="ph-btn ph-btn-primary" onclick="hearLetter()">🔊 Hear</button>
  <button class="ph-btn ph-btn-accent"  onclick="checkTrace()">✅ Check!</button>
</div>

<div class="word-info" id="word-info">
  <div class="wi-word" onclick="hearLetter()" id="wi-word">A is for Apple</div>
  <div class="wi-emoji" id="wi-emoji">🍎</div>
</div>

<div class="alphabet-row" id="alphabet-row"></div>
<div class="progress-text" id="progress-text">Traced: 0 / 26 letters</div>

<script src="shared.js"></script>
<script>
const LETTERS=[
  {l:'A',w:'Apple',  e:'🍎'},{l:'B',w:'Ball',   e:'🏀'},{l:'C',w:'Cat',   e:'🐱'},
  {l:'D',w:'Dog',    e:'🐶'},{l:'E',w:'Egg',    e:'🥚'},{l:'F',w:'Fish',  e:'🐟'},
  {l:'G',w:'Goat',   e:'🐐'},{l:'H',w:'Hat',    e:'🎩'},{l:'I',w:'Igloo', e:'🧊'},
  {l:'J',w:'Jar',    e:'🫙'},{l:'K',w:'Kite',   e:'🪁'},{l:'L',w:'Lion',  e:'🦁'},
  {l:'M',w:'Moon',   e:'🌙'},{l:'N',w:'Nest',   e:'🪺'},{l:'O',w:'Owl',   e:'🦉'},
  {l:'P',w:'Pig',    e:'🐷'},{l:'Q',w:'Queen',  e:'👑'},{l:'R',w:'Rain',  e:'🌧️'},
  {l:'S',w:'Sun',    e:'☀️'},{l:'T',w:'Tree',   e:'🌳'},{l:'U',w:'Umbrella',e:'☂️'},
  {l:'V',w:'Van',    e:'🚐'},{l:'W',w:'Water',  e:'💧'},{l:'X',w:'X-ray', e:'🩻'},
  {l:'Y',w:'Yak',    e:'🦬'},{l:'Z',w:'Zebra',  e:'🦓'},
];
const VOWELS=['A','E','I','O','U'];

let curIdx=0, curCase='upper', traced=JSON.parse(localStorage.getItem('ph_traced')||'{}');
let drawing=false, points=[], ctx, canvas, W, H;
let strokePixels=new Set();

function init(){
  canvas=document.getElementById('trace-canvas');
  ctx=canvas.getContext('2d');
  const wrap=document.getElementById('canvas-wrap');
  W=wrap.clientWidth; H=Math.min(W*0.7,320);
  canvas.width=W; canvas.height=H;
  canvas.style.height=H+'px';
  drawGuideLines();
  drawGhostLetter();
  buildAlphabetRow();
}

function drawGuideLines(){
  ctx.clearRect(0,0,W,H);
  const lines=[0.08,0.35,0.68,0.95];
  const colors=['#a0c4ff','#ccc','#ccc','#a0c4ff'];
  lines.forEach((y,i)=>{
    ctx.beginPath();ctx.moveTo(0,y*H);ctx.lineTo(W,y*H);
    ctx.strokeStyle=colors[i];ctx.lineWidth=i===0||i===3?2:1;
    ctx.setLineDash(i===0||i===3?[]:[6,4]);ctx.stroke();ctx.setLineDash([]);
  });
}

function drawGhostLetter(){
  const item=LETTERS[curIdx];
  const display=curCase==='upper'?item.l:item.l.toLowerCase();
  ctx.font='bold '+Math.floor(H*0.72)+'px "Baloo 2", cursive';
  ctx.textAlign='center';ctx.textBaseline='middle';
  // dotted effect
  ctx.save();
  ctx.setLineDash([8,6]);
  ctx.strokeStyle='#c8b8f0';
  ctx.lineWidth=16;
  ctx.strokeText(display,W/2,H*0.52);
  ctx.restore();
  ctx.fillStyle='rgba(200,184,240,0.18)';
  ctx.fillText(display,W/2,H*0.52);
}

function setupEvents(){
  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return {x:src.clientX-r.left,y:src.clientY-r.top};
  }
  canvas.addEventListener('mousedown',e=>{drawing=true;points=[];const p=getPos(e);points.push(p);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const p=getPos(e);points.push(p);drawStroke(p);strokePixels.add(Math.round(p.x/4)+','+Math.round(p.y/4));});
  canvas.addEventListener('mouseup',()=>{drawing=false;});
  canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;points=[];const p=getPos(e);points.push(p);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=getPos(e);points.push(p);drawStroke(p);strokePixels.add(Math.round(p.x/4)+','+Math.round(p.y/4));},{passive:false});
  canvas.addEventListener('touchend',()=>{drawing=false;});
}

function drawStroke(p){
  ctx.lineTo(p.x,p.y);
  ctx.strokeStyle='#6c3fc5';ctx.lineWidth=14;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);
}

function clearCanvas(){
  strokePixels.clear();points=[];
  drawGuideLines();drawGhostLetter();
  document.getElementById('feedback-bar').textContent='Trace over the dotted letter with your finger! 👆';
}

function checkTrace(){
  const coverage=strokePixels.size;
  if(coverage<30){document.getElementById('feedback-bar').textContent='Keep tracing! Cover the whole letter! ✏️';speak('Keep tracing! Cover the whole letter!');return;}
  // Mark as traced
  const item=LETTERS[curIdx];
  if(!traced[item.l]){
    traced[item.l]=true;
    localStorage.setItem('ph_traced',JSON.stringify(traced));
    awardStars('trace',1);
    updateProgress();
    buildAlphabetRow();
    confetti();
    document.getElementById('feedback-bar').textContent='🌟 Perfect tracing! '+item.l+' is for '+item.w+'!';
    speak('Wonderful! You traced the letter '+item.l+'! '+item.l+' is for '+item.w+'!',0.85);
    if(Object.keys(traced).length>=26){markComplete('trace');awardStars('trace',5);celebrate('You traced all 26 letters! You are a star! 🌟',5);}
  } else {
    document.getElementById('feedback-bar').textContent='✅ Great tracing! '+item.l+' is for '+item.w+'!';
    speak('Great tracing! '+item.l+' is for '+item.w,0.85);
  }
}

function changeLetter(dir){
  curIdx=(curIdx+dir+26)%26;
  clearCanvas();loadLetter();
}

function setCase(c){
  curCase=c;
  document.getElementById('case-upper').classList.toggle('active',c==='upper');
  document.getElementById('case-lower').classList.toggle('active',c==='lower');
  clearCanvas();loadLetter();
}

function loadLetter(){
  const item=LETTERS[curIdx];
  const display=curCase==='upper'?item.l:item.l.toLowerCase();
  document.getElementById('cur-letter').textContent=display;
  document.getElementById('wi-word').textContent=item.l+' is for '+item.w;
  document.getElementById('wi-emoji').textContent=item.e;
  hearLetter();
}

function hearLetter(){
  const item=LETTERS[curIdx];
  speak(item.l+'... '+item.l+' is for '+item.w+'!',0.78);
}

function buildAlphabetRow(){
  document.getElementById('alphabet-row').innerHTML=LETTERS.map((item,i)=>`
    <button class="al-btn${traced[item.l]?' traced':''}${VOWELS.includes(item.l)?' vowel':''}" onclick="jumpTo(${i})">${item.l}</button>`).join('');
}

function jumpTo(i){curIdx=i;clearCanvas();loadLetter();}

function updateProgress(){
  const n=Object.keys(traced).length;
  document.getElementById('progress-text').textContent='Traced: '+n+' / 26 letters ⭐';
}

document.addEventListener('DOMContentLoaded',()=>{
  init();setupEvents();loadLetter();buildAlphabetRow();updateProgress();
  injectMascot(["Trace the dotted letter with your finger! 🦉","Try uppercase and lowercase!","Tap Check when you're done! ✅"]);
  speak("Letter tracing! Trace the dotted letter with your finger, then tap Check!",0.85);
});
window.addEventListener('resize',()=>{W=document.getElementById('canvas-wrap').clientWidth;H=Math.min(W*0.7,320);canvas.width=W;canvas.height=H;canvas.style.height=H+'px';clearCanvas();});
</script>
</body>
</html>
