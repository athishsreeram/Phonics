<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rhyme Time 🎵</title>
<link rel="stylesheet" href="shared.css">
<style>
  .rhyme-box{background:white;border:2.5px solid var(--border);border-radius:22px;padding:28px 20px;margin:14px 0;text-align:center;}
  .rhyme-pair{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;margin:18px 0;}
  .rhyme-word{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:20px;padding:20px 28px;cursor:pointer;transition:transform 0.15s;touch-action:manipulation;}
  .rhyme-word:hover{transform:scale(1.05);}
  .rhyme-word:active{transform:scale(0.95);}
  .rw-emoji{font-size:2.8rem;display:block;}
  .rw-text{font-family:var(--font-display);font-size:2rem;font-weight:800;color:white;margin-top:6px;}
  .rhyme-q{font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--primary);margin:14px 0 18px;}
  .big-btns{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:12px 0;}
  .big-btn{min-height:90px;border:3px solid var(--border);background:white;border-radius:20px;font-family:var(--font-display);font-size:1.5rem;font-weight:800;cursor:pointer;transition:all 0.18s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
  .big-btn:hover{transform:translateY(-4px);}
  .big-btn:active{transform:scale(0.95);}
  .big-btn.yes{border-color:#a8e6c4;color:var(--success);}
  .big-btn.no{border-color:#ffb3b3;color:var(--danger);}
  .big-btn.correct{background:#f0faf4;border-color:var(--success);}
  .big-btn.wrong{background:#fff5f5;border-color:var(--danger);}
  .score-box{background:white;border:2px solid var(--border);border-radius:14px;padding:12px 20px;text-align:center;margin:10px 0;}
  .sb-num{font-family:var(--font-display);font-size:2rem;font-weight:800;color:var(--primary);}
  .chain-box{background:#f0ecff;border:2.5px solid var(--border);border-radius:20px;padding:20px;margin:16px 0;}
  .chain-title{font-family:var(--font-display);font-size:1rem;font-weight:800;color:var(--primary);margin-bottom:12px;text-align:center;}
  .chain-tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
  .ct{padding:6px 14px;border:2.5px solid var(--border);background:white;border-radius:14px;font-family:var(--font-display);font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .ct.active,.ct:hover{border-color:var(--primary);background:#f0ecff;color:var(--primary);}
  .chain-words{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
  .chain-word{background:white;border:2.5px solid var(--border);border-radius:12px;padding:10px 16px;font-family:var(--font-display);font-size:1.1rem;font-weight:800;cursor:pointer;transition:all 0.15s;touch-action:manipulation;display:flex;gap:8px;align-items:center;}
  .chain-word:hover{transform:translateY(-3px);border-color:var(--primary);}
  .chain-word:active{transform:scale(0.93);}
  .fb-text{font-family:var(--font-display);font-size:1.1rem;font-weight:800;min-height:32px;margin:8px 0;text-align:center;}
</style>
</head>
<body>
<div class="ph-header">
  <h1>🎵 Rhyme Time</h1>
  <p>Do these words rhyme? Listen and decide!</p>
  <span class="ph-stage-badge">Stage 2</span>
</div>
<div class="ph-wrap">
  <div class="score-box">
    <div class="sb-num">⭐ <span id="score-num">0</span> / <span id="score-total">0</span></div>
    <div style="font-size:0.75rem;font-weight:700;color:var(--muted)">Rhyme Score</div>
  </div>
  <div class="rhyme-box">
    <div class="rhyme-q" id="rhyme-q">Do these words RHYME?</div>
    <div class="rhyme-pair" id="rhyme-pair"></div>
    <button class="ph-btn ph-btn-outline" style="margin-bottom:14px" onclick="playBoth()">🔊 Hear Both Words</button>
    <div class="big-btns">
      <button class="big-btn yes" id="yes-btn" onclick="checkRhyme(true)">✅<span style="font-size:1rem">YES!</span><span style="font-size:0.8rem">They Rhyme!</span></button>
      <button class="big-btn no"  id="no-btn"  onclick="checkRhyme(false)">❌<span style="font-size:1rem">NO!</span><span style="font-size:0.8rem">They Don't!</span></button>
    </div>
    <div class="fb-text" id="fb-text"></div>
  </div>

  <div class="chain-box">
    <div class="chain-title">🔗 Word Family Chains — tap any word to hear it!</div>
    <div class="chain-tabs" id="chain-tabs"></div>
    <div class="chain-words" id="chain-words"></div>
    <div style="text-align:center;margin-top:10px">
      <button class="ph-btn ph-btn-primary" onclick="playChain()">▶ Play Whole Chain</button>
    </div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const PAIRS=[
  {w1:'cat',e1:'🐱',w2:'hat',e2:'🎩',rhymes:true},
  {w1:'dog',e1:'🐶',w2:'log',e2:'🪵',rhymes:true},
  {w1:'sun',e1:'☀️', w2:'run',e2:'🏃',rhymes:true},
  {w1:'cake',e1:'🎂',w2:'lake',e2:'🏞️',rhymes:true},
  {w1:'bee',e1:'🐝', w2:'tree',e2:'🌳',rhymes:true},
  {w1:'ship',e1:'🚢',w2:'lip',e2:'👄',rhymes:true},
  {w1:'moon',e1:'🌙',w2:'spoon',e2:'🥄',rhymes:true},
  {w1:'king',e1:'👑',w2:'ring',e2:'💍',rhymes:true},
  {w1:'cat',e1:'🐱',w2:'dog',e2:'🐶',rhymes:false},
  {w1:'sun',e1:'☀️', w2:'rain',e2:'🌧️',rhymes:false},
  {w1:'cake',e1:'🎂',w2:'fish',e2:'🐟',rhymes:false},
  {w1:'bee',e1:'🐝', w2:'frog',e2:'🐸',rhymes:false},
  {w1:'star',e1:'⭐',w2:'moon',e2:'🌙',rhymes:false},
  {w1:'book',e1:'📖',w2:'ball',e2:'⚽',rhymes:false},
  {w1:'blue',e1:'🔵',w2:'red',e2:'🔴',rhymes:false},
  {w1:'pig',e1:'🐷',w2:'dig',e2:'🪱',rhymes:true},
  {w1:'fox',e1:'🦊',w2:'box',e2:'📦',rhymes:true},
  {w1:'ball',e1:'⚽',w2:'wall',e2:'🧱',rhymes:true},
];
const CHAINS={
  '-at':[{w:'cat',e:'🐱'},{w:'bat',e:'🦇'},{w:'hat',e:'🎩'},{w:'mat',e:'🛒'},{w:'rat',e:'🐀'},{w:'sat',e:'🪑'}],
  '-og':[{w:'dog',e:'🐶'},{w:'frog',e:'🐸'},{w:'log',e:'🪵'},{w:'hog',e:'🐖'},{w:'fog',e:'🌫️'},{w:'jog',e:'🏃'}],
  '-un':[{w:'sun',e:'☀️'},{w:'run',e:'🏃'},{w:'bun',e:'🍞'},{w:'fun',e:'🎉'},{w:'gun',e:'🎯'},{w:'nun',e:'👩'}],
  '-ip':[{w:'ship',e:'🚢'},{w:'lip',e:'👄'},{w:'tip',e:'💡'},{w:'dip',e:'🏊'},{w:'hip',e:'🕺'},{w:'rip',e:'✂️'}],
  '-ee':[{w:'bee',e:'🐝'},{w:'tree',e:'🌳'},{w:'see',e:'👀'},{w:'fee',e:'💰'},{w:'knee',e:'🦵'},{w:'free',e:'🕊️'}],
  '-ig':[{w:'pig',e:'🐷'},{w:'big',e:'🏔️'},{w:'dig',e:'🪱'},{w:'fig',e:'🌿'},{w:'wig',e:'👱'},{w:'jig',e:'🎵'}],
  '-ox':[{w:'fox',e:'🦊'},{w:'box',e:'📦'},{w:'ox',e:'🐂'},{w:'lock',e:'🔒'}],
  '-all':[{w:'ball',e:'⚽'},{w:'wall',e:'🧱'},{w:'tall',e:'📏'},{w:'fall',e:'🍂'},{w:'call',e:'📞'},{w:'hall',e:'🚪'}],
};

let qIdx=0,score=0,total=0,shuffled=[...PAIRS].sort(()=>Math.random()-0.5);
let curChain='-at';

function loadPair(){
  const p=shuffled[qIdx%shuffled.length];
  document.getElementById('rhyme-pair').innerHTML=`
    <div class="rhyme-word" onclick="speak('${p.w1}',0.72)">
      <span class="rw-emoji">${p.e1}</span>
      <span class="rw-text">${p.w1}</span>
    </div>
    <div style="font-size:2rem;font-weight:800;color:var(--muted)">+</div>
    <div class="rhyme-word" onclick="speak('${p.w2}',0.72)">
      <span class="rw-emoji">${p.e2}</span>
      <span class="rw-text">${p.w2}</span>
    </div>`;
  document.getElementById('fb-text').textContent='';
  document.querySelectorAll('.big-btn').forEach(b=>b.classList.remove('correct','wrong'));
  playBoth();
}
function playBoth(){
  const p=shuffled[qIdx%shuffled.length];
  speak(p.w1,0.75,1.1,()=>setTimeout(()=>speak(p.w2,0.75),400));
}
function checkRhyme(said){
  const p=shuffled[qIdx%shuffled.length]; total++;
  const correct=p.rhymes;
  const yesBtn=document.getElementById('yes-btn');
  const noBtn=document.getElementById('no-btn');
  if(said===correct){
    score++;
    (said?yesBtn:noBtn).classList.add('correct');
    const msg=p.rhymes?`Yes! "${p.w1}" and "${p.w2}" rhyme! They both end in -${p.w1.slice(-2)}!`:`Correct! "${p.w1}" and "${p.w2}" don't rhyme!`;
    document.getElementById('fb-text').textContent='✅ '+msg;
    speak(msg,0.85);awardStars('rhyme',1);
    setTimeout(()=>{qIdx++;loadPair();},2200);
  } else {
    (said?yesBtn:noBtn).classList.add('wrong');
    (!said?yesBtn:noBtn).classList.add('correct');
    const msg=p.rhymes?`Try again! "${p.w1}" and "${p.w2}" DO rhyme!`:`Try again! "${p.w1}" and "${p.w2}" don't rhyme!`;
    document.getElementById('fb-text').textContent='❌ '+msg;
    speak(msg,0.82);
    setTimeout(()=>{qIdx++;loadPair();},2500);
  }
  document.getElementById('score-num').textContent=score;
  document.getElementById('score-total').textContent=total;
  if(total>=12){markComplete('rhyme');awardStars('rhyme',2);}
}
function buildChainTabs(){
  document.getElementById('chain-tabs').innerHTML=Object.keys(CHAINS).map(f=>`
    <button class="ct${f===curChain?' active':''}" onclick="selectChain('${f}')">${f}</button>`).join('');
}
function selectChain(f){curChain=f;buildChainTabs();buildChainWords();}
function buildChainWords(){
  document.getElementById('chain-words').innerHTML=CHAINS[curChain].map(w=>`
    <div class="chain-word" onclick="speak('${w.w}',0.72)">${w.e} ${w.w}</div>`).join('');
}
function playChain(){
  const ws=CHAINS[curChain];let i=0;
  function next(){if(i>=ws.length)return;speak(ws[i].w,0.72,1.1,()=>{i++;setTimeout(next,300);});}
  speak('Listen to the '+curChain+' family!',0.85,1.1,()=>setTimeout(next,800));
}
document.addEventListener('DOMContentLoaded',()=>{
  buildChainTabs();buildChainWords();loadPair();
  injectMascot(["Do the words sound the same at the end? 🦉","Cat and hat both end in -AT — they rhyme!","Tap the words to hear them clearly! 🔊"]);
  speak("Rhyme time! Listen to two words — do they rhyme?",0.85);
});
</script>
</body>
</html>
