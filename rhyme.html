<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🎵 Rhyme Time · Phonics Hub</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* ── Rhyme family selector ── */
    .family-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 28px;
    }
    .family-btn {
      padding: 14px 20px;
      border-radius: 50px;
      border: 3px solid #eee;
      background: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      cursor: pointer;
      min-height: var(--tap-min);
      transition: all 0.15s;
    }
    .family-btn.active {
      background: var(--clr-purple);
      color: white;
      border-color: var(--clr-purple);
      transform: scale(1.05);
    }
    .family-btn:active { transform: scale(0.95); }

    /* ── Rhyme card ── */
    .rhyme-card {
      background: white;
      border-radius: 32px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: var(--shadow-md);
      margin-bottom: 28px;
    }
    .rhyme-family-display {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(3rem, 12vw, 6rem);
      color: var(--clr-purple);
      margin-bottom: 12px;
    }
    .rhyme-words-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    @media (min-width: 600px) {
      .rhyme-words-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .rhyme-word-btn {
      background: #f8f0ff;
      border: 3px solid var(--clr-purple);
      border-radius: 16px;
      padding: 16px 12px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      cursor: pointer;
      transition: all 0.15s;
      min-height: 64px;
      color: var(--clr-text);
    }
    .rhyme-word-btn:active {
      transform: scale(0.93);
      background: var(--clr-purple);
      color: white;
    }
    .rhyme-word-btn:hover {
      background: var(--clr-purple);
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 6px 0 rgba(167,139,250,0.4);
    }

    /* ── Rhyme quiz ── */
    .rhyme-quiz-box {
      background: white;
      border-radius: 28px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: var(--shadow-md);
      margin-bottom: 24px;
    }
    .quiz-question {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      margin-bottom: 12px;
    }
    .quiz-target {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(3rem, 12vw, 6rem);
      color: var(--clr-primary);
      display: block;
      margin: 12px 0 24px;
    }
    .rhyme-choices {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 440px;
      margin: 0 auto;
    }
    @media (min-width: 600px) {
      .rhyme-choices { grid-template-columns: repeat(4, 1fr); }
    }
    .rhyme-choice {
      background: #f8f8f8;
      border: 4px solid transparent;
      border-radius: 20px;
      padding: 18px 12px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 6vw, 2.2rem);
      cursor: pointer;
      transition: all 0.15s;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .rhyme-choice:hover   { background: #f0f0f0; border-color: var(--clr-secondary); }
    .rhyme-choice.correct { background: #f0fdf4; border-color: var(--clr-green); }
    .rhyme-choice.wrong   { background: #fff0f0; border-color: var(--clr-primary); }
    .rhyme-choice:active  { transform: scale(0.95); }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="nav-home-btn">🏠</a>
      <span class="nav-title">Rhyme Time</span>
    </div>
    <div class="nav-right"></div>
  </nav>

  <div class="page-header" style="background:linear-gradient(135deg,var(--clr-purple),#c4b5fd)">
    <h1>🎵 Rhyme Time</h1>
    <p>Find words that sound the same!</p>
  </div>

  <main>

    <!-- Mode tabs -->
    <div class="mode-tabs" style="margin-top:24px">
      <button class="mode-tab active" data-mode="explore">🔍 Explore</button>
      <button class="mode-tab" data-mode="quiz">🎯 Quiz</button>
    </div>

    <!-- ── Explore mode ── -->
    <div id="mode-explore">
      <div class="family-selector" id="family-selector"></div>

      <div class="rhyme-card" id="rhyme-card">
        <div class="rhyme-family-display" id="family-display">-at</div>
        <p style="font-size:1.1rem;color:var(--clr-text-soft);margin-bottom:8px">Words that rhyme with <strong id="family-example">cat</strong>:</p>
        <div class="rhyme-words-grid" id="rhyme-words-grid"></div>
        <button class="btn btn-purple btn-lg" id="btn-read-all" style="margin-top:12px">
          🔊 Read All Rhymes
        </button>
      </div>
    </div>

    <!-- ── Quiz mode ── -->
    <div id="mode-quiz" style="display:none">
      <div class="rhyme-quiz-box">
        <div class="quiz-question">Which word rhymes with...</div>
        <span class="quiz-target" id="quiz-target">cat</span>
        <button class="btn btn-primary" id="quiz-play-sound" style="margin:0 auto 24px;display:flex">
          🔊 Hear it
        </button>
        <div class="rhyme-choices" id="rhyme-choices"></div>
        <p style="margin-top:20px;font-weight:800;font-size:1.1rem;color:var(--clr-text-soft)">
          Score: <span id="rhyme-score">0</span> / <span id="rhyme-total">0</span>
        </p>
      </div>
    </div>

    <div class="score-bar">
      <div class="score-item">⭐ <span id="stars-display">0</span> <span class="score-label">Stars</span></div>
    </div>

  </main>

  <script src="js/audio.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let families     = [];
    let currentFamily = 0;
    let quizScore     = 0;
    let quizTotal     = 0;
    let stars         = 0;

    // ── Modes ──
    const modeTabs = document.querySelectorAll('.mode-tab');
    modeTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        modeTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const m = tab.dataset.mode;
        document.getElementById('mode-explore').style.display = m === 'explore' ? 'block' : 'none';
        document.getElementById('mode-quiz').style.display    = m === 'quiz'    ? 'block' : 'none';
        if (m === 'quiz') nextRhymeQuiz();
        AudioManager.playTone('click');
      });
    });

    function loadMaterial() {
      const pack = MaterialsManager.getCurrent();
      families = pack.rhymes || [];
      currentFamily = 0;
      buildFamilySelector();
      showFamily(0);
    }

    function buildFamilySelector() {
      const sel = document.getElementById('family-selector');
      sel.innerHTML = '';
      families.forEach((fam, i) => {
        const btn = document.createElement('button');
        btn.className = `family-btn ${i === 0 ? 'active' : ''}`;
        btn.textContent = fam.family;
        btn.addEventListener('click', () => {
          sel.querySelectorAll('.family-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          showFamily(i);
          AudioManager.playTone('click');
        });
        sel.appendChild(btn);
      });
    }

    function showFamily(idx) {
      currentFamily = idx;
      const fam = families[idx];
      if (!fam) return;
      document.getElementById('family-display').textContent = fam.family;
      document.getElementById('family-example').textContent = fam.words[0] || '';

      const grid = document.getElementById('rhyme-words-grid');
      grid.innerHTML = '';
      fam.words.forEach(w => {
        const btn = document.createElement('button');
        btn.className = 'rhyme-word-btn';
        btn.textContent = w;
        btn.addEventListener('click', () => {
          AudioManager.speak(w, { rate: 0.75 });
          AudioManager.playTone('click');
          UI.animateBtn(btn, 'animate-bounce');
          stars++;
          document.getElementById('stars-display').textContent = stars;
          UI.setScore('rhyme', { stars });
        });
        grid.appendChild(btn);
      });
    }

    document.getElementById('btn-read-all').addEventListener('click', () => {
      const fam = families[currentFamily];
      if (!fam) return;
      let i = 0;
      function readNext() {
        if (i >= fam.words.length) return;
        AudioManager.speak(fam.words[i++], { rate: 0.75, onEnd: () => setTimeout(readNext, 400) });
      }
      readNext();
    });

    // ── Quiz ──
    let quizTarget = null;

    function nextRhymeQuiz() {
      // Pick random family
      const fam = families[Math.floor(Math.random() * families.length)];
      if (!fam || fam.words.length < 2) return;

      // Target is a word from the family
      const targetWord  = fam.words[Math.floor(Math.random() * fam.words.length)];
      quizTarget = { word: targetWord, family: fam.family };

      // Answer is another word from SAME family
      const answer = fam.words.filter(w => w !== targetWord)[Math.floor(Math.random() * (fam.words.length - 1))];

      // Distractors from other families
      const others = families
        .filter(f => f.family !== fam.family)
        .flatMap(f => f.words);
      const distractors = UI.shuffle(others).slice(0, 3);

      const choices = UI.shuffle([answer, ...distractors]);

      document.getElementById('quiz-target').textContent = targetWord;
      AudioManager.speak(targetWord, { rate: 0.75 });

      document.getElementById('quiz-play-sound').onclick = () => {
        AudioManager.speak(targetWord, { rate: 0.75 });
      };

      const choicesEl = document.getElementById('rhyme-choices');
      choicesEl.innerHTML = '';
      choices.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'rhyme-choice';
        btn.textContent = ch;
        btn.addEventListener('click', () => {
          quizTotal++;
          const correct = ch === answer;
          btn.classList.add(correct ? 'correct' : 'wrong');
          if (correct) {
            quizScore++;
            AudioManager.playTone('correct');
            UI.showFeedback(true, 900);
            stars++;
            document.getElementById('stars-display').textContent = stars;
          } else {
            AudioManager.playTone('wrong');
            // Show correct
            choicesEl.querySelectorAll('.rhyme-choice').forEach(b => {
              if (b.textContent === answer) b.classList.add('correct');
            });
          }
          document.getElementById('rhyme-score').textContent = quizScore;
          document.getElementById('rhyme-total').textContent = quizTotal;
          choicesEl.querySelectorAll('.rhyme-choice').forEach(b => b.style.pointerEvents = 'none');
          setTimeout(nextRhymeQuiz, correct ? 1200 : 1800);
        });
        choicesEl.appendChild(btn);
      });
    }

    document.addEventListener('materialChanged', loadMaterial);
    loadMaterial();
  </script>
</body>
</html>
