<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Long Vowels 🔆</title>
<link rel="stylesheet" href="shared.css">
<style>
  .vowel-tabs { display:flex;gap:8px;justify-content:center;margin:14px 0;flex-wrap:wrap; }
  .v-tab { padding:8px 18px;border:2.5px solid var(--border);background:white;border-radius:20px;font-family:var(--font-display);font-size:1rem;font-weight:800;cursor:pointer;transition:all 0.2s;color:var(--vowel); }
  .v-tab.active,.v-tab:hover { border-color:var(--vowel);background:#fff5f5; }
  .pattern-box { background:white;border:2.5px solid var(--border);border-radius:20px;padding:22px;margin:14px 0; }
  .pb-title { font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--vowel);text-align:center;margin-bottom:12px; }
  .pattern-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0; }
  @media(max-width:420px){.pattern-grid{grid-template-columns:repeat(2,1fr);}}
  .pattern-card { background:#fff5f5;border:2px solid #ffcdd2;border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;transition:transform 0.15s;touch-action:manipulation; }
  .pattern-card:hover { transform:translateY(-3px);border-color:var(--vowel); }
  .pattern-card:active { transform:scale(0.92); }
  .pc-pattern { font-family:var(--font-display);font-size:1.2rem;font-weight:800;color:var(--vowel); }
  .pc-example { font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text);margin-top:4px; }
  .pc-emoji   { font-size:1.4rem;display:block;margin-top:4px; }
  .word-chips { display:flex;flex-wrap:wrap;gap:10px;margin:12px 0;justify-content:center; }
  .word-chip  { background:#fff5f5;border:2px solid #ffcdd2;border-radius:12px;padding:10px 16px;font-family:var(--font-display);font-size:1.1rem;font-weight:800;cursor:pointer;transition:transform 0.15s;touch-action:manipulation; }
  .word-chip:hover { transform:translateY(-3px); }
  .word-chip:active { transform:scale(0.92); }
  .sort-game { background:white;border:2.5px solid var(--border);border-radius:20px;padding:22px;margin:20px 0; }
  .sort-q { font-family:var(--font-display);font-size:1rem;font-weight:800;color:var(--primary);text-align:center;margin-bottom:14px; }
  .sort-word { font-family:var(--font-display);font-size:2.8rem;font-weight:800;color:var(--text);text-align:center;margin:12px 0; }
  .pattern-choices { display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px; }
  .pc-btn { padding:16px;border:3px solid var(--border);border-radius:14px;background:white;font-family:var(--font-display);font-size:1rem;font-weight:800;cursor:pointer;color:var(--vowel);transition:all 0.18s;touch-action:manipulation; }
  .pc-btn:hover { transform:translateY(-3px);border-color:var(--vowel); }
  .pc-btn.correct { border-color:var(--success);background:#f0faf4;color:var(--success); }
  .pc-btn.wrong   { border-color:var(--danger);background:#fff5f5;color:var(--danger); }
</style>
</head>
<body>
<div class="ph-header">
  <h1>🔆 Long Vowels</h1>
  <p>Different spellings — same long sound!</p>
  <span class="ph-stage-badge">Stage 4</span>
</div>
<div class="ph-wrap">
  <div class="vowel-tabs" id="vowel-tabs"></div>
  <div id="content"></div>
  <div class="sort-game">
    <div class="sort-q">🎯 Which spelling pattern makes this long vowel word?</div>
    <button class="ph-btn ph-btn-primary" style="display:block;margin:0 auto 10px" onclick="playSortWord()">🔊 Hear Word</button>
    <div class="sort-word" id="sort-word">rain</div>
    <div class="pattern-choices" id="pattern-choices"></div>
    <div style="text-align:center;margin-top:10px;font-weight:700;color:var(--muted)" id="sort-fb"></div>
    <div style="text-align:center;font-size:0.82rem;font-weight:700;color:var(--muted);margin-top:6px" id="sort-sc">Score: 0/0</div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const LONG_V = {
  'Long A': {
    patterns:[
      {p:'ai',ex:[{w:'rain',e:'🌧️'},{w:'sail',e:'⛵'},{w:'tail',e:'🦊'},{w:'wait',e:'⏳'}]},
      {p:'ay',ex:[{w:'play',e:'🎮'},{w:'day',e:'☀️'},{w:'say',e:'💬'},{w:'may',e:'📅'}]},
      {p:'a_e',ex:[{w:'cake',e:'🎂'},{w:'name',e:'🏷️'},{w:'game',e:'🎯'},{w:'lake',e:'🏞️'}]},
    ]
  },
  'Long E': {
    patterns:[
      {p:'ee',ex:[{w:'tree',e:'🌳'},{w:'bee',e:'🐝'},{w:'feet',e:'🦶'},{w:'see',e:'👀'}]},
      {p:'ea',ex:[{w:'beach',e:'🏖️'},{w:'eat',e:'🍽️'},{w:'leaf',e:'🍃'},{w:'read',e:'📖'}]},
      {p:'e_e',ex:[{w:'these',e:'👇'},{w:'here',e:'📍'},{w:'eve',e:'🌆'},{w:'gene',e:'🧬'}]},
    ]
  },
  'Long I': {
    patterns:[
      {p:'ie',ex:[{w:'pie',e:'🥧'},{w:'tie',e:'👔'},{w:'die',e:'🎲'},{w:'lie',e:'💬'}]},
      {p:'igh',ex:[{w:'night',e:'🌙'},{w:'light',e:'💡'},{w:'right',e:'✅'},{w:'fight',e:'🥊'}]},
      {p:'i_e',ex:[{w:'kite',e:'🪁'},{w:'bike',e:'🚲'},{w:'ride',e:'🏇'},{w:'vine',e:'🍇'}]},
    ]
  },
  'Long O': {
    patterns:[
      {p:'oa',ex:[{w:'boat',e:'⛵'},{w:'road',e:'🛣️'},{w:'coat',e:'🧥'},{w:'toad',e:'🐸'}]},
      {p:'ow',ex:[{w:'snow',e:'❄️'},{w:'flow',e:'🌊'},{w:'glow',e:'✨'},{w:'low',e:'🔽'}]},
      {p:'o_e',ex:[{w:'note',e:'📝'},{w:'rope',e:'🪢'},{w:'bone',e:'🦴'},{w:'hole',e:'🕳️'}]},
    ]
  },
  'Long U': {
    patterns:[
      {p:'ue',ex:[{w:'blue',e:'🔵'},{w:'glue',e:'🫧'},{w:'clue',e:'🔎'},{w:'true',e:'✅'}]},
      {p:'oo',ex:[{w:'moon',e:'🌙'},{w:'food',e:'🍔'},{w:'cool',e:'😎'},{w:'pool',e:'🏊'}]},
      {p:'u_e',ex:[{w:'cube',e:'🧊'},{w:'cute',e:'🥰'},{w:'tune',e:'🎵'},{w:'rule',e:'📏'}]},
    ]
  },
};
const SORT_ITEMS = [
  {w:'rain',v:'Long A',p:'ai'},{w:'play',v:'Long A',p:'ay'},{w:'cake',v:'Long A',p:'a_e'},
  {w:'tree',v:'Long E',p:'ee'},{w:'beach',v:'Long E',p:'ea'},{w:'night',v:'Long I',p:'igh'},
  {w:'boat',v:'Long O',p:'oa'},{w:'snow',v:'Long O',p:'ow'},{w:'blue',v:'Long U',p:'ue'},
  {w:'moon',v:'Long U',p:'oo'},
];
let curV = 'Long A', sIdx = 0, sScore = 0, sTotal = 0;
let sShuf = [...SORT_ITEMS].sort(()=>Math.random()-0.5);

function buildTabs() {
  document.getElementById('vowel-tabs').innerHTML = Object.keys(LONG_V).map(v => `
    <button class="v-tab${v===curV?' active':''}" onclick="selectVowel('${v}')">${v}</button>`).join('');
}
function selectVowel(v) {
  curV = v;
  buildTabs();
  buildContent();
  speak(v + ' sounds!', 0.85);
}
function buildContent() {
  const data = LONG_V[curV];
  document.getElementById('content').innerHTML = data.patterns.map(pat => `
    <div class="pattern-box">
      <div class="pb-title">"${pat.p}" pattern</div>
      <div class="word-chips">
        ${pat.ex.map(wd => `<div class="word-chip" onclick="speak('${wd.w}',0.72)">${wd.e} ${wd.w}</div>`).join('')}
      </div>
      <button class="ph-btn ph-btn-outline" style="width:100%;margin-top:8px" onclick="speak('${pat.ex.map(w=>w.w).join(', ')}',0.78)">🔊 Hear all words</button>
    </div>`).join('');
}
function playSortWord() {
  const item = sShuf[sIdx % sShuf.length];
  document.getElementById('sort-word').textContent = item.w;
  document.querySelectorAll('.pc-btn').forEach(b=>b.classList.remove('correct','wrong'));
  document.getElementById('sort-fb').textContent = '';
  // Build choices: correct + 1 wrong pattern from same vowel or different
  const curPatterns = LONG_V[item.v].patterns.map(p=>p.p);
  const choices = [item.p, ...curPatterns.filter(p=>p!==item.p).slice(0,1),
    ...Object.values(LONG_V).flatMap(d=>d.patterns).map(p=>p.p)
      .filter(p=>!curPatterns.includes(p)).sort(()=>Math.random()-0.5).slice(0,2)]
    .slice(0,4).sort(()=>Math.random()-0.5);
  document.getElementById('pattern-choices').innerHTML = choices.map(p => `
    <button class="pc-btn" onclick="checkSort(this,'${p}','${item.p}','${item.w}',this)">${p}</button>`).join('');
  speak(item.w, 0.72);
}
function checkSort(el,chosen,correct,word) {
  sTotal++;
  if (chosen===correct) {
    el.classList.add('correct'); sScore++;
    document.getElementById('sort-fb').textContent='✅ Yes! "'+word+'" uses the '+correct+' pattern!';
    speak('Correct! '+word+' uses the '+correct+' pattern!');
    awardStars('long-vowel',1);
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.pc-btn').forEach(b=>{if(b.textContent.trim()===correct)b.classList.add('correct');});
    document.getElementById('sort-fb').textContent='Try again! "'+word+'" uses the '+correct+' pattern!';
    speak('Try again! '+word+' uses the '+correct+' pattern!');
  }
  sIdx++;
  document.getElementById('sort-sc').textContent='Score: '+sScore+'/'+sTotal;
  if(sTotal>=10){markComplete('long-vowel');awardStars('long-vowel',2);}
  setTimeout(playSortWord,2000);
}
document.addEventListener('DOMContentLoaded',()=>{
  buildTabs(); buildContent();
  injectMascot(["Long vowels say their own name! 🦉","AI, EE, IE, OA, OO are common patterns!","Tap the tabs to explore each long vowel!"]);
  speak("Long vowels! The vowel says its own name — like A in cake, E in tree, I in kite!",0.85);
  setTimeout(playSortWord,1000);
});
</script>
</body>
</html>
