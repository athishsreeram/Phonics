<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CVC Words 🔠</title>
<link rel="stylesheet" href="shared.css">
<style>
  .family-tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center; margin: 14px 0;
  }
  .family-tab {
    padding: 7px 16px;
    border: 2.5px solid var(--border);
    border-radius: 20px;
    background: white;
    font-family: var(--font-display);
    font-size: 0.9rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .family-tab.active, .family-tab:hover { border-color: var(--primary); background: #f0ecff; color: var(--primary); }

  .blend-stage {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 22px;
    padding: 24px 20px;
    text-align: center;
    margin: 16px 0;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .blend-tiles {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .blend-tile {
    width: 70px; height: 80px;
    border: 3px solid var(--border);
    border-radius: 14px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 2.4rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.25s, border-color 0.25s;
    touch-action: manipulation;
  }
  .blend-tile:hover  { transform: translateY(-4px); border-color: var(--primary); }
  .blend-tile:active { transform: scale(0.9); }
  .blend-tile.vowel  { border-color: #ffcdd2; color: var(--vowel); }
  .blend-tile.cons   { border-color: #bbdefb; color: var(--consonant); }
  .blend-tile.highlight { animation: pulse 0.5s ease; border-color: var(--accent); background: #fff8ed; }

  .blend-plus, .blend-arrow { font-size: 1.6rem; color: var(--muted); font-weight: 800; }
  .blend-equals { font-size: 2rem; color: var(--success); }

  .blend-word-big {
    font-family: var(--font-display);
    font-size: 3.2rem;
    font-weight: 800;
    color: var(--primary);
    opacity: 0;
    transition: opacity 0.4s, transform 0.4s;
    transform: translateY(10px);
  }
  .blend-word-big.show { opacity: 1; transform: translateY(0); }

  .word-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
    margin: 14px 0;
  }
  .word-item {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.18s, border-color 0.18s;
    touch-action: manipulation;
  }
  .word-item:hover  { transform: translateY(-3px); border-color: var(--primary); }
  .word-item:active { transform: scale(0.92); }
  .word-item .wi-emoji { font-size: 1.8rem; display: block; }
  .word-item .wi-word  { font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; margin-top: 6px; }

  .spinner-game {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 22px;
    padding: 24px 20px;
    margin: 20px 0;
    text-align: center;
  }
  .spinners {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: stretch;
    margin: 16px 0;
  }
  .spinner-col {
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow: hidden;
    height: 80px;
    border: 3px solid var(--border);
    border-radius: 14px;
    width: 70px;
    position: relative;
    background: white;
  }
  .spinner-item {
    flex-shrink: 0;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 2.2rem;
    font-weight: 800;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .spinner-col.vowel { border-color: #ffcdd2; }
  .spinner-col.vowel .spinner-item { color: var(--vowel); }
  .spinner-col.cons  { border-color: #bbdefb; }
  .spinner-col.cons  .spinner-item { color: var(--consonant); }
</style>
</head>
<body>
<div class="ph-header">
  <h1>🔠 CVC Words</h1>
  <p>Blend 3 sounds to make words!</p>
  <span class="ph-stage-badge">Stage 2</span>
</div>

<div class="ph-wrap">
  <div class="family-tabs" id="family-tabs"></div>

  <!-- Blend Stage -->
  <div class="blend-stage" id="blend-stage">
    <div class="blend-tiles" id="blend-tiles"></div>
    <div class="blend-word-big" id="blend-result"></div>
    <div class="ph-btn-row">
      <button class="ph-btn ph-btn-primary" onclick="blendWord()">🔊 Blend It!</button>
      <button class="ph-btn ph-btn-outline" onclick="nextWord()">Next ▶</button>
    </div>
  </div>

  <!-- Word List -->
  <div class="ph-section-title">📋 Word Family</div>
  <div class="word-list" id="word-list"></div>

  <!-- Spinner Game -->
  <div class="spinner-game">
    <div class="ph-section-title" style="justify-content:center;border:none">🎰 Word Builder Spinner</div>
    <p style="font-size:0.88rem;color:var(--muted);font-weight:700;margin-bottom:12px">Tap Spin to get a random CVC word!</p>
    <div class="spinners" id="spinners">
      <div class="spinner-col cons" id="spin-c1"><div class="spinner-item" id="s1">c</div></div>
      <div class="spinner-col vowel" id="spin-v"><div class="spinner-item" id="sv">a</div></div>
      <div class="spinner-col cons" id="spin-c2"><div class="spinner-item" id="s2">t</div></div>
    </div>
    <div style="font-family:var(--font-display);font-size:2rem;font-weight:800;color:var(--primary);margin:8px 0" id="spin-result">cat</div>
    <div class="ph-btn-row">
      <button class="ph-btn ph-btn-accent" onclick="spin()">🎰 Spin!</button>
      <button class="ph-btn ph-btn-primary" onclick="hearSpin()">🔊 Hear It</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const FAMILIES = {
  '-at': { words:[{w:'cat',e:'🐱'},{w:'bat',e:'🦇'},{w:'hat',e:'🎩'},{w:'mat',e:'🛒'},{w:'rat',e:'🐀'},{w:'sat',e:'🪑'}] },
  '-an': { words:[{w:'can',e:'🥫'},{w:'fan',e:'🌬️'},{w:'man',e:'👨'},{w:'pan',e:'🍳'},{w:'ran',e:'🏃'},{w:'van',e:'🚐'}] },
  '-in': { words:[{w:'bin',e:'🗑️'},{w:'fin',e:'🐟'},{w:'pin',e:'📌'},{w:'sin',e:'😈'},{w:'tin',e:'🥫'},{w:'win',e:'🏆'}] },
  '-og': { words:[{w:'dog',e:'🐶'},{w:'fog',e:'🌫️'},{w:'hog',e:'🐖'},{w:'jog',e:'🏃'},{w:'log',e:'🪵'},{w:'frog',e:'🐸'}] },
  '-un': { words:[{w:'bun',e:'🍞'},{w:'fun',e:'🎉'},{w:'gun',e:'🔫'},{w:'run',e:'🏃'},{w:'sun',e:'☀️'},{w:'nun',e:'👩'}] },
  '-en': { words:[{w:'den',e:'🏠'},{w:'hen',e:'🐔'},{w:'men',e:'👨‍👨'},{w:'pen',e:'🖊️'},{w:'ten',e:'🔟'},{w:'yen',e:'💴'}] },
  '-it': { words:[{w:'bit',e:'🔣'},{w:'fit',e:'💪'},{w:'hit',e:'⚾'},{w:'kit',e:'🧰'},{w:'pit',e:'🕳️'},{w:'sit',e:'🪑'}] },
  '-ot': { words:[{w:'cot',e:'🛏️'},{w:'dot',e:'●'},{w:'got',e:'✅'},{w:'hot',e:'🥵'},{w:'lot',e:'🅿️'},{w:'pot',e:'🪴'}] },
};
const SPIN_C = ['b','c','d','f','g','h','j','k','l','m','n','p','r','s','t','v','w'];
const SPIN_V = ['a','e','i','o','u'];
const SPIN_C2= ['b','d','g','k','l','m','n','p','r','s','t','x'];

let currentFamily = '-at', wordIdx = 0;

function buildTabs() {
  const tabs = document.getElementById('family-tabs');
  tabs.innerHTML = Object.keys(FAMILIES).map(f => `
    <button class="family-tab${f===currentFamily?' active':''}" onclick="selectFamily('${f}')">${f}</button>`).join('');
}

function selectFamily(f) {
  currentFamily = f;
  wordIdx = 0;
  buildTabs();
  buildWordList();
  showCurrentWord();
}

function buildWordList() {
  const fam = FAMILIES[currentFamily];
  document.getElementById('word-list').innerHTML = fam.words.map(wd => `
    <div class="word-item" onclick="speak('${wd.w}',0.72)">
      <span class="wi-emoji">${wd.e}</span>
      <span class="wi-word">${wd.w}</span>
    </div>`).join('');
}

function showCurrentWord() {
  const words = FAMILIES[currentFamily].words;
  const word  = words[wordIdx % words.length];
  const letters = word.w.split('');
  const tiles = document.getElementById('blend-tiles');
  const result = document.getElementById('blend-result');
  result.classList.remove('show');
  result.textContent = word.w + ' ' + word.e;

  tiles.innerHTML = letters.map((l, i) => {
    const isVowel = 'aeiou'.includes(l);
    const cls = isVowel ? 'vowel' : 'cons';
    return `<div class="blend-tile ${cls}" onclick="speakPhoneme('${l}')">${l}</div>
            ${i < letters.length-1 ? '<div class="blend-plus">+</div>' : ''}`;
  }).join('');
}

function blendWord() {
  const words = FAMILIES[currentFamily].words;
  const word  = words[wordIdx % words.length];
  const tiles = document.querySelectorAll('.blend-tile');
  const result = document.getElementById('blend-result');
  result.classList.remove('show');
  let delay = 0;
  tiles.forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add('highlight');
      speak(tile.textContent, 0.65);
      setTimeout(() => tile.classList.remove('highlight'), 450);
    }, delay);
    delay += 600;
  });
  setTimeout(() => {
    speak(word.w, 0.7);
    result.textContent = word.w + ' ' + word.e;
    result.classList.add('show');
    awardStars('cvc', 1);
  }, delay + 200);
}

function nextWord() {
  wordIdx++;
  const words = FAMILIES[currentFamily].words;
  if (wordIdx >= words.length) { wordIdx = 0; celebrate('You finished the ' + currentFamily + ' family! 🎉', 2); markComplete('cvc'); return; }
  showCurrentWord();
  document.getElementById('blend-result').classList.remove('show');
}

function spin() {
  const c1 = SPIN_C[Math.floor(Math.random()*SPIN_C.length)];
  const v  = SPIN_V[Math.floor(Math.random()*SPIN_V.length)];
  const c2 = SPIN_C2[Math.floor(Math.random()*SPIN_C2.length)];
  document.getElementById('s1').textContent = c1;
  document.getElementById('sv').textContent = v;
  document.getElementById('s2').textContent = c2;
  const word = c1+v+c2;
  document.getElementById('spin-result').textContent = word;
  speak(word, 0.72);
}

function hearSpin() {
  const w = document.getElementById('spin-result').textContent;
  speak(w, 0.7);
}

document.addEventListener('DOMContentLoaded', () => {
  buildTabs();
  buildWordList();
  showCurrentWord();
  injectMascot(["Tap each letter to hear its sound! 🦉","Then tap Blend It to hear the whole word!","Try different word families with the tabs!"]);
  speak("CVC words! Let's blend sounds together! Tap a letter, then tap Blend It!", 0.85);
});
</script>
</body>
</html>
