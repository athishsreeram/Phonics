<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Read + Voice 🎙️</title>
<link rel="stylesheet" href="shared.css">
<style>
  .passage-sel { display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0; }
  .ps-btn { padding:7px 15px;border:2.5px solid var(--border);background:white;border-radius:20px;font-family:var(--font-display);font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.2s; }
  .ps-btn.active,.ps-btn:hover { border-color:var(--primary);background:#f0ecff;color:var(--primary); }
  .reader-box { background:white;border:2.5px solid var(--border);border-radius:22px;padding:24px 20px;margin:14px 0; }
  .rb-scene { text-align:center;font-size:3.5rem;margin-bottom:10px; }
  .rb-title { font-family:var(--font-display);font-size:1.2rem;font-weight:800;color:var(--primary);text-align:center;margin-bottom:14px; }
  .rb-text { font-family:var(--font-display);font-size:clamp(1.2rem,4.2vw,1.6rem);font-weight:700;line-height:2.1;color:var(--text); }
  .rb-word { cursor:pointer;border-radius:6px;padding:2px 4px;transition:background 0.2s;display:inline; }
  .rb-word:hover { background:#e8e0f8; }
  .rb-word.active { background:#FFD93D;font-weight:800; }
  .wave-box { display:flex;align-items:flex-end;justify-content:center;gap:3px;height:40px;margin:10px 0; }
  .wave-bar { width:6px;background:var(--primary);border-radius:3px;transition:height 0.1s; }
  .controls { display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0; }
  .mic-section { background:#e8f8f5;border:2.5px solid #a8e6c4;border-radius:20px;padding:20px;margin:14px 0;text-align:center; }
  .mic-title { font-family:var(--font-display);font-size:1.05rem;font-weight:800;color:#117a65;margin-bottom:12px; }
  .mic-btn { width:80px;height:80px;border-radius:50%;border:none;font-size:2rem;cursor:pointer;transition:all 0.2s;background:linear-gradient(135deg,#27ae60,#1abc9c);box-shadow:0 6px 20px rgba(39,174,96,0.35); }
  .mic-btn:active { transform:scale(0.92); }
  .mic-btn.recording { animation:pulse 0.8s ease infinite;box-shadow:0 0 0 0 rgba(39,174,96,0.5); }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(39,174,96,0.4)}50%{box-shadow:0 0 0 14px rgba(39,174,96,0)} }
</style>
</head>
<body>
<div class="ph-header">
  <h1>🎙️ Read + Voice</h1>
  <p>Listen, follow along, then read it yourself!</p>
  <span class="ph-stage-badge">Stage 5</span>
</div>
<div class="ph-wrap">
  <div class="passage-sel" id="passage-sel"></div>
  <div class="reader-box">
    <div class="rb-scene" id="rb-scene">🐱</div>
    <div class="rb-title" id="rb-title">The Cat on the Mat</div>
    <div class="wave-box" id="wave-box"></div>
    <div class="rb-text" id="rb-text"></div>
  </div>
  <div class="controls">
    <button class="ph-btn ph-btn-primary" onclick="listenMode()">👂 Listen</button>
    <button class="ph-btn ph-btn-outline" onclick="stopAll()">⏹ Stop</button>
    <button class="ph-btn ph-btn-accent" onclick="nextPassage()">▶ Next Story</button>
  </div>
  <div class="mic-section">
    <div class="mic-title">🎤 Now YOU read it!</div>
    <p style="font-size:0.85rem;font-weight:700;color:var(--muted);margin-bottom:14px">Press the mic and read the story aloud!</p>
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
    <div style="margin-top:12px;font-weight:700;color:#117a65" id="mic-feedback">Press the mic to start recording!</div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const STORIES = [
  {title:'The Cat on the Mat',scene:'🐱',text:'The cat sat on the mat. The cat is fat. Pat the cat. The cat ran fast. The cat is happy now.'},
  {title:'Pip the Pig',scene:'🐷',text:'Pip is a pig. Pip is pink. Pip can dig. Pip digs in the mud. Pip is a happy pig!'},
  {title:'The Big Ship',scene:'🚢',text:'The big ship is on the sea. The ship goes fast. The ship has a flag. The flag is red. I love the big ship!'},
  {title:'Sunshine Day',scene:'☀️',text:'The sun is bright today. The sun is hot and warm. I play in the sun. I run and jump. What a sunny day!'},
];
let curIdx=0, words=[], wordEls=[], reading=false, recognition=null, waveBars=[];

function buildSel() {
  document.getElementById('passage-sel').innerHTML = STORIES.map((s,i)=>`
    <button class="ps-btn${i===curIdx?' active':''}" onclick="loadStory(${i})">${s.scene} ${i+1}</button>`).join('');
}
function buildWave() {
  const box = document.getElementById('wave-box');
  box.innerHTML = Array.from({length:16},(_,i)=>`<div class="wave-bar" id="wb${i}" style="height:4px"></div>`).join('');
  waveBars = Array.from({length:16},(_,i)=>document.getElementById('wb'+i));
}
function animateWave(on) {
  if (!on) { waveBars.forEach(b=>b.style.height='4px'); return; }
  waveBars.forEach((b,i)=>{
    b.style.height = (8+Math.random()*28)+'px';
  });
}
function loadStory(i) {
  curIdx=i; buildSel(); stopAll();
  const s=STORIES[i];
  document.getElementById('rb-scene').textContent=s.scene;
  document.getElementById('rb-title').textContent=s.title;
  words=s.text.split(' ');
  document.getElementById('rb-text').innerHTML=words.map((w,idx)=>
    `<span class="rb-word" id="rw${idx}" onclick="speak('${w.replace(/[^a-zA-Z]/g,'')}',0.72)">${w} </span>`).join('');
  wordEls=words.map((_,i)=>document.getElementById('rw'+i));
  speak(s.title+'. Tap Listen to hear the story!',0.85);
}
function listenMode() {
  stopAll(); reading=true;
  let idx=0, waveInterval=null;
  waveInterval=setInterval(()=>animateWave(reading),120);
  function readNext(){
    if(!reading||idx>=words.length){reading=false;clearInterval(waveInterval);animateWave(false);return;}
    wordEls.forEach(el=>el.classList.remove('active'));
    if(wordEls[idx])wordEls[idx].classList.add('active');
    const u=new SpeechSynthesisUtterance(words[idx].replace(/[^a-zA-Z']/g,''));
    u.rate=0.78;u.lang='en-US';
    u.onend=()=>{idx++;setTimeout(readNext,90);};
    window.speechSynthesis.speak(u);
  }
  readNext();
}
function stopAll(){reading=false;window.speechSynthesis.cancel();animateWave(false);wordEls.forEach(el=>el.classList.remove('active'));}
function nextPassage(){loadStory((curIdx+1)%STORIES.length);}
function toggleMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    document.getElementById('mic-feedback').textContent='Sorry, microphone not supported in this browser!';return;}
  const btn=document.getElementById('mic-btn');
  if(recognition){recognition.stop();recognition=null;btn.classList.remove('recording');
    document.getElementById('mic-feedback').textContent='Great job reading! ⭐';awardStars('read2',2);markComplete('read2');return;}
  recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  recognition.lang='en-US';recognition.continuous=true;recognition.interimResults=true;
  recognition.onresult=(e)=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join(' ');
    document.getElementById('mic-feedback').textContent='I heard: '+t;
  };
  recognition.onerror=()=>{recognition=null;btn.classList.remove('recording');};
  recognition.onend=()=>{recognition=null;btn.classList.remove('recording');};
  recognition.start();btn.classList.add('recording');
  document.getElementById('mic-feedback').textContent='Recording... Read the story!';
  speak('Your turn! Read the story out loud!',0.85);
}
document.addEventListener('DOMContentLoaded',()=>{
  buildSel();buildWave();loadStory(0);
  injectMascot(["Press Listen to hear the story! 🦉","Then press the mic and read it yourself!","Tap any word to hear it! 👂"]);
});
</script>
</body>
</html>
