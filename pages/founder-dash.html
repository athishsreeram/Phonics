<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Founder Dashboard · Phonics Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --primary:#667eea; --green:#22c55e; --yellow:#f59e0b; --red:#ef4444;
        --text:#1e1e2e; --soft:#6b7280; --bg:#f1f5f9; }
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); }

.top-bar {
  background:linear-gradient(135deg,#1e1e2e,#2d2d4e);
  padding:16px 24px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:10;
}
.top-bar h1 { font-family:'Fredoka One',cursive; font-size:1.4rem; color:white; }
.top-bar .sub { font-size:.8rem; color:rgba(255,255,255,.5); margin-top:2px; }
.live-dot { width:8px; height:8px; background:#22c55e; border-radius:50%;
            display:inline-block; margin-right:6px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

main { max-width:1100px; margin:0 auto; padding:24px 16px 80px; }

/* KPI grid */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; margin-bottom:28px; }
.kpi-card { background:white; border-radius:18px; padding:20px 16px; text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,.07); transition:transform .2s; }
.kpi-card:hover { transform:translateY(-2px); }
.kpi-num  { font-family:'Fredoka One',cursive; font-size:2.4rem; line-height:1; }
.kpi-lbl  { font-size:.78rem; font-weight:800; color:var(--soft); margin-top:4px; }
.kpi-sub  { font-size:.72rem; color:var(--soft); margin-top:3px; }

/* Section */
.section { background:white; border-radius:20px; padding:24px 20px; margin-bottom:20px;
           box-shadow:0 2px 8px rgba(0,0,0,.07); }
.section-title { font-family:'Fredoka One',cursive; font-size:1.2rem; margin-bottom:16px;
                 color:#444; display:flex; align-items:center; gap:8px; }

/* Funnel */
.funnel { display:flex; flex-direction:column; gap:10px; }
.funnel-step { display:flex; align-items:center; gap:14px; }
.funnel-label { width:160px; font-weight:800; font-size:.85rem; flex-shrink:0; }
.funnel-bar-wrap { flex:1; height:28px; background:#f3f4f6; border-radius:8px; overflow:hidden; }
.funnel-bar { height:100%; border-radius:8px; display:flex; align-items:center; padding-left:10px;
              font-weight:800; font-size:.8rem; color:white; transition:width .6s ease; min-width:2px; }
.funnel-count { width:50px; text-align:right; font-weight:800; font-size:.9rem; color:var(--soft); }
.funnel-pct   { width:46px; text-align:right; font-size:.8rem; color:var(--soft); }

/* Event log */
.event-log { max-height:320px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
.event-row { display:flex; align-items:center; gap:10px; padding:8px 12px;
             background:#f9fafb; border-radius:10px; font-size:.82rem; }
.event-type { font-weight:800; min-width:160px; }
.event-ts   { color:var(--soft); font-size:.75rem; margin-left:auto; }
.badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:.7rem; font-weight:800; }
.badge-green  { background:#dcfce7; color:#15803d; }
.badge-blue   { background:#dbeafe; color:#1d4ed8; }
.badge-yellow { background:#fef9c3; color:#854d0e; }
.badge-red    { background:#fee2e2; color:#991b1b; }
.badge-purple { background:#f3e8ff; color:#6b21a8; }

/* Signups table */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:.85rem; }
th { text-align:left; padding:8px 12px; font-weight:800; color:var(--soft);
     border-bottom:2px solid #f3f4f6; font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
td { padding:10px 12px; border-bottom:1px solid #f9fafb; font-weight:600; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#fafbff; }
.empty-state { text-align:center; padding:40px 20px; color:var(--soft); }
.empty-state div { font-size:3rem; margin-bottom:8px; }

/* MRR goal */
.mrr-card {
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white; border-radius:20px; padding:24px 20px;
  margin-bottom:20px; display:flex; align-items:center; gap:20px; flex-wrap:wrap;
}
.mrr-left { flex:1; min-width:180px; }
.mrr-left h3 { font-family:'Fredoka One',cursive; font-size:1.5rem; margin-bottom:4px; }
.mrr-left p  { opacity:.85; font-size:.9rem; }
.mrr-bar-outer { background:rgba(255,255,255,.2); border-radius:999px; height:16px; margin-top:14px; }
.mrr-bar-inner { background:white; border-radius:999px; height:100%; transition:width .6s ease; }
.mrr-right { text-align:center; flex-shrink:0; }
.mrr-big   { font-family:'Fredoka One',cursive; font-size:3rem; line-height:1; }
.mrr-lbl   { font-size:.85rem; opacity:.8; }

/* Action items */
.action-list { display:flex; flex-direction:column; gap:10px; }
.action-item { display:flex; align-items:flex-start; gap:12px; padding:14px 16px;
               border-radius:14px; border:2px solid transparent; transition:border-color .2s; }
.action-item:hover { border-color:#e0e7ff; }
.action-icon { font-size:1.4rem; flex-shrink:0; margin-top:2px; }
.action-title { font-weight:800; font-size:.9rem; margin-bottom:2px; }
.action-desc  { font-size:.82rem; color:var(--soft); line-height:1.4; }
.action-pri   { font-size:.72rem; font-weight:800; padding:2px 8px; border-radius:6px; flex-shrink:0; margin-top:2px; }
.pri-high   { background:#fee2e2; color:#991b1b; }
.pri-medium { background:#fef9c3; color:#854d0e; }
.pri-done   { background:#dcfce7; color:#15803d; }

.refresh-btn { background:#667eea; color:white; border:none; border-radius:10px; padding:8px 16px;
               font-weight:800; cursor:pointer; font-family:'Nunito',sans-serif; font-size:.85rem; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>📊 Founder Dashboard</h1>
    <div class="sub"><span class="live-dot"></span>Live from localStorage · Phonics Hub</div>
  </div>
  <button class="refresh-btn" onclick="location.reload()">🔄 Refresh</button>
</div>

<main>
  <!-- MRR Goal -->
  <div class="mrr-card" id="mrr-card">
    <div class="mrr-left">
      <h3 id="mrr-title">$0 MRR</h3>
      <p id="mrr-sub">Goal: $50–$200 MRR · 5–20 paying subscribers</p>
      <div class="mrr-bar-outer">
        <div class="mrr-bar-inner" id="mrr-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="mrr-right">
      <div class="mrr-big" id="mrr-subs">0</div>
      <div class="mrr-lbl">subscribers</div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- Funnel -->
  <div class="section">
    <div class="section-title">🔻 Conversion Funnel</div>
    <div class="funnel" id="funnel"></div>
  </div>

  <!-- Signups table -->
  <div class="section">
    <div class="section-title">👤 User Profiles (this browser)</div>
    <div class="table-wrap">
      <table id="users-table">
        <thead>
          <tr>
            <th>Child</th><th>Age</th><th>Email</th><th>Goals</th>
            <th>Activities</th><th>Stars</th><th>Premium</th><th>Last Seen</th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Event log -->
  <div class="section">
    <div class="section-title">📋 Recent Events</div>
    <div class="event-log" id="event-log"></div>
  </div>

  <!-- Action plan -->
  <div class="section">
    <div class="section-title">🚀 Growth Action Plan</div>
    <div class="action-list" id="action-list"></div>
  </div>
</main>

<script>
// ── Data helpers ──────────────────────────────────────────────────────────
function getData() {
  const events   = JSON.parse(localStorage.getItem('ph_events')   || '[]');
  const profile  = JSON.parse(localStorage.getItem('ph_profile')  || '{}');
  const progress = JSON.parse(localStorage.getItem('ph_progress') || '{}');
  const mastered = JSON.parse(localStorage.getItem('alpha_mastered') || '[]');
  const streak   = JSON.parse(localStorage.getItem('ph_streak')   || '{"count":0}');
  const premium  = localStorage.getItem('ph_premium') === 'true';
  const onboarded= !!localStorage.getItem('ph_onboarded');

  const c = t => events.filter(e => e.type === t).length;
  return {
    events, profile, progress, mastered, streak, premium, onboarded,
    pageViews:       c('page_view'),
    activityStarts:  c('activity_start'),
    activityCompletes: c('activity_complete'),
    paywallHits:     c('paywall_hit'),
    upgradeClicks:   c('upgrade_click'),
    emailsCaptured:  c('email_captured'),
    nudgesShown:     c('upgrade_nudge_shown'),
    onboardingCompleted: events.some(e => e.type==='onboarding_step' && e.step==='completed'),
    activitiesDone:  Object.values(progress).filter(p=>(p.attempts||0)>0).length,
    totalStars:      Object.values(progress).reduce((s,p)=>s+(p.bestScore||0), 0),
  };
}

function timeAgo(ts) {
  if (!ts) return '—';
  const s = Math.round((Date.now()-ts)/1000);
  if (s<60) return `${s}s ago`;
  if (s<3600) return `${Math.round(s/60)}m ago`;
  if (s<86400) return `${Math.round(s/3600)}h ago`;
  return `${Math.round(s/86400)}d ago`;
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const d = getData();

  // MRR (estimate: premium = 1 subscriber for demo; replace with real Stripe data)
  const subs = d.premium ? 1 : 0;
  const mrr  = subs * 9.99;
  const mrrGoal = 200;
  document.getElementById('mrr-title').textContent = `$${mrr.toFixed(0)} MRR`;
  document.getElementById('mrr-sub').textContent   = `Goal: $50–$200 MRR · Need ${Math.ceil(mrrGoal/9.99)} subscribers`;
  document.getElementById('mrr-bar').style.width   = `${Math.min(100, Math.round((mrr/mrrGoal)*100))}%`;
  document.getElementById('mrr-subs').textContent  = subs;

  // KPIs
  const kpis = [
    { num: d.pageViews,       lbl:'Page Views',       sub:'total sessions',   color:'#667eea' },
    { num: d.onboarded?1:0,   lbl:'Onboarded',        sub:'completed setup',  color:'#8b5cf6' },
    { num: d.emailsCaptured,  lbl:'Emails Captured',  sub:'leads collected',  color:'#0891b2' },
    { num: d.activityStarts,  lbl:'Activity Starts',  sub:'engagement',       color:'#f59e0b' },
    { num: d.activityCompletes, lbl:'Completions',    sub:'finished rounds',  color:'#22c55e' },
    { num: d.paywallHits,     lbl:'Paywall Hits',     sub:'saw lock screen',  color:'#f97316' },
    { num: d.upgradeClicks,   lbl:'Upgrade Clicks',   sub:'intent to buy',    color:'#ec4899' },
    { num: subs,              lbl:'Paid Subscribers', sub:'$9.99/mo',         color:'#16a34a' },
  ];
  const grid = document.getElementById('kpi-grid');
  grid.innerHTML = '';
  kpis.forEach(k => {
    grid.innerHTML += `
      <div class="kpi-card">
        <div class="kpi-num" style="color:${k.color}">${k.num}</div>
        <div class="kpi-lbl">${k.lbl}</div>
        <div class="kpi-sub">${k.sub}</div>
      </div>`;
  });

  // Funnel
  const steps = [
    { label:'Page Views',      count:d.pageViews,          color:'#667eea' },
    { label:'Onboarding Done', count:d.onboarded?1:0,      color:'#8b5cf6' },
    { label:'Email Captured',  count:d.emailsCaptured,     color:'#0891b2' },
    { label:'Activity Started',count:d.activityStarts,     color:'#f59e0b' },
    { label:'Paywall Hit',     count:d.paywallHits,        color:'#f97316' },
    { label:'Upgrade Clicked', count:d.upgradeClicks,      color:'#ec4899' },
    { label:'Subscribed',      count:subs,                  color:'#22c55e' },
  ];
  const maxCount = Math.max(...steps.map(s=>s.count), 1);
  const funnel   = document.getElementById('funnel');
  funnel.innerHTML = '';
  steps.forEach((s, i) => {
    const pct   = Math.round((s.count / maxCount) * 100);
    const conv  = i>0 && steps[i-1].count>0 ? Math.round((s.count/steps[i-1].count)*100)+'%' : '—';
    funnel.innerHTML += `
      <div class="funnel-step">
        <div class="funnel-label">${s.label}</div>
        <div class="funnel-bar-wrap">
          <div class="funnel-bar" style="width:${pct}%;background:${s.color}">${s.count>0?s.count:''}</div>
        </div>
        <div class="funnel-count">${s.count}</div>
        <div class="funnel-pct" title="conversion from prev step">${i>0?conv:''}</div>
      </div>`;
  });

  // Users table
  const tbody = document.getElementById('users-body');
  if (!d.profile || Object.keys(d.profile).length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div>👤</div><p>No user data yet. Complete onboarding to see data here.</p></div></td></tr>`;
  } else {
    const p = d.profile;
    tbody.innerHTML = `
      <tr>
        <td>${p.childName || '—'}</td>
        <td>${p.childAge  || '—'}</td>
        <td>${p.email     || '<span style="color:#ccc">not captured</span>'}</td>
        <td>${(p.goals||[]).join(', ') || '—'}</td>
        <td>${d.activitiesDone}</td>
        <td>⭐ ${d.totalStars}</td>
        <td>${d.premium ? '<span class="badge badge-green">Premium</span>' : '<span class="badge badge-yellow">Free</span>'}</td>
        <td>${timeAgo(p.lastSeen)}</td>
      </tr>`;
  }

  // Event log
  const log = document.getElementById('event-log');
  const recent = [...d.events].reverse().slice(0, 50);
  if (recent.length === 0) {
    log.innerHTML = '<div class="empty-state"><div>📭</div><p>No events yet.</p></div>';
  } else {
    const BADGES = {
      page_view:'badge-blue', activity_start:'badge-yellow', activity_complete:'badge-green',
      paywall_hit:'badge-red', upgrade_click:'badge-purple', email_captured:'badge-green',
      signup:'badge-green', onboarding_step:'badge-blue', upgrade_nudge_shown:'badge-purple',
      streak_milestone:'badge-yellow',
    };
    log.innerHTML = recent.map(e => `
      <div class="event-row">
        <span class="badge ${BADGES[e.type]||'badge-blue'} event-type">${e.type}</span>
        <span style="color:var(--soft);font-size:.8rem">${JSON.stringify({...e,type:undefined,session:undefined,url:undefined}).replace(/[{}\"]/g,'').replace(/,/g,' · ')}</span>
        <span class="event-ts">${timeAgo(e.ts)}</span>
      </div>`).join('');
  }

  // Action plan — dynamic based on current state
  const actions = [];

  if (!d.onboarded)
    actions.push({ icon:'🎯', title:'Onboarding not completed', desc:'New users need to go through onboarding. Share the app URL and test it yourself.', pri:'high' });
  else
    actions.push({ icon:'✅', title:'Onboarding complete', desc:'User has been onboarded. Profile data is being collected.', pri:'done' });

  if (d.emailsCaptured === 0)
    actions.push({ icon:'📧', title:'No emails captured yet', desc:'Set up Mailchimp or ConvertKit in api/capture-email.js to start building your email list. Emails = your re-engagement channel.', pri:'high' });
  else
    actions.push({ icon:'✅', title:`${d.emailsCaptured} email(s) captured`, desc:'Connect Mailchimp/ConvertKit in api/capture-email.js to automate welcome emails.', pri:'done' });

  if (!d.premium)
    actions.push({ icon:'💳', title:'No paid subscribers yet', desc:'Test the full payment flow with Stripe test card 4242 4242 4242 4242. Confirm success.html sets ph_premium=true.', pri:'high' });
  else
    actions.push({ icon:'💰', title:'First subscriber active!', desc:'Verify in Stripe Dashboard that the subscription is active. Set up Stripe webhook for cancellations.', pri:'done' });

  if (d.paywallHits > 0 && d.upgradeClicks === 0)
    actions.push({ icon:'🔔', title:`${d.paywallHits} paywall hits, 0 upgrades`, desc:'Users are hitting the paywall but not upgrading. Consider lowering friction: show a preview of locked activities, add social proof, or try a lower price point.', pri:'high' });

  actions.push({ icon:'📣', title:'Launch on Reddit & Facebook groups', desc:'Post in r/phonics, r/toddlers, r/Parenting, "Teaching My Toddler" Facebook groups. Target: 10 signups from organic posts.', pri:'medium' });
  actions.push({ icon:'🔗', title:'Add Stripe webhook for cancellations', desc:'api/verify-subscription.js needs a Stripe webhook to auto-revoke premium on cancellation. Add STRIPE_WEBHOOK_SECRET to Vercel env vars.', pri:'medium' });
  actions.push({ icon:'📊', title:'Connect Vercel Log Drain for server events', desc:'Server-side events from api/log-events.js are only visible in Vercel function logs. Consider adding Axiom or Logtail drain for persistent analytics.', pri:'medium' });

  const actionList = document.getElementById('action-list');
  actionList.innerHTML = '';
  actions.forEach(a => {
    const cls = a.pri==='high' ? 'pri-high' : a.pri==='done' ? 'pri-done' : 'pri-medium';
    const lbl = a.pri==='high' ? '🔴 High' : a.pri==='done' ? '✅ Done' : '🟡 Medium';
    actionList.innerHTML += `
      <div class="action-item">
        <div class="action-icon">${a.icon}</div>
        <div style="flex:1">
          <div class="action-title">${a.title}</div>
          <div class="action-desc">${a.desc}</div>
        </div>
        <div class="action-pri ${cls}">${lbl}</div>
      </div>`;
  });
}

render();
</script>
</body>
</html>
