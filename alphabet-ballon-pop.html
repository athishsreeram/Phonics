<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Balloon Pop! 🎈</title>
<link rel="stylesheet" href="shared.css">
<style>
  body{overflow:hidden;}
  .game-canvas{position:relative;width:100%;height:calc(100vh - 200px);overflow:hidden;background:linear-gradient(180deg,#a8d8ea 0%,#e8f4f8 70%,#c8e6c9 100%);}
  .balloon{position:absolute;cursor:pointer;transition:transform 0.1s;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent;}
  .balloon:hover{transform:scale(1.08);}
  .balloon:active{transform:scale(0.88);}
  .balloon-body{width:70px;height:84px;border-radius:50% 50% 50% 50% / 55% 55% 45% 45%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:white;text-shadow:0 2px 6px rgba(0,0,0,0.25);box-shadow:inset -8px -12px 0 rgba(0,0,0,0.12),0 6px 18px rgba(0,0,0,0.18);position:relative;}
  .balloon-body::after{content:'';position:absolute;top:12px;left:12px;width:18px;height:14px;background:rgba(255,255,255,0.3);border-radius:50%;transform:rotate(-30deg);}
  .balloon-string{width:2px;height:24px;background:rgba(0,0,0,0.2);margin:0 auto;}
  .pop-anim{animation:pop 0.3s ease forwards;}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.5);opacity:0.7}100%{transform:scale(0);opacity:0}}
  .hud{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:white;border-bottom:2px solid var(--border);position:relative;z-index:10;}
  .hud-question{font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--primary);flex:1;text-align:center;}
  .hud-score{font-family:var(--font-display);font-size:1rem;font-weight:800;color:var(--primary);white-space:nowrap;}
  .replay-btn{width:100%;padding:16px;background:var(--primary);color:white;border:none;border-radius:16px;font-family:var(--font-display);font-size:1.2rem;font-weight:800;cursor:pointer;margin-top:10px;}
  .end-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:999;}
  .end-overlay.visible{display:flex;}
  .end-card{background:white;border-radius:28px;padding:36px 30px;text-align:center;max-width:300px;width:90%;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  .level-bar{display:flex;gap:8px;justify-content:center;padding:10px 16px;background:#faf9ff;border-top:2px solid var(--border);}
  .lv-btn{padding:6px 16px;border:2.5px solid var(--border);background:white;border-radius:14px;font-family:var(--font-display);font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .lv-btn.active,.lv-btn:hover{border-color:var(--primary);background:#f0ecff;color:var(--primary);}
  .hear-q-btn{padding:8px 18px;background:var(--primary);color:white;border:none;border-radius:12px;font-family:var(--font-display);font-size:0.85rem;font-weight:800;cursor:pointer;}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">
<div class="ph-header" style="padding:12px 16px">
  <h1 style="font-size:1.4rem">🎈 Balloon Pop!</h1>
</div>
<div class="hud">
  <div class="hud-score">⭐ <span id="score">0</span></div>
  <div class="hud-question" id="question">Loading…</div>
  <button class="hear-q-btn" onclick="repeatQ()">🔊</button>
</div>
<div class="game-canvas" id="game-canvas"></div>
<div class="level-bar">
  <button class="lv-btn active" id="lv-letter" onclick="setLevel('letter')">🔤 Letters</button>
  <button class="lv-btn" id="lv-sound" onclick="setLevel('sound')">🔊 Sounds</button>
  <button class="lv-btn" id="lv-cvc"   onclick="setLevel('cvc')">📝 CVC</button>
</div>
<div class="end-overlay" id="end-overlay">
  <div class="end-card">
    <div style="font-size:3.5rem">🎉</div>
    <div style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--primary);margin:10px 0">Round Done!</div>
    <div style="font-size:1.5rem;margin:8px 0">⭐ <span id="end-score">0</span></div>
    <div style="font-weight:700;color:var(--muted);margin:8px 0" id="end-msg"></div>
    <button class="replay-btn" onclick="restart()">▶ Play Again!</button>
  </div>
</div>
<script src="shared.js"></script>
<script>
const LEVELS={
  letter:{
    q:'Pop the balloon with the letter:',
    items:'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''),
    getTarget:()=>LEVELS.letter.items[Math.floor(Math.random()*26)],
    getLabel:(t)=>t,
    getWrong:(t)=>LEVELS.letter.items.filter(x=>x!==t).sort(()=>Math.random()-0.5).slice(0,4)
  },
  sound:{
    q:'Pop the balloon that starts with this sound:',
    items:[
      {l:'S',w:'sun'},{l:'A',w:'apple'},{l:'T',w:'tiger'},{l:'P',w:'pig'},{l:'I',w:'igloo'},
      {l:'N',w:'nest'},{l:'M',w:'moon'},{l:'D',w:'dog'},{l:'G',w:'goat'},{l:'O',w:'octopus'},
      {l:'C',w:'cat'},{l:'K',w:'kite'},{l:'B',w:'ball'},{l:'R',w:'rain'},{l:'F',w:'fish'},
      {l:'H',w:'hat'},{l:'J',w:'jar'},{l:'L',w:'lion'},{l:'W',w:'water'},{l:'E',w:'egg'},
    ],
    getTarget:()=>LEVELS.sound.items[Math.floor(Math.random()*LEVELS.sound.items.length)],
    getLabel:(t)=>t.l,
    getWrong:(t)=>LEVELS.sound.items.filter(x=>x.l!==t.l).sort(()=>Math.random()-0.5).slice(0,4).map(x=>x.l)
  },
  cvc:{
    q:'Pop the balloon with this word:',
    items:['cat','dog','sun','hat','pig','hen','cup','bed','bag','fox','ant','egg','map','bus','rat','pan','tin','log','mop','run'],
    getTarget:()=>LEVELS.cvc.items[Math.floor(Math.random()*LEVELS.cvc.items.length)],
    getLabel:(t)=>t,
    getWrong:(t)=>LEVELS.cvc.items.filter(x=>x!==t).sort(()=>Math.random()-0.5).slice(0,4)
  }
};
const COLORS=['#FF6B6B','#FF9F43','#FFD93D','#6BCB77','#4D96FF','#A29BFE','#FF6FCF','#54A0FF'];
let level='letter', target=null, score=0, total=0, balloons=[], gameActive=false, canvas;

function setLevel(l){
  level=l;
  document.querySelectorAll('.lv-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('lv-'+l).classList.add('active');
  restart();
}

function restart(){
  score=0;total=0;gameActive=true;
  document.getElementById('score').textContent=0;
  document.getElementById('end-overlay').classList.remove('visible');
  canvas=document.getElementById('game-canvas');
  canvas.innerHTML='';balloons=[];
  loadQuestion();
  spawnLoop();
}

function loadQuestion(){
  const cfg=LEVELS[level];
  target=cfg.getTarget();
  const label=typeof target==='object'?target.w:target;
  document.getElementById('question').textContent=cfg.q+' '+label;
  repeatQ();
  // Spawn correct + wrong balloons
  const wrongOptions=cfg.getWrong(target);
  const allOptions=[cfg.getLabel(target),...wrongOptions].sort(()=>Math.random()-0.5);
  canvas.innerHTML='';balloons=[];
  allOptions.slice(0,5).forEach((opt,i)=>spawnBalloon(opt, opt===cfg.getLabel(target)));
}

function spawnBalloon(label, isCorrect){
  const cw=canvas.clientWidth, ch=canvas.clientHeight;
  const el=document.createElement('div');
  el.className='balloon';
  const x=30+Math.random()*(cw-100);
  const y=30+Math.random()*(ch-140);
  el.style.cssText=`left:${x}px;top:${y}px;`;
  const color=COLORS[Math.floor(Math.random()*COLORS.length)];
  el.innerHTML=`
    <div class="balloon-body" style="background:${color}">${label}</div>
    <div class="balloon-string"></div>`;
  el.onclick=()=>tapBalloon(el, isCorrect, label);
  canvas.appendChild(el);
  balloons.push({el, isCorrect, label});
  // Gentle float animation
  let dir=Math.random()<0.5?1:-1, amp=20+Math.random()*20, spd=0.5+Math.random()*0.8;
  let t=Math.random()*Math.PI*2;
  const base=y;
  function float(){
    if(!el.parentNode)return;
    t+=spd*0.03;
    el.style.top=(base+Math.sin(t)*amp)+'px';
    requestAnimationFrame(float);
  }
  float();
}

function spawnLoop(){
  // respawn after some time if balloons get too low
  setInterval(()=>{if(!gameActive)return;},8000);
}

function tapBalloon(el, correct, label){
  if(!gameActive)return;
  speak(label, 0.78);
  el.classList.add('pop-anim');
  if(correct){
    score++;total++;
    document.getElementById('score').textContent=score;
    awardStars('balloon-pop',1);
    // pop sound visual
    const boom=document.createElement('div');
    const r=el.getBoundingClientRect(), cr=canvas.getBoundingClientRect();
    boom.style.cssText=`position:absolute;left:${r.left-cr.left}px;top:${r.top-cr.top}px;font-size:2.5rem;pointer-events:none;animation:pop 0.5s ease forwards;z-index:10`;
    boom.textContent='💥';canvas.appendChild(boom);
    setTimeout(()=>boom.remove(),500);
    speak('Pop! Great job!',0.9);
    setTimeout(()=>{el.remove();if(total>=10){endRound();}else{loadQuestion();}},350);
  } else {
    // shake balloon, don't remove
    el.style.animation='shake 0.4s ease';
    setTimeout(()=>el.style.animation='',500);
    speak('Try again! Find '+( typeof target==='object'?target.w:target)+'!',0.85);
  }
}

function repeatQ(){
  const cfg=LEVELS[level];
  const label=typeof target==='object'?target.w:target;
  speak(cfg.q+' '+label, 0.82);
}

function endRound(){
  gameActive=false;
  const pct=score/10;
  document.getElementById('end-score').textContent=score+'/10';
  document.getElementById('end-msg').textContent=pct>=0.8?'Amazing popping! 🌟':'Good try! Pop faster! 💪';
  document.getElementById('end-overlay').classList.add('visible');
  if(score>=8){markComplete('balloon-pop');confetti();}
  speak((pct>=0.8?'Amazing!':'Good try!')+'You popped '+score+' out of 10 correct balloons!',0.85);
}

document.addEventListener('DOMContentLoaded',()=>{
  canvas=document.getElementById('game-canvas');
  injectMascot(["Pop the balloon with the right letter! 🦉","Tap the speaker to hear the letter again! 🔊","Pop 10 to finish the round! 🎈"]);
  restart();
});
</script>
</body>
</html>
