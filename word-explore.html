<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Word Explorer 🌟</title>
<link rel="stylesheet" href="shared.css">
<style>
  .search-bar{display:flex;gap:10px;margin:14px 0;}
  .search-input{flex:1;padding:14px 18px;border:2.5px solid var(--border);border-radius:14px;font-family:var(--font-display);font-size:1.2rem;font-weight:700;outline:none;transition:border-color 0.2s;}
  .search-input:focus{border-color:var(--primary);}
  .search-btn{padding:14px 20px;background:var(--primary);color:white;border:none;border-radius:14px;font-family:var(--font-display);font-size:1rem;font-weight:800;cursor:pointer;transition:all 0.15s;}
  .search-btn:active{transform:scale(0.95);}
  .result-box{background:white;border:2.5px solid var(--border);border-radius:22px;padding:24px 20px;margin:14px 0;display:none;}
  .result-box.visible{display:block;animation:fadeIn 0.3s ease;}
  .rb-word{font-family:var(--font-display);font-size:3rem;font-weight:800;color:var(--primary);text-align:center;}
  .rb-phoneme{text-align:center;margin:8px 0;}
  .phoneme-chip{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:2.5px solid var(--border);border-radius:10px;font-family:var(--font-display);font-size:1.2rem;font-weight:800;margin:3px;cursor:pointer;transition:all 0.15s;}
  .phoneme-chip:hover{transform:translateY(-3px);border-color:var(--primary);}
  .phoneme-chip.vowel{border-color:#ffcdd2;color:var(--vowel);background:#fff5f5;}
  .phoneme-chip.cons{border-color:#bbdefb;color:var(--consonant);}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0;}
  .info-card{background:#faf9ff;border:2px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
  .ic-label{font-size:0.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
  .ic-value{font-family:var(--font-display);font-size:1.3rem;font-weight:800;color:var(--primary);}
  .rhyme-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
  .rhyme-chip{background:white;border:2px solid var(--border);border-radius:10px;padding:8px 14px;font-family:var(--font-display);font-size:0.95rem;font-weight:800;cursor:pointer;transition:all 0.15s;touch-action:manipulation;}
  .rhyme-chip:hover{transform:translateY(-2px);border-color:var(--primary);}
  .history-section{margin:20px 0;}
  .hs-title{font-family:var(--font-display);font-size:0.9rem;font-weight:800;color:var(--muted);margin-bottom:8px;}
  .history-chips{display:flex;flex-wrap:wrap;gap:8px;}
  .hc{background:white;border:2px solid var(--border);border-radius:10px;padding:6px 12px;font-family:var(--font-display);font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.15s;}
  .hc:hover{border-color:var(--primary);}
  .wotd-box{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:20px;padding:20px;text-align:center;margin:14px 0;color:white;}
  .wotd-label{font-size:0.78rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;opacity:0.85;margin-bottom:6px;}
  .wotd-word{font-family:var(--font-display);font-size:2.2rem;font-weight:800;cursor:pointer;}
  .wotd-def{font-size:0.88rem;font-weight:600;opacity:0.9;margin-top:6px;}
  .syllable-display{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;margin:8px 0;}
  .syl-part{font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--primary);padding:4px 8px;border-radius:8px;cursor:pointer;}
  .syl-dot{color:var(--muted);font-size:1.2rem;font-weight:800;}
</style>
</head>
<body>
<div class="ph-header">
  <h1>🌟 Word Explorer</h1>
  <p>Type any word to learn all about it!</p>
</div>
<div class="ph-wrap">
  <div class="wotd-box">
    <div class="wotd-label">⭐ Word of the Day</div>
    <div class="wotd-word" id="wotd-word" onclick="exploreWotd()">butterfly</div>
    <div class="wotd-def" id="wotd-def">A beautiful insect with colourful wings 🦋</div>
  </div>

  <div class="search-bar">
    <input class="search-input" id="search-input" type="text" placeholder="Type a word…" maxlength="20"
      onkeydown="if(event.key==='Enter')explore()">
    <button class="search-btn" onclick="explore()">🔍</button>
  </div>

  <div class="result-box" id="result-box">
    <div class="rb-word" id="rb-word"></div>
    <div style="text-align:center;margin:10px 0">
      <button class="ph-btn ph-btn-primary" onclick="hearWord()">🔊 Hear Word</button>
      <button class="ph-btn ph-btn-outline" onclick="hearSlow()">🐢 Slowly</button>
    </div>
    <hr class="ph-divider">
    <div class="ph-section-title">🔡 Letters</div>
    <div class="rb-phoneme" id="rb-phoneme"></div>
    <div class="info-grid">
      <div class="info-card"><div class="ic-label">Letters</div><div class="ic-value" id="letter-count">-</div></div>
      <div class="info-card"><div class="ic-label">Syllables</div><div class="ic-value" id="syl-count">-</div></div>
      <div class="info-card"><div class="ic-label">Vowels</div><div class="ic-value" id="vowel-count">-</div></div>
      <div class="info-card"><div class="ic-label">Consonants</div><div class="ic-value" id="cons-count">-</div></div>
    </div>
    <div class="ph-section-title">🔗 Syllable Break</div>
    <div class="syllable-display" id="syl-display"></div>
    <div class="ph-section-title">🎵 Rhyming Words</div>
    <div class="rhyme-row" id="rhyme-row"></div>
    <div class="ph-section-title">👪 Word Family</div>
    <div class="rhyme-row" id="family-row"></div>
  </div>

  <div class="history-section" id="history-section" style="display:none">
    <div class="hs-title">🕐 Recent Words</div>
    <div class="history-chips" id="history-chips"></div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const WOTD=[
  {w:'butterfly',d:'A beautiful insect with colourful wings 🦋'},
  {w:'rainbow',  d:'Coloured arch of light after rain 🌈'},
  {w:'elephant', d:'The largest land animal with a trunk 🐘'},
  {w:'sunshine', d:'Warm bright light from the sun ☀️'},
  {w:'adventure',d:'An exciting journey or experience 🗺️'},
  {w:'wonderful',d:'Something extremely good or beautiful 🌟'},
  {w:'discovery', d:'Finding something new and exciting 🔭'},
];
const RHYME_MAP={
  cat:['bat','hat','mat','rat','sat','flat','chat'],
  dog:['log','frog','fog','hog','jog','blog'],
  sun:['run','fun','bun','gun','nun','ton','gun'],
  day:['play','say','way','hay','bay','pay','ray'],
  tree:['bee','see','free','knee','tea','sea','me'],
  cake:['lake','make','rake','sake','take','wake','bake'],
  fish:['dish','wish','swish'],
  star:['car','bar','far','jar','tar','guitar'],
  rain:['train','plain','main','chain','brain','drain'],
  night:['light','right','fight','sight','tight','bright'],
};
const FAMILY_MAP={
  cat:['cats','catch','catfish','catnap'],
  run:['runner','running','ran','runs'],
  play:['plays','played','playing','player','playground'],
  rain:['rainy','rainbow','rainfall','raincoat'],
  sun:['sunny','sunlight','sunshine','sunflower'],
  star:['stars','starfish','starlight','starry'],
  tree:['trees','treetop','treehouse'],
  fish:['fishes','fishing','fisherman','fishy'],
};

let history=[], wotdIdx=Math.floor(Math.random()*WOTD.length), currentWord='';

function exploreWotd(){exploreWord(WOTD[wotdIdx].w);}

function explore(){
  const w=document.getElementById('search-input').value.trim().toLowerCase().replace(/[^a-z]/g,'');
  if(!w){speak('Please type a word first!',0.85);return;}
  exploreWord(w);
}

function exploreWord(w){
  currentWord=w;
  document.getElementById('search-input').value=w;
  document.getElementById('result-box').classList.add('visible');
  document.getElementById('rb-word').textContent=w;
  // Letters
  const letters=w.split('');
  const vowels=letters.filter(l=>'aeiou'.includes(l));
  const cons=letters.filter(l=>!'aeiou'.includes(l));
  document.getElementById('letter-count').textContent=letters.length;
  document.getElementById('vowel-count').textContent=vowels.length;
  document.getElementById('cons-count').textContent=cons.length;
  // Phoneme chips
  document.getElementById('rb-phoneme').innerHTML=letters.map(l=>{
    const isV='aeiou'.includes(l);
    return `<span class="phoneme-chip ${isV?'vowel':'cons'}" onclick="speak('${l}',0.65)">${l}</span>`;
  }).join('');
  // Syllables (rough heuristic)
  const syls=splitSyllables(w);
  document.getElementById('syl-count').textContent=syls.length;
  document.getElementById('syl-display').innerHTML=syls.map((s,i)=>`
    <span class="syl-part" onclick="speak('${s}',0.7)" style="background:hsl(${i*60+230},60%,94%)">${s}</span>
    ${i<syls.length-1?'<span class="syl-dot">·</span>':''}`).join('');
  // Rhymes
  const rhymes=RHYME_MAP[w]||(RHYME_MAP[Object.keys(RHYME_MAP).find(k=>w.endsWith(k.slice(-2)))]||['(type a common word!)']).slice(0,6);
  document.getElementById('rhyme-row').innerHTML=rhymes.map(r=>`
    <div class="rhyme-chip" onclick="speak('${r}',0.72)">${r}</div>`).join('');
  // Family
  const family=FAMILY_MAP[w]||[];
  document.getElementById('family-row').innerHTML=family.length
    ? family.map(f=>`<div class="rhyme-chip" onclick="speak('${f}',0.72)">${f}</div>`).join('')
    : '<span style="color:var(--muted);font-size:0.85rem;font-weight:700">No family found for this word</span>';
  hearWord();
  addHistory(w);
  awardStars('word-explore',1);
}

function splitSyllables(w){
  // simple heuristic: split on vowel clusters
  const vowels='aeiou';
  let syls=[],cur='',lastWasVowel=false;
  for(let i=0;i<w.length;i++){
    const isV=vowels.includes(w[i]);
    cur+=w[i];
    if(lastWasVowel&&!isV&&i<w.length-1&&vowels.includes(w[i+1])){syls.push(cur);cur='';}
    lastWasVowel=isV;
  }
  if(cur)syls.push(cur);
  return syls.length?syls:[w];
}

function hearWord(){speak(currentWord,0.78);}
function hearSlow() {speak(currentWord.split('').join('... '),0.6);}

function addHistory(w){
  history=history.filter(h=>h!==w);history.unshift(w);if(history.length>8)history.pop();
  const sec=document.getElementById('history-section');
  sec.style.display='block';
  document.getElementById('history-chips').innerHTML=history.map(h=>`
    <div class="hc" onclick="exploreWord('${h}')">${h}</div>`).join('');
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('wotd-word').textContent=WOTD[wotdIdx].w;
  document.getElementById('wotd-def').textContent=WOTD[wotdIdx].d;
  injectMascot(["Type any word to explore it! 🦉","Tap the letter chips to hear each sound!","Tap rhyming words to hear them! 🎵"]);
  speak("Word Explorer! Type any word and I will tell you all about it!",0.85);
});
</script>
</body>
</html>
