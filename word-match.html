<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Word Match 🎯</title>
<link rel="stylesheet" href="shared.css">
<style>
  .level-sel{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
  .ls-btn{padding:7px 18px;border:2.5px solid var(--border);background:white;border-radius:20px;font-family:var(--font-display);font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .ls-btn.active,.ls-btn:hover{border-color:var(--primary);background:#f0ecff;color:var(--primary);}
  .match-box{background:white;border:2.5px solid var(--border);border-radius:22px;padding:24px 20px;margin:14px 0;text-align:center;}
  .mb-q{font-family:var(--font-display);font-size:1rem;font-weight:800;color:var(--primary);margin-bottom:14px;}
  .hear-btn{width:100px;height:100px;border-radius:50%;border:none;font-size:2.4rem;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-light));box-shadow:0 6px 22px rgba(108,63,197,0.35);transition:transform 0.15s;display:block;margin:0 auto 18px;}
  .hear-btn:active{transform:scale(0.9);}
  .hear-btn.playing{animation:pulse 0.7s ease infinite;}
  .pic-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:12px 0;}
  .pic-card{background:white;border:3px solid var(--border);border-radius:20px;padding:20px 14px;text-align:center;cursor:pointer;transition:all 0.18s;touch-action:manipulation;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
  .pic-card:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 8px 24px rgba(108,63,197,0.16);}
  .pic-card:active{transform:scale(0.93);}
  .pic-card.correct{border-color:var(--success);background:#f0faf4;}
  .pic-card.wrong{border-color:var(--danger);background:#fff5f5;}
  .pc-emoji{font-size:3rem;display:block;}
  .pc-word{font-family:var(--font-display);font-size:1rem;font-weight:800;color:var(--text);}
  .round-info{font-family:var(--font-display);font-size:0.9rem;font-weight:800;color:var(--muted);text-align:center;margin:8px 0;}
  .stars-earned{font-size:1.8rem;text-align:center;margin:8px 0;}
  .end-box{background:white;border:2.5px solid var(--border);border-radius:20px;padding:28px 20px;text-align:center;display:none;}
  .end-box.visible{display:block;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  .fb-line{font-family:var(--font-display);font-size:1rem;font-weight:800;min-height:28px;margin:8px 0;text-align:center;}
</style>
</head>
<body>
<div class="ph-header">
  <h1>🎯 Word Match</h1>
  <p>Hear a word — tap the matching picture!</p>
  <span class="ph-stage-badge">Stage 5</span>
</div>
<div class="ph-wrap">
  <div class="level-sel">
    <button class="ls-btn active" id="lv-1" onclick="setLevel(1)">🟢 Easy (CVC)</button>
    <button class="ls-btn" id="lv-2" onclick="setLevel(2)">🟡 Medium (Blends)</button>
    <button class="ls-btn" id="lv-3" onclick="setLevel(3)">🔴 Hard (Sight Words)</button>
  </div>
  <div class="round-info">Round <span id="rnd">1</span>/10 &nbsp;·&nbsp; ⭐ <span id="sc">0</span></div>
  <div class="match-box" id="match-box">
    <div class="mb-q">Listen then tap the right picture!</div>
    <button class="hear-btn" id="hear-btn" onclick="playTarget()">🔊</button>
    <div class="pic-grid" id="pic-grid"></div>
    <div class="fb-line" id="fb-line"></div>
  </div>
  <div class="end-box" id="end-box">
    <div style="font-size:4rem" id="end-emoji">🎉</div>
    <div style="font-family:var(--font-display);font-size:1.6rem;font-weight:800;color:var(--primary);margin:10px 0" id="end-title">Well done!</div>
    <div class="stars-earned" id="end-stars">⭐⭐⭐</div>
    <div style="font-weight:700;color:var(--muted);margin:10px 0" id="end-score"></div>
    <div class="ph-btn-row">
      <button class="ph-btn ph-btn-primary" onclick="restart()">🔄 Play Again</button>
      <a class="ph-btn ph-btn-outline" href="index.html">🏠 Hub</a>
    </div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const LEVELS={
  1:[
    {word:'cat',emoji:'🐱'},{word:'dog',emoji:'🐶'},{word:'sun',emoji:'☀️'},
    {word:'hat',emoji:'🎩'},{word:'fish',emoji:'🐟'},{word:'pig',emoji:'🐷'},
    {word:'hen',emoji:'🐔'},{word:'cup',emoji:'☕'},{word:'bed',emoji:'🛏️'},
    {word:'bag',emoji:'👜'},{word:'bus',emoji:'🚌'},{word:'ant',emoji:'🐜'},
    {word:'egg',emoji:'🥚'},{word:'fox',emoji:'🦊'},{word:'map',emoji:'🗺️'},
  ],
  2:[
    {word:'star',emoji:'⭐'},{word:'frog',emoji:'🐸'},{word:'drum',emoji:'🥁'},
    {word:'crab',emoji:'🦀'},{word:'flag',emoji:'🚩'},{word:'train',emoji:'🚂'},
    {word:'grape',emoji:'🍇'},{word:'cloud',emoji:'☁️'},{word:'slide',emoji:'🛝'},
    {word:'plane',emoji:'✈️'},{word:'crown',emoji:'👑'},{word:'smile',emoji:'😊'},
    {word:'snow',emoji:'❄️'},{word:'spider',emoji:'🕷️'},{word:'bridge',emoji:'🌉'},
  ],
  3:[
    {word:'the',emoji:'📖'},{word:'and',emoji:'➕'},{word:'can',emoji:'🥫'},
    {word:'jump',emoji:'🏃'},{word:'little',emoji:'🔍'},{word:'look',emoji:'👀'},
    {word:'play',emoji:'🎮'},{word:'big',emoji:'🏔️'},{word:'red',emoji:'🔴'},
    {word:'blue',emoji:'🔵'},{word:'eat',emoji:'🍽️'},{word:'run',emoji:'🏃'},
    {word:'good',emoji:'👍'},{word:'love',emoji:'❤️'},{word:'fun',emoji:'🎉'},
  ]
};
let curLevel=1,qNum=0,score=0,target=null,pool=[];

function setLevel(l){
  curLevel=l;[1,2,3].forEach(n=>document.getElementById('lv-'+n).classList.toggle('active',n===l));
  restart();
}
function restart(){
  qNum=0;score=0;
  document.getElementById('match-box').style.display='block';
  document.getElementById('end-box').classList.remove('visible');
  document.getElementById('sc').textContent=0;
  pool=[...LEVELS[curLevel]].sort(()=>Math.random()-0.5);
  loadQuestion();
}
function loadQuestion(){
  if(qNum>=10){showEnd();return;}
  document.getElementById('rnd').textContent=qNum+1;
  document.getElementById('fb-line').textContent='';
  target=pool[qNum%pool.length];
  // 3 wrong distractors
  const others=LEVELS[curLevel].filter(w=>w.word!==target.word).sort(()=>Math.random()-0.5).slice(0,3);
  const all=[target,...others].sort(()=>Math.random()-0.5);
  document.getElementById('pic-grid').innerHTML=all.map(item=>`
    <div class="pic-card" onclick="checkAnswer(this,'${item.word}')">
      <span class="pc-emoji">${item.emoji}</span>
      <span class="pc-word">${item.word}</span>
    </div>`).join('');
  setTimeout(()=>playTarget(),400);
}
function playTarget(){
  const btn=document.getElementById('hear-btn');
  btn.classList.add('playing');
  speak(target.word,0.72,1.1,()=>btn.classList.remove('playing'));
}
function checkAnswer(el,word){
  document.querySelectorAll('.pic-card').forEach(c=>c.onclick=null);
  if(word===target.word){
    el.classList.add('correct');score++;
    document.getElementById('sc').textContent=score;
    document.getElementById('fb-line').textContent='✅ Yes! That is '+target.word+'!';
    speak('Yes! '+target.word+'! '+target.emoji,0.85);
    awardStars('word-match',1);
    qNum++;setTimeout(loadQuestion,1600);
  } else {
    el.classList.add('wrong');shakeWrong(el);
    document.getElementById('fb-line').textContent='Try again! Listen again…';
    speak(target.word,0.65);
    setTimeout(()=>{
      document.querySelectorAll('.pic-card').forEach(c=>c.onclick=function(){checkAnswer(this,c.querySelector('.pc-word').textContent);});
    },1000);
  }
}
function showEnd(){
  document.getElementById('match-box').style.display='none';
  const pct=score/10;
  const stars=pct>=0.9?3:pct>=0.7?2:1;
  document.getElementById('end-emoji').textContent=pct>=0.8?'🌟':'🎉';
  document.getElementById('end-title').textContent=pct>=0.9?'Excellent! 🌟':pct>=0.7?'Great Job! 🎉':'Keep Practising! 💪';
  document.getElementById('end-stars').textContent='⭐'.repeat(stars);
  document.getElementById('end-score').textContent='You got '+score+' out of 10 correct!';
  document.getElementById('end-box').classList.add('visible');
  confetti();markComplete('word-match');awardStars('word-match',stars);
  speak(document.getElementById('end-title').textContent);
}
document.addEventListener('DOMContentLoaded',()=>{
  restart();
  injectMascot(["Listen to the word, then tap the picture! 🦉","Tap the speaker to hear again! 🔊","Try Medium and Hard levels too! 🎯"]);
  speak("Word match! I will say a word — tap the right picture!",0.85);
});
</script>
</body>
</html>
