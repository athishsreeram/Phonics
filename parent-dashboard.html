<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Parent Dashboard 👨‍👩‍👧</title>
<link rel="stylesheet" href="shared.css">
<style>
  .lock-screen{display:flex;align-items:center;justify-content:center;min-height:70vh;flex-direction:column;gap:20px;text-align:center;padding:20px;}
  .lock-icon{font-size:5rem;}
  .lock-title{font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--primary);}
  .pin-dots{display:flex;gap:14px;justify-content:center;margin:10px 0;}
  .pin-dot{width:20px;height:20px;border-radius:50%;border:3px solid var(--border);background:white;transition:background 0.2s;}
  .pin-dot.filled{background:var(--primary);border-color:var(--primary);}
  .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;width:100%;}
  .pin-btn{height:64px;border:2.5px solid var(--border);background:white;border-radius:14px;font-family:var(--font-display);font-size:1.4rem;font-weight:800;cursor:pointer;transition:all 0.15s;}
  .pin-btn:hover{border-color:var(--primary);background:#f0ecff;}
  .pin-btn:active{transform:scale(0.92);}
  .pin-error{color:var(--danger);font-weight:800;font-size:0.9rem;min-height:24px;}
  .pin-hint{font-size:0.78rem;color:var(--muted);font-weight:700;}
  .dashboard{display:none;padding:0 0 80px;}
  .dashboard.visible{display:block;}
  .dash-section{background:white;border:2.5px solid var(--border);border-radius:20px;padding:20px;margin:14px 0;}
  .ds-title{font-family:var(--font-display);font-size:1.05rem;font-weight:800;color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .module-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
  .module-row:last-child{border-bottom:none;}
  .mr-icon{font-size:1.4rem;width:32px;text-align:center;}
  .mr-name{font-family:var(--font-display);font-size:0.9rem;font-weight:800;flex:1;}
  .mr-bar{flex:2;height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
  .mr-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:5px;transition:width 0.6s ease;}
  .mr-pct{font-size:0.78rem;font-weight:800;color:var(--muted);width:36px;text-align:right;}
  .mr-done{font-size:1rem;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0;}
  .stat-box{background:#faf9ff;border:2px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;}
  .sb-n{font-family:var(--font-display);font-size:1.8rem;font-weight:800;color:var(--primary);}
  .sb-l{font-size:0.68rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;}
  .alert-box{background:#fff8ed;border:2.5px solid #ffd9a0;border-radius:14px;padding:14px;margin:10px 0;}
  .ab-title{font-family:var(--font-display);font-size:0.88rem;font-weight:800;color:#9a6c00;margin-bottom:6px;}
  .tip-item{font-size:0.82rem;font-weight:700;color:var(--text);padding:3px 0;display:flex;gap:6px;}
  .action-row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;}
</style>
</head>
<body>
<div class="ph-header">
  <h1>👨‍👩‍👧 Parent Dashboard</h1>
  <p>Track your child's phonics progress</p>
</div>

<!-- LOCK SCREEN -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-icon">🔐</div>
  <div class="lock-title">Parent Area</div>
  <p style="font-weight:700;color:var(--muted);font-size:0.9rem;max-width:260px">Enter your 4-digit PIN to view progress reports.</p>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad" id="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinPress('')" style="font-size:1rem;">✕ Clear</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="submitPin()" style="background:var(--primary);color:white;border-color:var(--primary)">✓ OK</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-hint">Default PIN: 1234 — change it in the dashboard</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div style="max-width:680px;margin:0 auto;padding:0 14px">

    <div class="action-row">
      <button class="ph-btn ph-btn-outline" onclick="lockDash()">🔒 Lock</button>
      <button class="ph-btn ph-btn-outline" onclick="changePin()">🔑 Change PIN</button>
      <button class="ph-btn ph-btn-danger"  onclick="resetAll()">🗑️ Reset Progress</button>
    </div>

    <!-- Overview stats -->
    <div class="dash-section">
      <div class="ds-title">📊 Overview</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="sb-n" id="ov-stars">0</div><div class="sb-l">Total Stars</div></div>
        <div class="stat-box"><div class="sb-n" id="ov-modules">0</div><div class="sb-l">Completed</div></div>
        <div class="stat-box"><div class="sb-n" id="ov-alpha">0</div><div class="sb-l">Letters Known</div></div>
      </div>
    </div>

    <!-- Module progress -->
    <div class="dash-section">
      <div class="ds-title">📈 Module Progress</div>
      <div id="module-list"></div>
    </div>

    <!-- Alerts -->
    <div class="alert-box" id="alert-box">
      <div class="ab-title">💡 Suggestions for Your Child</div>
      <div id="alert-tips"></div>
    </div>

    <!-- Alphabet mastery -->
    <div class="dash-section">
      <div class="ds-title">🔤 Alphabet Mastery</div>
      <div id="alpha-grid" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    </div>

  </div>
</div>

<script src="shared.js"></script>
<script>
const DEFAULT_PIN='1234';
let pinEntry='';

function pinPress(d){
  if(d===''){pinEntry='';updateDots();return;}
  if(pinEntry.length>=4)return;
  pinEntry+=d;updateDots();
  if(pinEntry.length===4)setTimeout(submitPin,200);
}
function updateDots(){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled',i<pinEntry.length);
  }
}
function submitPin(){
  const saved=localStorage.getItem('ph_parent_pin')||DEFAULT_PIN;
  if(pinEntry===saved){showDash();}
  else{document.getElementById('pin-error').textContent='Wrong PIN! Try again.';pinEntry='';updateDots();}
}
function showDash(){
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('dashboard').classList.add('visible');
  loadDash();
}
function lockDash(){
  document.getElementById('dashboard').classList.remove('visible');
  document.getElementById('lock-screen').style.display='flex';
  pinEntry='';updateDots();
}
function changePin(){
  const np=prompt('Enter new 4-digit PIN:');
  if(np&&/^\d{4}$/.test(np)){localStorage.setItem('ph_parent_pin',np);alert('PIN changed to '+np);}
  else alert('PIN must be exactly 4 digits.');
}
function resetAll(){
  if(confirm('Reset ALL progress? This cannot be undone.')){
    ['ph_stars','ph_progress','ph_alpha_mastery','ph_set1_mastery','ph_set2_mastery',
     'ph_traced','ph_sight_known','ph_digraph_done'].forEach(k=>localStorage.removeItem(k));
    alert('All progress reset!');loadDash();
  }
}

const MODULES=[
  {id:'alphabet',name:'Alphabet A–Z',icon:'🔤'},
  {id:'phonic-set1',name:'Phonic Set 1',icon:'1️⃣'},
  {id:'phonic-set2',name:'Phonic Set 2',icon:'2️⃣'},
  {id:'vowels',name:'Vowels',icon:'🗣️'},
  {id:'cvc',name:'CVC Words',icon:'🔠'},
  {id:'rhyme',name:'Rhyme Time',icon:'🎵'},
  {id:'listen-choose',name:'Listen & Choose',icon:'👂'},
  {id:'digraphs',name:'Digraphs',icon:'🔠'},
  {id:'digraph-fill',name:'Digraph Test',icon:'✏️'},
  {id:'blends',name:'Consonant Blends',icon:'🔡'},
  {id:'magic-e',name:'Magic E',icon:'✨'},
  {id:'long-vowel',name:'Long Vowels',icon:'🔆'},
  {id:'sight-words',name:'Sight Words',icon:'👁️'},
  {id:'read',name:'Read Practice',icon:'📗'},
  {id:'read2',name:'Read + Voice',icon:'🎙️'},
  {id:'story',name:'Mini Stories',icon:'📖'},
  {id:'word-match',name:'Word Match',icon:'🎯'},
  {id:'trace',name:'Letter Tracing',icon:'✍️'},
  {id:'sentence-builder',name:'Sentence Builder',icon:'🧩'},
];

function loadDash(){
  const prog=JSON.parse(localStorage.getItem('ph_progress')||'{}');
  const stars=parseInt(localStorage.getItem('ph_stars')||'0');
  const alphaMastery=JSON.parse(localStorage.getItem('ph_alpha_mastery')||'{}');
  const alphaKnown=Object.values(alphaMastery).filter(v=>v>=3).length;
  const sightKnown=Object.keys(JSON.parse(localStorage.getItem('ph_sight_known')||'{}')).length;
  const completed=MODULES.filter(m=>prog[m.id+'_done']).length;

  document.getElementById('ov-stars').textContent=stars;
  document.getElementById('ov-modules').textContent=completed+'/'+MODULES.length;
  document.getElementById('ov-alpha').textContent=alphaKnown+'/26';

  // Module list
  const list=document.getElementById('module-list');
  list.innerHTML=MODULES.map(m=>{
    const done=prog[m.id+'_done'];
    const stars_m=prog[m.id]||0;
    const pct=done?100:Math.min(Math.round((stars_m/3)*100),99);
    return `<div class="module-row">
      <span class="mr-icon">${m.icon}</span>
      <span class="mr-name">${m.name}</span>
      <div class="mr-bar"><div class="mr-fill" style="width:${pct}%"></div></div>
      <span class="mr-pct">${pct}%</span>
      <span class="mr-done">${done?'✅':'⬜'}</span>
    </div>`;
  }).join('');

  // Tips
  const weak=MODULES.filter(m=>!prog[m.id+'_done']).slice(0,3);
  document.getElementById('alert-tips').innerHTML=weak.map(m=>
    `<div class="tip-item">▶ <span>Practise <b>${m.name}</b> — not yet completed</span></div>`
  ).join('')||'<div class="tip-item">🌟 All modules completed! Amazing progress!</div>';

  // Alphabet grid
  const ALPHA='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  document.getElementById('alpha-grid').innerHTML=ALPHA.map(l=>{
    const taps=alphaMastery[l]||0;
    const col=taps>=3?'#27ae60':taps>=1?'#f59e2e':'#e0e0e0';
    return `<div style="width:32px;height:32px;border-radius:8px;background:${col};display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:0.88rem;font-weight:800;color:white" title="${l}: ${taps}/3 taps">${l}</div>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded',()=>{
  // remove home button injected by shared.js - not needed on this page for lock screen
});
</script>
</body>
</html>
