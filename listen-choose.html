<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Listen & Choose 👂</title>
<link rel="stylesheet" href="shared.css">
<style>
  .mode-tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0;}
  .mt{padding:8px 18px;border:2.5px solid var(--border);background:white;border-radius:20px;font-family:var(--font-display);font-size:0.88rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .mt.active,.mt:hover{border-color:var(--primary);background:#f0ecff;color:var(--primary);}
  .listen-box{background:white;border:2.5px solid var(--border);border-radius:22px;padding:28px 20px;margin:14px 0;text-align:center;}
  .lb-q{font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--primary);margin-bottom:16px;}
  .lb-word{font-family:var(--font-display);font-size:2.5rem;font-weight:800;color:var(--text);margin:16px 0;}
  .lb-emoji{font-size:4rem;display:block;margin:10px 0;}
  .play-btn{width:90px;height:90px;border-radius:50%;border:none;font-size:2.2rem;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-light));box-shadow:0 6px 20px rgba(108,63,197,0.35);transition:transform 0.15s;margin:10px 0;}
  .play-btn:active{transform:scale(0.92);}
  .choices-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;}
  .choice-big{min-height:100px;border:3px solid var(--border);background:white;border-radius:20px;font-family:var(--font-display);font-size:2rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all 0.18s;touch-action:manipulation;padding:14px;}
  .choice-big:hover{transform:translateY(-4px);border-color:var(--primary);}
  .choice-big:active{transform:scale(0.93);}
  .choice-big.correct{border-color:var(--success);background:#f0faf4;}
  .choice-big.wrong{border-color:var(--danger);background:#fff5f5;}
  .choice-big .ch-label{font-size:0.9rem;color:var(--muted);}
  .choices-4{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
  .progress-badge{background:white;border:2px solid var(--border);border-radius:14px;padding:8px 20px;display:inline-block;font-family:var(--font-display);font-size:0.9rem;font-weight:800;color:var(--primary);margin:8px 0;}
  .fb-msg{font-family:var(--font-display);font-size:1rem;font-weight:800;min-height:28px;margin:8px 0;text-align:center;}
</style>
</head>
<body>
<div class="ph-header">
  <h1>👂 Listen &amp; Choose</h1>
  <p>Hear the sound — pick the right answer!</p>
  <span class="ph-stage-badge">Stage 2</span>
</div>
<div class="ph-wrap">
  <div style="text-align:center">
    <div class="progress-badge">⭐ Score: <span id="sc-num">0</span> / <span id="sc-tot">0</span></div>
  </div>
  <div class="mode-tabs">
    <button class="mt active" id="m-start" onclick="setMode('start')">▶ Start Sound</button>
    <button class="mt" id="m-end"   onclick="setMode('end')">End Sound ◀</button>
    <button class="mt" id="m-vowel" onclick="setMode('vowel')">Middle Vowel</button>
  </div>
  <div class="listen-box">
    <div class="lb-q" id="lb-q">Does SUN start with S or T?</div>
    <span class="lb-emoji" id="lb-emoji">☀️</span>
    <button class="play-btn" onclick="playWord()">🔊</button>
    <div class="choices-2" id="choices-box"></div>
    <div class="fb-msg" id="fb-msg"></div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const MODES={
  start:{
    label:'Which sound does this word START with?',
    items:[
      {word:'sun',emoji:'☀️',correct:'S',wrong:'T'},
      {word:'cat',emoji:'🐱',correct:'C',wrong:'K'},
      {word:'dog',emoji:'🐶',correct:'D',wrong:'B'},
      {word:'fish',emoji:'🐟',correct:'F',wrong:'V'},
      {word:'hat',emoji:'🎩',correct:'H',wrong:'W'},
      {word:'pig',emoji:'🐷',correct:'P',wrong:'B'},
      {word:'map',emoji:'🗺️',correct:'M',wrong:'N'},
      {word:'run',emoji:'🏃',correct:'R',wrong:'L'},
      {word:'bee',emoji:'🐝',correct:'B',wrong:'D'},
      {word:'log',emoji:'🪵',correct:'L',wrong:'R'},
      {word:'net',emoji:'🥅',correct:'N',wrong:'M'},
      {word:'kite',emoji:'🪁',correct:'K',wrong:'G'},
      {word:'van',emoji:'🚐',correct:'V',wrong:'F'},
      {word:'zip',emoji:'🤐',correct:'Z',wrong:'S'},
      {word:'jam',emoji:'🍯',correct:'J',wrong:'G'},
    ]
  },
  end:{
    label:'Which sound does this word END with?',
    items:[
      {word:'cat',emoji:'🐱',correct:'T',wrong:'D'},
      {word:'dog',emoji:'🐶',correct:'G',wrong:'K'},
      {word:'sun',emoji:'☀️',correct:'N',wrong:'M'},
      {word:'map',emoji:'🗺️',correct:'P',wrong:'B'},
      {word:'bed',emoji:'🛏️',correct:'D',wrong:'T'},
      {word:'fish',emoji:'🐟',correct:'SH',wrong:'CH'},
      {word:'ring',emoji:'💍',correct:'NG',wrong:'NK'},
      {word:'bus',emoji:'🚌',correct:'S',wrong:'Z'},
      {word:'ball',emoji:'⚽',correct:'LL',wrong:'N'},
      {word:'nest',emoji:'🪺',correct:'ST',wrong:'SK'},
      {word:'lamp',emoji:'💡',correct:'MP',wrong:'NT'},
      {word:'hand',emoji:'✋',correct:'ND',wrong:'NT'},
    ]
  },
  vowel:{
    label:'What is the MIDDLE vowel sound in this word?',
    items:[
      {word:'cat',emoji:'🐱',correct:'A',wrong:'E'},
      {word:'bed',emoji:'🛏️',correct:'E',wrong:'I'},
      {word:'pig',emoji:'🐷',correct:'I',wrong:'E'},
      {word:'dog',emoji:'🐶',correct:'O',wrong:'U'},
      {word:'sun',emoji:'☀️',correct:'U',wrong:'O'},
      {word:'hat',emoji:'🎩',correct:'A',wrong:'O'},
      {word:'pen',emoji:'🖊️',correct:'E',wrong:'A'},
      {word:'sit',emoji:'🪑',correct:'I',wrong:'E'},
      {word:'hot',emoji:'🥵',correct:'O',wrong:'A'},
      {word:'cup',emoji:'☕',correct:'U',wrong:'I'},
      {word:'fan',emoji:'🌬️',correct:'A',wrong:'U'},
      {word:'kit',emoji:'🧰',correct:'I',wrong:'O'},
    ]
  }
};
let curMode='start',qIdx=0,score=0,total=0;
let shuffled=[];

function setMode(m){
  curMode=m;
  document.querySelectorAll('.mt').forEach(t=>t.classList.remove('active'));
  document.getElementById('m-'+m).classList.add('active');
  shuffled=[...MODES[m].items].sort(()=>Math.random()-0.5);
  qIdx=0;loadQ();
  speak(m==='start'?'Which sound does the word start with?':m==='end'?'Which sound does the word end with?':'What is the middle vowel?',0.85);
}
function loadQ(){
  const items=MODES[curMode].items;
  const q=shuffled[qIdx%shuffled.length];
  document.getElementById('lb-q').textContent=MODES[curMode].label;
  document.getElementById('lb-emoji').textContent=q.emoji;
  document.getElementById('fb-msg').textContent='';
  const choices=[q.correct,q.wrong].sort(()=>Math.random()-0.5);
  document.getElementById('choices-box').innerHTML=choices.map(c=>`
    <button class="choice-big" onclick="checkAnswer(this,'${c}','${q.correct}','${q.word}')">
      <span>${c}</span>
      <span class="ch-label">${c.toLowerCase()} sound</span>
    </button>`).join('');
  setTimeout(()=>playWord(),300);
}
function playWord(){
  const q=shuffled[qIdx%shuffled.length];
  speak(q.word,0.68);
}
function checkAnswer(el,chosen,correct,word){
  document.querySelectorAll('.choice-big').forEach(b=>b.onclick=null);
  total++;
  if(chosen===correct){
    el.classList.add('correct');score++;
    const msg='Correct! '+word+' has the '+correct+' sound!';
    document.getElementById('fb-msg').textContent='✅ '+msg;
    speak(msg,0.85);awardStars('listen-choose',1);
    setTimeout(()=>{qIdx++;loadQ();},1800);
  } else {
    el.classList.add('wrong');shakeWrong(el);
    document.querySelectorAll('.choice-big').forEach(b=>{if(b.querySelector('span').textContent===correct)b.classList.add('correct');});
    document.getElementById('fb-msg').textContent='Try again! Listen carefully to the '+correct+' sound!';
    speak('Try again! '+word+' has the '+correct+' sound!',0.82);
    setTimeout(()=>{qIdx++;loadQ();},2200);
  }
  document.getElementById('sc-num').textContent=score;
  document.getElementById('sc-tot').textContent=total;
  if(total>=15){markComplete('listen-choose');awardStars('listen-choose',2);}
}
document.addEventListener('DOMContentLoaded',()=>{
  shuffled=[...MODES[curMode].items].sort(()=>Math.random()-0.5);
  loadQ();
  injectMascot(["Listen carefully to the word! 🦉","Which sound do you hear at the start?","Try end sounds and middle vowels too! 👂"]);
  speak("Listen and choose! I will say a word — you pick the right sound!",0.85);
});
</script>
</body>
</html>
