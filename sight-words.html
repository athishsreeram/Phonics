<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>👁️ Sight Words · Phonics Hub</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* ── Level selector ── */
    .level-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
    }
    .level-tab {
      padding: 12px 22px;
      border-radius: 50px;
      border: 3px solid #eee;
      background: white;
      font-family: var(--font-body);
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
      min-height: var(--tap-min);
    }
    .level-tab.active {
      background: var(--clr-green);
      color: white;
      border-color: var(--clr-green);
    }

    /* ── Flash card ── */
    .flash-card {
      background: white;
      border-radius: 40px;
      padding: 48px 28px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      margin: 0 auto 28px;
      max-width: 480px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      border: 6px solid var(--clr-green);
      position: relative;
    }
    .flash-card:active {
      transform: scale(0.97);
      box-shadow: var(--shadow-sm);
    }

    .sight-word-display {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(4rem, 18vw, 9rem);
      color: var(--clr-text);
      line-height: 1;
      display: block;
      margin-bottom: 8px;
    }
    .tap-hint {
      font-size: 1.1rem;
      color: var(--clr-text-soft);
      font-weight: 600;
    }

    .card-counter {
      position: absolute;
      top: 16px;
      right: 20px;
      background: var(--clr-accent);
      border-radius: 50px;
      padding: 4px 14px;
      font-size: 1rem;
      font-weight: 800;
    }

    /* ── Navigation row ── */
    .nav-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    /* ── Grid mode ── */
    .words-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .word-chip {
      background: white;
      border: 3px solid #eee;
      border-radius: 16px;
      padding: 16px 12px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.4rem, 5vw, 2rem);
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .word-chip.seen {
      background: #f0fdf4;
      border-color: var(--clr-green);
      color: var(--clr-green);
    }
    .word-chip:active { transform: scale(0.93); }

    /* ── Mode switcher ── */
    .mode-tabs {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .mode-tab {
      padding: 10px 20px;
      border-radius: 50px;
      border: 3px solid #eee;
      background: white;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      min-height: 52px;
      transition: all 0.15s;
    }
    .mode-tab.active {
      background: var(--clr-blue);
      color: white;
      border-color: var(--clr-blue);
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="nav-home-btn">🏠</a>
      <span class="nav-title">Sight Words</span>
    </div>
    <div class="nav-right"></div>
  </nav>

  <div class="page-header" style="background:linear-gradient(135deg,var(--stage5),#5dbb6a)">
    <h1>👁️ Sight Words</h1>
    <p>See it, say it, learn it!</p>
  </div>

  <main>

    <!-- Mode switch -->
    <div class="mode-tabs" style="margin-top:24px">
      <button class="mode-tab active" data-mode="flash">🃏 Flash Cards</button>
      <button class="mode-tab" data-mode="grid">🔲 Grid View</button>
    </div>

    <!-- Level tabs -->
    <div class="level-tabs" id="level-tabs">
      <button class="level-tab active" data-level="0">Level 1</button>
      <button class="level-tab" data-level="1">Level 2</button>
      <button class="level-tab" data-level="2">Level 3</button>
      <button class="level-tab" data-level="3">Level 4</button>
    </div>

    <!-- Flash card mode -->
    <div id="mode-flash">
      <div class="flash-card" id="flash-card">
        <span class="card-counter" id="card-counter">1 / 10</span>
        <span class="sight-word-display" id="sight-word">the</span>
        <p class="tap-hint">👆 Tap to hear it!</p>
      </div>
      <div class="nav-row">
        <button class="btn btn-secondary btn-lg" id="btn-prev">◀ Prev</button>
        <button class="btn btn-primary   btn-lg" id="btn-speak">🔊 Say It</button>
        <button class="btn btn-secondary btn-lg" id="btn-next-word">Next ▶</button>
      </div>
      <div class="score-bar">
        <div class="score-item">
          <span>✅</span>
          <span id="seen-count">0</span>
          <span class="score-label">Seen</span>
        </div>
        <div class="score-item">
          <span>⭐</span>
          <span id="stars-count">0</span>
          <span class="score-label">Stars</span>
        </div>
      </div>
    </div>

    <!-- Grid mode -->
    <div id="mode-grid" style="display:none">
      <div class="words-grid" id="words-grid"></div>
      <p style="text-align:center;color:var(--clr-text-soft);font-size:1rem">
        Tap any word to hear it! Green = you've seen it ✅
      </p>
    </div>

  </main>

  <script src="js/audio.js"></script>
  <script src="js/materials.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let sightWordSets = [];
    let currentLevel = 0;
    let currentCardIdx = 0;
    let seenWords = new Set();
    let currentMode = 'flash';

    function loadMaterial() {
      const pack = MaterialsManager.getCurrent();
      sightWordSets = pack.sightWords || [];
      currentCardIdx = 0;
      seenWords.clear();
      render();
    }

    function getWords() {
      return sightWordSets[currentLevel] || [];
    }

    function render() {
      const words = getWords();
      if (!words.length) return;
      currentCardIdx = Math.min(currentCardIdx, words.length - 1);
      const word = words[currentCardIdx];

      document.getElementById('sight-word').textContent = word;
      document.getElementById('card-counter').textContent = `${currentCardIdx + 1} / ${words.length}`;
      document.getElementById('seen-count').textContent  = seenWords.size;
      document.getElementById('stars-count').textContent = Math.floor(seenWords.size / 2);

      if (currentMode === 'grid') buildGrid();
    }

    function buildGrid() {
      const words = getWords();
      const grid  = document.getElementById('words-grid');
      grid.innerHTML = '';
      words.forEach(w => {
        const chip = document.createElement('div');
        chip.className = `word-chip ${seenWords.has(w) ? 'seen' : ''}`;
        chip.textContent = w;
        chip.addEventListener('click', () => {
          AudioManager.speak(w, { rate: 0.75 });
          AudioManager.playTone('click');
          seenWords.add(w);
          chip.classList.add('seen');
          UI.animateBtn(chip);
          document.getElementById('seen-count').textContent  = seenWords.size;
          document.getElementById('stars-count').textContent = Math.floor(seenWords.size / 2);
        });
        grid.appendChild(chip);
      });
    }

    // ── Flash card interactions ──
    document.getElementById('flash-card').addEventListener('click', () => {
      const words = getWords();
      if (!words.length) return;
      const word = words[currentCardIdx];
      AudioManager.speak(word, { rate: 0.75 });
      AudioManager.playTone('click');
      seenWords.add(word);
      render();
    });

    document.getElementById('btn-speak').addEventListener('click', () => {
      const words = getWords();
      if (!words.length) return;
      AudioManager.speak(words[currentCardIdx], { rate: 0.75 });
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      currentCardIdx = (currentCardIdx - 1 + getWords().length) % getWords().length;
      AudioManager.playTone('click');
      render();
    });

    document.getElementById('btn-next-word').addEventListener('click', () => {
      const words = getWords();
      seenWords.add(words[currentCardIdx]);
      currentCardIdx = (currentCardIdx + 1) % words.length;
      AudioManager.playTone('click');
      render();
      if (seenWords.size === words.length) {
        setTimeout(() => {
          UI.showFeedback(true);
          AudioManager.playTone('star');
          UI.toast('🎉 You saw all the words!');
        }, 200);
      }
    });

    // ── Level tabs ──
    document.querySelectorAll('#level-tabs .level-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('#level-tabs .level-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentLevel = parseInt(tab.dataset.level);
        currentCardIdx = 0;
        seenWords.clear();
        AudioManager.playTone('click');
        render();
      });
    });

    // ── Mode tabs ──
    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentMode = tab.dataset.mode;
        document.getElementById('mode-flash').style.display = currentMode === 'flash' ? 'block' : 'none';
        document.getElementById('mode-grid').style.display  = currentMode === 'grid'  ? 'block' : 'none';
        if (currentMode === 'grid') buildGrid();
        AudioManager.playTone('click');
      });
    });

    document.addEventListener('materialChanged', loadMaterial);
    loadMaterial();
  </script>
</body>
</html>
