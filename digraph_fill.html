<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Digraph Test ✏️</title>
<link rel="stylesheet" href="shared.css">
<style>
  .question-box {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 22px;
    padding: 28px 20px;
    text-align: center;
    margin: 16px 0;
    min-height: 240px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .q-emoji { font-size: 4rem; }
  .q-word {
    font-family: var(--font-display);
    font-size: 2.8rem;
    font-weight: 800;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .q-blank {
    display: inline-block;
    min-width: 70px;
    border-bottom: 4px solid var(--digraph);
    color: var(--digraph);
    text-align: center;
    font-size: 2.8rem;
    font-weight: 800;
    font-family: var(--font-display);
    padding: 0 6px;
    letter-spacing: 2px;
  }
  .q-blank.filled { color: var(--digraph); border-color: var(--success); }
  .tiles-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 14px 0;
  }
  .choice-tile {
    width: 72px; height: 72px;
    background: white;
    border: 3px solid #e1bee7;
    border-radius: 14px;
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--digraph);
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  .choice-tile:hover  { transform: translateY(-4px); border-color: var(--digraph); background: #f9f0ff; }
  .choice-tile:active { transform: scale(0.9); }
  .choice-tile.correct { border-color: var(--success); background: #f0faf4; color: var(--success); }
  .choice-tile.wrong   { border-color: var(--danger);  background: #fff5f5; color: var(--danger); animation: shake 0.5s ease; }

  .progress-nums {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 800;
    color: var(--muted);
    text-align: center;
    margin: 8px 0;
  }
  .end-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .end-screen.visible { display: block; }
  .end-big { font-size: 5rem; }
  .end-title { font-family:var(--font-display);font-size:1.8rem;font-weight:800;color:var(--primary);margin:12px 0; }
  .end-stars { font-size:2.5rem;margin:8px 0; }
</style>
</head>
<body>
<div class="ph-header">
  <h1>✏️ Digraph Test</h1>
  <p>Tap the right digraph to complete the word!</p>
  <span class="ph-stage-badge">Stage 3</span>
</div>

<div class="ph-wrap">
  <div class="progress-nums"><span id="q-num">1</span> / <span id="q-total">12</span></div>
  <div class="ph-progress-wrap">
    <div class="ph-progress-bar"><div class="ph-progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="question-box" id="question-box">
    <div class="q-emoji" id="q-emoji">🐑</div>
    <div class="q-word">
      <div class="q-blank" id="q-blank">__</div>
      <span id="q-rest">eep</span>
    </div>
    <button class="ph-btn ph-btn-outline" onclick="playQuestion()">🔊 Hear the Word</button>
  </div>

  <div class="tiles-row" id="tiles-row"></div>

  <div class="end-screen" id="end-screen">
    <div class="end-big">🎉</div>
    <div class="end-title" id="end-title">Amazing!</div>
    <div class="end-stars" id="end-stars">⭐⭐⭐</div>
    <p style="font-weight:700;color:var(--muted);margin:12px 0" id="end-score"></p>
    <div class="ph-btn-row">
      <button class="ph-btn ph-btn-primary" onclick="restart()">🔄 Try Again</button>
      <a class="ph-btn ph-btn-outline" href="index.html">🏠 Hub</a>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const QUESTIONS = [
  {dg:'sh',rest:'eep',e:'🐑',word:'sheep'},
  {dg:'ch',rest:'air',e:'🪑',word:'chair'},
  {dg:'th',rest:'ree',e:'3️⃣',word:'three'},
  {dg:'ph',rest:'one',e:'📱',word:'phone'},
  {dg:'wh',rest:'ale',e:'🐳',word:'whale'},
  {dg:'sh',rest:'ell',e:'🐚',word:'shell'},
  {dg:'ch',rest:'eese',e:'🧀',word:'cheese'},
  {dg:'th',rest:'umb',e:'👍',word:'thumb'},
  {dg:'wh',rest:'eel',e:'🛞',word:'wheel'},
  {dg:'sh',rest:'op',e:'🏪',word:'shop'},
  {dg:'ch',rest:'icken',e:'🐔',word:'chicken'},
  {dg:'ng',rest:' (at end) - ri__',e:'💍',word:'ring'},
];
const ALL_DGS = ['sh','ch','th','ph','wh','ng'];

let qIdx = 0, score = 0;

function loadQuestion() {
  if (qIdx >= QUESTIONS.length) { showEnd(); return; }
  const q = QUESTIONS[qIdx];
  document.getElementById('q-emoji').textContent = q.e;
  document.getElementById('q-blank').textContent = '__';
  document.getElementById('q-blank').className = 'q-blank';
  document.getElementById('q-rest').textContent = q.rest.startsWith('(') ? q.rest : q.rest;
  document.getElementById('q-num').textContent = qIdx + 1;
  document.getElementById('q-total').textContent = QUESTIONS.length;
  document.getElementById('progress-fill').style.width = (qIdx / QUESTIONS.length * 100) + '%';
  document.getElementById('question-box').style.display = 'flex';

  // Build tiles (correct + 3 random wrong)
  const wrong = ALL_DGS.filter(d => d !== q.dg).sort(() => Math.random()-0.5).slice(0,3);
  const choices = [q.dg, ...wrong].sort(() => Math.random()-0.5);
  document.getElementById('tiles-row').innerHTML = choices.map(dg => `
    <div class="choice-tile" onclick="checkAnswer(this,'${dg}','${q.dg}','${q.word}')">${dg}</div>`).join('');

  playQuestion();
}

function playQuestion() {
  if (qIdx >= QUESTIONS.length) return;
  const q = QUESTIONS[qIdx];
  speak('Can you complete the word? ' + q.dg + '... ' + q.rest + '...', 0.78);
  setTimeout(() => speak(q.word, 0.72), 2000);
}

function checkAnswer(tile, chosen, correct, word) {
  document.querySelectorAll('.choice-tile').forEach(t => t.onclick = null);
  if (chosen === correct) {
    tile.classList.add('correct');
    document.getElementById('q-blank').textContent = correct;
    document.getElementById('q-blank').classList.add('filled');
    score++;
    awardStars('digraph-fill', 1);
    speak('Yes! ' + correct + ' makes ' + word + '! Wonderful!', 0.85);
    setTimeout(() => { qIdx++; loadQuestion(); }, 2000);
  } else {
    tile.classList.add('wrong');
    shakeWrong(tile);
    setTimeout(() => {
      document.querySelectorAll('.choice-tile').forEach(t => {
        if (t.textContent.trim() === correct) { t.classList.add('correct'); t.onclick = null; }
        else t.onclick = (e) => checkAnswer(e.target, e.target.textContent.trim(), correct, word);
      });
      speak('Try again! Listen... ' + word, 0.78);
    }, 800);
  }
}

function showEnd() {
  document.getElementById('question-box').style.display = 'none';
  document.getElementById('tiles-row').style.display = 'none';
  const pct = score / QUESTIONS.length;
  const stars = pct >= 0.9 ? 3 : pct >= 0.7 ? 2 : 1;
  document.getElementById('end-title').textContent = pct >= 0.9 ? 'Excellent! 🌟' : pct >= 0.7 ? 'Great Job! 🎉' : 'Good Try! Keep going! 💪';
  document.getElementById('end-stars').textContent = '⭐'.repeat(stars);
  document.getElementById('end-score').textContent = 'You got ' + score + ' out of ' + QUESTIONS.length + ' correct!';
  document.getElementById('end-screen').classList.add('visible');
  confetti();
  markComplete('digraph-fill');
  awardStars('digraph-fill-bonus', stars);
  speak(document.getElementById('end-title').textContent);
}

function restart() {
  qIdx = 0; score = 0;
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('question-box').style.display = 'flex';
  document.getElementById('tiles-row').style.display = 'flex';
  loadQuestion();
}

document.addEventListener('DOMContentLoaded', () => {
  injectMascot(["Tap the digraph that completes the word! 🦉","Listen to the word, then choose! 👂","You can do it! 💪"]);
  loadQuestion();
});
</script>
</body>
</html>
