<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Phonic Set 2 2️⃣</title>
<link rel="stylesheet" href="shared.css">
<style>
  .set-intro { background:linear-gradient(135deg,#117a65,#1abc9c);color:white;padding:18px 20px;border-radius:18px;margin:14px 0;text-align:center; }
  .si-title { font-family:var(--font-display);font-size:1.3rem;font-weight:800;margin-bottom:6px; }
  .si-letters { font-family:var(--font-display);font-size:1.8rem;font-weight:800;letter-spacing:8px; }
  .sound-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin:14px 0; }
  .sound-card { background:white;border:3px solid var(--border);border-radius:16px;padding:16px 10px;text-align:center;cursor:pointer;transition:all 0.18s;touch-action:manipulation;position:relative; }
  .sound-card:hover { transform:translateY(-4px);box-shadow:0 8px 22px rgba(17,122,101,0.18); }
  .sound-card:active { transform:scale(0.92); }
  .sound-card.mastered { border-color:var(--success);background:#f0faf4; }
  .sound-card.active { border-color:#117a65;background:#e8f8f5;transform:scale(1.05); }
  .sc-letter { font-family:var(--font-display);font-size:2.6rem;font-weight:800;color:#117a65;display:block;line-height:1; }
  .sc-lower  { font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--muted); }
  .sc-emoji  { font-size:1.5rem;display:block;margin-top:6px; }
  .sc-word   { font-size:0.72rem;font-weight:700;color:var(--muted);margin-top:2px; }
  .sc-dots   { display:flex;gap:3px;justify-content:center;margin-top:6px; }
  .sc-dot    { width:7px;height:7px;border-radius:50%;background:var(--border); }
  .sc-dot.filled { background:var(--success); }
  .sc-check  { position:absolute;top:5px;right:7px;font-size:0.85rem;display:none; }
  .sound-card.mastered .sc-check { display:block; }
  .quiz-area { background:white;border:2.5px solid var(--border);border-radius:20px;padding:22px;margin:16px 0; }
  .qa-label  { font-family:var(--font-display);font-size:1rem;font-weight:800;color:#117a65;text-align:center;margin-bottom:14px; }
  .qa-choices { display:grid;grid-template-columns:repeat(4,1fr);gap:10px; }
  @media(max-width:380px){.qa-choices{grid-template-columns:repeat(2,1fr);}}
  .qa-choice { background:white;border:3px solid var(--border);border-radius:12px;padding:14px 8px;font-family:var(--font-display);font-size:2rem;font-weight:800;cursor:pointer;text-align:center;transition:all 0.18s;touch-action:manipulation; }
  .qa-choice:hover { transform:translateY(-3px);border-color:#117a65; }
  .qa-choice.correct { border-color:var(--success);background:#f0faf4; }
  .qa-choice.wrong   { border-color:var(--danger);background:#fff5f5; }
  .mode-row { display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0; }
  .mode-pill { padding:7px 18px;border:2.5px solid var(--border);background:white;border-radius:20px;font-family:var(--font-display);font-size:0.88rem;font-weight:800;cursor:pointer;transition:all 0.2s; }
  .mode-pill.active,.mode-pill:hover { border-color:#117a65;background:#e8f8f5;color:#117a65; }
</style>
</head>
<body>
<div class="ph-header" style="background:linear-gradient(135deg,#117a65 0%,#1abc9c 60%,#f59e2e 100%)">
  <h1>2️⃣ Phonic Set 2</h1>
  <p>Six more letter sounds to learn!</p>
  <span class="ph-stage-badge">Stage 1</span>
</div>
<div class="ph-wrap">
  <div class="set-intro">
    <div class="si-title">Set 2 Letters</div>
    <div class="si-letters">m · d · g · o · c · k</div>
    <p style="font-size:0.82rem;margin-top:8px;opacity:0.88">You learned Set 1 — now let's do Set 2!</p>
  </div>
  <div class="mode-row">
    <button class="mode-pill active" id="m-explore" onclick="setMode('explore')">🔍 Explore</button>
    <button class="mode-pill" id="m-practice" onclick="setMode('practice')">📖 Practice</button>
    <button class="mode-pill" id="m-quiz" onclick="setMode('quiz')">🎯 Quiz</button>
  </div>
  <div id="explore-area">
    <div class="sound-grid" id="sound-grid"></div>
  </div>
  <div id="quiz-area" class="quiz-area" style="display:none">
    <div class="qa-label">🔊 Hear the sound — tap the right letter!</div>
    <div style="text-align:center;margin:12px 0">
      <button class="ph-btn ph-btn-success" onclick="playQuiz()">🔊 Play Sound</button>
    </div>
    <div class="qa-choices" id="qa-choices"></div>
    <div style="text-align:center;margin-top:12px;font-weight:700;color:var(--muted)" id="qa-score">Score: 0/0</div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const SET2 = [
  {l:'M',w:'Moon',  e:'🌙',s:'mmm (like humming!)'},
  {l:'D',w:'Dog',   e:'🐶',s:'duh (dog!)'},
  {l:'G',w:'Goat',  e:'🐐',s:'guh (goat!)'},
  {l:'O',w:'Octopus',e:'🐙',s:'o (short o — octopus)'},
  {l:'C',w:'Cat',   e:'🐱',s:'kuh (cat!)'},
  {l:'K',w:'Kite',  e:'🪁',s:'kuh (kite!)'},
];
const VOWELS_SET2 = ['O'];
let mastery = JSON.parse(localStorage.getItem('ph_set2_mastery')||'{}');
let mode = 'explore', qLetter = null, qScore = 0, qTotal = 0;

function buildGrid() {
  const grid = document.getElementById('sound-grid');
  grid.innerHTML = SET2.map(item => {
    const taps = mastery[item.l]||0;
    const done = taps >= 3;
    const isVowel = VOWELS_SET2.includes(item.l);
    return `<div class="sound-card${done?' mastered':''}${isVowel?' ph-vowel':''}" id="sc-${item.l}" onclick="tapCard('${item.l}')">
      <span class="sc-check">✅</span>
      <span class="sc-letter">${item.l}</span>
      <span class="sc-lower">${item.l.toLowerCase()}</span>
      <span class="sc-emoji">${item.e}</span>
      <span class="sc-word">${item.w}</span>
      <div class="sc-dots">
        ${[0,1,2].map(i=>`<div class="sc-dot${i<taps?' filled':''}"></div>`).join('')}
      </div>
    </div>`;
  }).join('');
}
function tapCard(l) {
  const item = SET2.find(x=>x.l===l);
  const card = document.getElementById('sc-'+l);
  card.classList.add('active');
  setTimeout(()=>card.classList.remove('active'),700);
  speak(l+'... '+item.s+'... '+item.w+'!',0.78);
  mastery[l] = Math.min((mastery[l]||0)+1,3);
  localStorage.setItem('ph_set2_mastery',JSON.stringify(mastery));
  const taps = mastery[l];
  card.querySelectorAll('.sc-dot').forEach((d,i)=>d.classList.toggle('filled',i<taps));
  if(taps>=3){card.classList.add('mastered');card.querySelector('.sc-check').style.display='block';awardStars('phonic-set2',1);}
  if(SET2.filter(x=>(mastery[x.l]||0)>=3).length>=SET2.length){markComplete('phonic-set2');}
}
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('m-'+m).classList.add('active');
  document.getElementById('explore-area').style.display = m!=='quiz'?'block':'none';
  document.getElementById('quiz-area').style.display = m==='quiz'?'block':'none';
  if(m==='practice'){speak('Practice! Listen and repeat each sound!',0.85);let i=0;function pn(){if(i>=SET2.length||mode!=='practice')return;tapCard(SET2[i].l);i++;setTimeout(pn,2800);}pn();}
  if(m==='quiz')nextQuiz();
}
function nextQuiz() {
  const idx = Math.floor(Math.random()*SET2.length);
  qLetter = SET2[idx];
  const wrong = SET2.filter(x=>x.l!==qLetter.l).sort(()=>Math.random()-0.5).slice(0,3);
  const choices = [qLetter,...wrong].sort(()=>Math.random()-0.5);
  document.getElementById('qa-choices').innerHTML = choices.map(c=>`
    <div class="qa-choice" onclick="checkQuiz(this,'${c.l}','${qLetter.l}')">${c.l}<br><span style="font-size:1.2rem">${c.e}</span></div>`).join('');
  playQuiz();
}
function playQuiz(){if(qLetter)speak(qLetter.s,0.72);}
function checkQuiz(el,chosen,correct){
  qTotal++;
  if(chosen===correct){el.classList.add('correct');qScore++;speak('Correct! '+correct+'!');awardStars('phonic-set2-quiz',1);setTimeout(nextQuiz,1800);}
  else{el.classList.add('wrong');shakeWrong(el);document.querySelectorAll('.qa-choice').forEach(c=>{if(c.textContent.trim().startsWith(correct))c.classList.add('correct');});setTimeout(nextQuiz,2200);}
  document.getElementById('qa-score').textContent='Score: '+qScore+'/'+qTotal;
}
document.addEventListener('DOMContentLoaded',()=>{
  buildGrid();
  injectMascot(["Set 2 — M, D, G, O, C, K! 🦉","C and K both make the kuh sound!","O is the vowel in this set! 🔴"]);
  speak("Phonic Set 2! Let\'s learn M, D, G, O, C, and K!",0.85);
});
</script>
</body>
</html>
