<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Phonic Games 🎮</title>
<link rel="stylesheet" href="shared.css">
<style>
  .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin:14px 0;}
  .game-card{background:white;border:2.5px solid var(--border);border-radius:20px;padding:20px 14px 16px;text-align:center;text-decoration:none;color:var(--text);cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:8px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  .game-card:hover{transform:translateY(-5px);box-shadow:0 10px 28px rgba(108,63,197,0.18);border-color:var(--primary);}
  .game-card:active{transform:scale(0.94);}
  .gc-icon{font-size:2.6rem;line-height:1;}
  .gc-name{font-family:var(--font-display);font-size:0.9rem;font-weight:800;line-height:1.2;}
  .gc-desc{font-size:0.72rem;font-weight:700;color:var(--muted);}
  .gc-best{font-size:0.7rem;font-weight:800;color:var(--primary);margin-top:2px;}
  .diff-row{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap;}
  .dr-btn{padding:6px 16px;border:2.5px solid var(--border);background:white;border-radius:16px;font-family:var(--font-display);font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .dr-btn.active,.dr-btn:hover{border-color:var(--primary);background:#f0ecff;color:var(--primary);}
  .score-board{background:white;border:2.5px solid var(--border);border-radius:20px;padding:18px;margin:14px 0;}
  .sb-title{font-family:var(--font-display);font-size:1rem;font-weight:800;color:var(--primary);margin-bottom:12px;text-align:center;}
  .sb-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-weight:700;font-size:0.88rem;}
  .sb-row:last-child{border-bottom:none;}
  .sb-medal{font-size:1.1rem;}
</style>
</head>
<body>
<div class="ph-header">
  <h1>🎮 Phonic Games</h1>
  <p>Fun games to practise what you've learned!</p>
</div>
<div class="ph-wrap">
  <div class="diff-row">
    <button class="dr-btn active" onclick="filterGames('all')">🌟 All Games</button>
    <button class="dr-btn" onclick="filterGames('sounds')">🔊 Sounds</button>
    <button class="dr-btn" onclick="filterGames('reading')">📖 Reading</button>
    <button class="dr-btn" onclick="filterGames('writing')">✍️ Writing</button>
  </div>
  <div class="games-grid" id="games-grid"></div>

  <div class="score-board">
    <div class="sb-title">🏆 Your Best Scores</div>
    <div class="sb-row"><span class="sb-medal">🥇</span><span>Balloon Pop</span><span id="best-balloon">-</span></div>
    <div class="sb-row"><span class="sb-medal">🥇</span><span>Word Match</span><span id="best-match">-</span></div>
    <div class="sb-row"><span class="sb-medal">🥇</span><span>Rhyme Time</span><span id="best-rhyme">-</span></div>
    <div class="sb-row"><span class="sb-medal">⭐</span><span>Total Stars</span><span id="best-stars">0</span></div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const GAMES=[
  {icon:'🎈',name:'Balloon Pop',desc:'Pop the right balloon!',href:'alphabet-ballon-pop.html',cat:'sounds'},
  {icon:'🎯',name:'Word Match',desc:'Hear a word, tap the picture!',href:'word-match.html',cat:'reading'},
  {icon:'🎵',name:'Rhyme Time',desc:'Do these words rhyme?',href:'rhyme.html',cat:'sounds'},
  {icon:'👂',name:'Listen & Choose',desc:'Hear the sound, pick it!',href:'listen-choose.html',cat:'sounds'},
  {icon:'🔠',name:'Digraph Sort',desc:'Sort words by digraph!',href:'digraphs.html',cat:'sounds'},
  {icon:'✏️',name:'Digraph Fill',desc:'Complete the word!',href:'digraph_fill.html',cat:'writing'},
  {icon:'🔡',name:'Blend Match',desc:'Find the consonant blend!',href:'consonant-blend.html',cat:'sounds'},
  {icon:'✨',name:'Magic E Quiz',desc:'Magic E or not?',href:'magic-e.html',cat:'reading'},
  {icon:'📖',name:'Story Time',desc:'Read a decodable story!',href:'story.html',cat:'reading'},
  {icon:'✍️',name:'Letter Tracing',desc:'Trace the alphabet!',href:'trace.html',cat:'writing'},
  {icon:'🧩',name:'Sentence Builder',desc:'Put the words in order!',href:'sentence-builder.html',cat:'writing'},
  {icon:'🌟',name:'Word Explorer',desc:'Learn about any word!',href:'word-explore.html',cat:'reading'},
  {icon:'🔤',name:'Alphabet Quiz',desc:'Match letters to sounds!',href:'alphabet.html',cat:'sounds'},
  {icon:'🗣️',name:'Vowel Sort',desc:'Short or long vowel?',href:'vowels.html',cat:'sounds'},
  {icon:'🔰',name:'CVC Blender',desc:'Blend 3 sounds together!',href:'cvc.html',cat:'sounds'},
];
let filter='all';
function filterGames(cat){
  filter=cat;
  document.querySelectorAll('.dr-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  buildGrid();
}
function buildGrid(){
  const filtered=filter==='all'?GAMES:GAMES.filter(g=>g.cat===filter);
  document.getElementById('games-grid').innerHTML=filtered.map(g=>`
    <a class="game-card" href="${g.href}" onclick="cardClick(event,'${g.name}')">
      <span class="gc-icon">${g.icon}</span>
      <span class="gc-name">${g.name}</span>
      <span class="gc-desc">${g.desc}</span>
    </a>`).join('');
}
function cardClick(e,name){
  e.preventDefault();const href=e.currentTarget.href;
  speak("Let's play "+name+"!",0.88);
  setTimeout(()=>location.href=href,700);
}
function loadScores(){
  const stars=localStorage.getItem('ph_stars')||'0';
  document.getElementById('best-stars').textContent=stars+' ⭐';
}
document.addEventListener('DOMContentLoaded',()=>{
  buildGrid();loadScores();
  injectMascot(["Pick a game to play! 🦉","All games help you practise phonics!","Try to beat your best score! 🏆"]);
  speak("Phonic Games! Choose a game to play!",0.85);
});
</script>
</body>
</html>
