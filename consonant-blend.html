<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Consonant Blends 🔡</title>
<link rel="stylesheet" href="shared.css">
<style>
  .position-tabs { display:flex;gap:10px;justify-content:center;margin:14px 0; }
  .pos-tab { padding:8px 22px;border:2.5px solid var(--border);background:white;border-radius:20px;font-family:var(--font-display);font-size:0.9rem;font-weight:800;cursor:pointer;transition:all 0.2s; }
  .pos-tab.active,.pos-tab:hover { border-color:var(--consonant);background:#ebf5fb;color:var(--consonant); }
  .blend-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin:14px 0; }
  .blend-card { background:white;border:3px solid #bbdefb;border-radius:18px;padding:18px 10px;text-align:center;cursor:pointer;transition:transform 0.18s,box-shadow 0.18s;touch-action:manipulation; }
  .blend-card:hover { transform:translateY(-4px);box-shadow:0 8px 24px rgba(41,128,185,0.2); }
  .blend-card:active { transform:scale(0.93); }
  .blend-card.active { border-color:var(--consonant);background:#ebf5fb; }
  .bc-letters { font-family:var(--font-display);font-size:2.2rem;font-weight:800;color:var(--consonant);display:block; }
  .bc-word { font-size:0.8rem;font-weight:700;color:var(--muted);margin-top:4px; }
  .bc-emoji { font-size:1.5rem;display:block;margin-top:4px; }

  .detail-box { background:white;border:2.5px solid var(--border);border-radius:20px;padding:22px;margin:14px 0;display:none;animation:fadeIn 0.3s ease; }
  .detail-box.visible { display:block; }
  .db-title { font-family:var(--font-display);font-size:1.6rem;font-weight:800;color:var(--consonant);text-align:center;margin-bottom:12px; }
  .blend-anim { display:flex;align-items:center;justify-content:center;gap:8px;margin:14px 0;flex-wrap:wrap; }
  .ba-tile { width:65px;height:70px;border:3px solid #bbdefb;border-radius:12px;background:white;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:2rem;font-weight:800;color:var(--consonant);cursor:pointer;transition:all 0.25s;touch-action:manipulation; }
  .ba-tile:hover { border-color:var(--consonant);transform:translateY(-3px); }
  .ba-tile.lit { border-color:var(--accent);background:#fff8ed;transform:scale(1.1); }
  .ba-plus { font-size:1.5rem;color:var(--muted);font-weight:800; }
  .ba-result { font-family:var(--font-display);font-size:2.4rem;font-weight:800;color:var(--primary);opacity:0;transition:opacity 0.4s; }
  .ba-result.show { opacity:1; }
  .example-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin:12px 0; }
  .eg-card { background:#ebf5fb;border:2px solid #bbdefb;border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:transform 0.15s;touch-action:manipulation; }
  .eg-card:hover { transform:translateY(-3px); }
  .eg-emoji { font-size:1.5rem;display:block; }
  .eg-word { font-family:var(--font-display);font-size:0.95rem;font-weight:800;margin-top:4px; }
</style>
</head>
<body>
<div class="ph-header">
  <h1>🔡 Consonant Blends</h1>
  <p>Two or three consonants together!</p>
  <span class="ph-stage-badge">Stage 3</span>
</div>
<div class="ph-wrap">
  <div class="position-tabs">
    <button class="pos-tab active" id="tab-start" onclick="setPos('start')">▶ Start Blends</button>
    <button class="pos-tab" id="tab-end" onclick="setPos('end')">End Blends ▶</button>
  </div>
  <div class="blend-grid" id="blend-grid"></div>
  <div class="detail-box" id="detail-box">
    <div class="db-title" id="db-title"></div>
    <div class="blend-anim" id="blend-anim"></div>
    <div class="ph-btn-row">
      <button class="ph-btn ph-btn-primary" onclick="animateBlend()">🔊 Blend It!</button>
    </div>
    <p style="font-size:0.85rem;font-weight:700;color:var(--muted);margin:10px 0">Example words:</p>
    <div class="example-grid" id="example-grid"></div>
  </div>
</div>
<script src="shared.js"></script>
<script>
const BLENDS = {
  start: [
    {b:'bl',word:'blue',e:'🔵',ex:[{w:'blue',e:'🔵'},{w:'black',e:'⬛'},{w:'blow',e:'💨'},{w:'blanket',e:'🛏️'}]},
    {b:'br',word:'bread',e:'🍞',ex:[{w:'bread',e:'🍞'},{w:'bridge',e:'🌉'},{w:'brown',e:'🟤'},{w:'broom',e:'🧹'}]},
    {b:'cl',word:'cloud',e:'☁️',ex:[{w:'cloud',e:'☁️'},{w:'clap',e:'👏'},{w:'clock',e:'🕐'},{w:'clean',e:'✨'}]},
    {b:'cr',word:'crab',e:'🦀',ex:[{w:'crab',e:'🦀'},{w:'crown',e:'👑'},{w:'cross',e:'✝️'},{w:'cry',e:'😢'}]},
    {b:'dr',word:'drum',e:'🥁',ex:[{w:'drum',e:'🥁'},{w:'draw',e:'✏️'},{w:'dragon',e:'🐉'},{w:'drop',e:'💧'}]},
    {b:'fl',word:'flower',e:'🌸',ex:[{w:'flower',e:'🌸'},{w:'flag',e:'🚩'},{w:'fly',e:'🪰'},{w:'flat',e:'📐'}]},
    {b:'fr',word:'frog',e:'🐸',ex:[{w:'frog',e:'🐸'},{w:'fruit',e:'🍎'},{w:'frame',e:'🖼️'},{w:'free',e:'🕊️'}]},
    {b:'gl',word:'globe',e:'🌍',ex:[{w:'globe',e:'🌍'},{w:'glasses',e:'👓'},{w:'glad',e:'😊'},{w:'glue',e:'🫧'}]},
    {b:'gr',word:'green',e:'🟢',ex:[{w:'green',e:'🟢'},{w:'grass',e:'🌿'},{w:'grape',e:'🍇'},{w:'grow',e:'🌱'}]},
    {b:'pl',word:'plane',e:'✈️',ex:[{w:'plane',e:'✈️'},{w:'play',e:'🎮'},{w:'plant',e:'🪴'},{w:'plate',e:'🍽️'}]},
    {b:'pr',word:'prince',e:'🤴',ex:[{w:'prince',e:'🤴'},{w:'prize',e:'🏆'},{w:'press',e:'🖨️'},{w:'pray',e:'🙏'}]},
    {b:'sk',word:'sky',e:'🌤️',ex:[{w:'sky',e:'🌤️'},{w:'skip',e:'🦘'},{w:'skull',e:'💀'},{w:'skin',e:'🫀'}]},
    {b:'sl',word:'slide',e:'🛝',ex:[{w:'slide',e:'🛝'},{w:'sleep',e:'😴'},{w:'slow',e:'🐢'},{w:'slim',e:'📏'}]},
    {b:'sm',word:'smile',e:'😊',ex:[{w:'smile',e:'😊'},{w:'small',e:'🔍'},{w:'smoke',e:'💨'},{w:'smart',e:'🧠'}]},
    {b:'sn',word:'snow',e:'❄️',ex:[{w:'snow',e:'❄️'},{w:'snail',e:'🐌'},{w:'snake',e:'🐍'},{w:'snap',e:'📸'}]},
    {b:'sp',word:'spider',e:'🕷️',ex:[{w:'spider',e:'🕷️'},{w:'spoon',e:'🥄'},{w:'space',e:'🚀'},{w:'spin',e:'🌀'}]},
    {b:'st',word:'star',e:'⭐',ex:[{w:'star',e:'⭐'},{w:'stop',e:'🛑'},{w:'stone',e:'🪨'},{w:'stick',e:'🥢'}]},
    {b:'sw',word:'swan',e:'🦢',ex:[{w:'swan',e:'🦢'},{w:'swim',e:'🏊'},{w:'sweet',e:'🍬'},{w:'swing',e:'🎡'}]},
    {b:'tr',word:'tree',e:'🌳',ex:[{w:'tree',e:'🌳'},{w:'truck',e:'🚛'},{w:'train',e:'🚂'},{w:'trophy',e:'🏆'}]},
    {b:'tw',word:'twins',e:'👯',ex:[{w:'twins',e:'👯'},{w:'twist',e:'🌀'},{w:'twig',e:'🌿'},{w:'twelve',e:'🔢'}]},
  ],
  end: [
    {b:'nd',word:'hand',e:'✋',ex:[{w:'hand',e:'✋'},{w:'land',e:'🏝️'},{w:'sand',e:'🏖️'},{w:'band',e:'🎸'}]},
    {b:'ng',word:'ring',e:'💍',ex:[{w:'ring',e:'💍'},{w:'king',e:'👑'},{w:'song',e:'🎵'},{w:'long',e:'📏'}]},
    {b:'nk',word:'drink',e:'🥤',ex:[{w:'drink',e:'🥤'},{w:'pink',e:'🌸'},{w:'bank',e:'🏦'},{w:'sink',e:'🚰'}]},
    {b:'nt',word:'tent',e:'⛺',ex:[{w:'tent',e:'⛺'},{w:'ant',e:'🐜'},{w:'mint',e:'🌿'},{w:'hunt',e:'🏹'}]},
    {b:'st',word:'nest',e:'🪺',ex:[{w:'nest',e:'🪺'},{w:'best',e:'🏅'},{w:'list',e:'📋'},{w:'fast',e:'⚡'}]},
    {b:'mp',word:'jump',e:'🏃',ex:[{w:'jump',e:'🏃'},{w:'lamp',e:'💡'},{w:'dump',e:'🗑️'},{w:'camp',e:'⛺'}]},
    {b:'lk',word:'milk',e:'🥛',ex:[{w:'milk',e:'🥛'},{w:'walk',e:'🚶'},{w:'talk',e:'💬'},{w:'silk',e:'🧵'}]},
    {b:'lt',word:'belt',e:'👖',ex:[{w:'belt',e:'👖'},{w:'melt',e:'🫠'},{w:'salt',e:'🧂'},{w:'bolt',e:'⚡'}]},
  ]
};
let pos = 'start', currentBlend = null;

function setPos(p) {
  pos = p;
  document.querySelectorAll('.pos-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+p).classList.add('active');
  buildGrid();
  document.getElementById('detail-box').classList.remove('visible');
}

function buildGrid() {
  const grid = document.getElementById('blend-grid');
  grid.innerHTML = BLENDS[pos].map(item => `
    <div class="blend-card" onclick="selectBlend('${item.b}')">
      <span class="bc-letters">${item.b}</span>
      <span class="bc-emoji">${item.e}</span>
      <span class="bc-word">${item.word}</span>
    </div>`).join('');
}

function selectBlend(b) {
  currentBlend = BLENDS[pos].find(x => x.b === b);
  document.querySelectorAll('.blend-card').forEach(c => c.classList.remove('active'));
  document.getElementById('db-title').textContent = '"' + b + '" blend — like in "' + currentBlend.word + '" ' + currentBlend.e;
  // Build animation tiles
  const tiles = b.split('').map((l,i) => `
    <div class="ba-tile" id="tile-${i}" onclick="speak('${l}',0.7)">${l}</div>
    ${i < b.length-1 ? '<div class="ba-plus">+</div>' : '<div class="ba-plus">+</div>'}`)
    .join('') + `<div class="ba-tile" style="width:90px" onclick="speak('${currentBlend.word.slice(b.length)}',0.7)">${currentBlend.word.slice(b.length)}</div>
    <div class="ba-plus">=</div>
    <div class="ba-result" id="ba-result">${currentBlend.word} ${currentBlend.e}</div>`;
  document.getElementById('blend-anim').innerHTML = tiles;
  document.getElementById('example-grid').innerHTML = currentBlend.ex.map(wd => `
    <div class="eg-card" onclick="speak('${wd.w}',0.72)">
      <span class="eg-emoji">${wd.e}</span>
      <span class="eg-word">${wd.w}</span>
    </div>`).join('');
  document.getElementById('detail-box').classList.add('visible');
  animateBlend();
}

function animateBlend() {
  if (!currentBlend) return;
  const b = currentBlend.b;
  const result = document.getElementById('ba-result');
  result.classList.remove('show');
  let delay = 0;
  b.split('').forEach((l, i) => {
    setTimeout(() => {
      const tile = document.getElementById('tile-'+i);
      if (tile) { tile.classList.add('lit'); speak(l, 0.65); setTimeout(() => tile.classList.remove('lit'), 450); }
    }, delay);
    delay += 600;
  });
  setTimeout(() => {
    speak(currentBlend.word, 0.72);
    result.classList.add('show');
    awardStars('blends', 1);
  }, delay + 300);
}

document.addEventListener('DOMContentLoaded', () => {
  buildGrid();
  injectMascot(["Tap a blend to learn it! 🦉","Start blends come at the beginning of words!","End blends come at the end of words!"]);
  speak("Consonant blends! Two consonants together make a blended sound!", 0.85);
});
</script>
</body>
</html>
