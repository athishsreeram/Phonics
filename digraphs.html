<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Digraph Practice 🔠</title>
<link rel="stylesheet" href="shared.css">
<style>
  .digraph-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 16px 0;
  }
  @media(max-width:400px){ .digraph-grid{grid-template-columns:repeat(2,1fr);} }
  .digraph-card {
    background: white;
    border: 3px solid #e1bee7;
    border-radius: 18px;
    padding: 20px 12px 16px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    touch-action: manipulation;
    position: relative;
  }
  .digraph-card:hover  { transform: translateY(-5px); box-shadow: 0 10px 28px rgba(142,68,173,0.2); }
  .digraph-card:active { transform: scale(0.93); }
  .digraph-card.active { border-color: var(--digraph); background: #f9f0ff; transform: scale(1.04); }
  .dg-letters { font-family:var(--font-display);font-size:2.4rem;font-weight:800;color:var(--digraph);display:block;line-height:1; }
  .dg-sound   { font-size:0.78rem;font-weight:700;color:var(--muted);margin-top:4px; }
  .dg-emoji   { font-size:1.5rem;display:block;margin-top:6px; }
  .dg-example { font-family:var(--font-display);font-size:0.88rem;font-weight:700;color:var(--text);margin-top:4px; }
  .dg-practiced{ position:absolute;top:6px;right:8px;font-size:0.8rem;display:none; }
  .digraph-card.done .dg-practiced { display:block; }

  .detail-panel {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px;
    margin: 16px 0;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .detail-panel.visible { display: block; }
  .dp-title { font-family:var(--font-display);font-size:1.8rem;font-weight:800;color:var(--digraph);text-align:center;margin-bottom:14px; }

  .example-words {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
    margin: 12px 0;
  }
  .ew-card {
    background: #f9f0ff;
    border: 2px solid #e1bee7;
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s;
    touch-action: manipulation;
  }
  .ew-card:hover  { transform: translateY(-3px); }
  .ew-card:active { transform: scale(0.92); }
  .ew-emoji { font-size: 1.8rem; display: block; }
  .ew-word  { font-family: var(--font-display); font-size: 1rem; font-weight: 800; margin-top: 6px; }
  .ew-highlight { color: var(--digraph); }

  .sort-game {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
  }
  .sort-title { font-family:var(--font-display);font-size:1.05rem;font-weight:800;color:var(--primary);text-align:center;margin-bottom:16px; }
  .sort-word-display {
    text-align: center;
    font-family: var(--font-display);
    font-size: 2.5rem;
    font-weight: 800;
    margin: 12px 0;
    color: var(--text);
  }
  .sort-buckets {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 14px;
  }
  @media(max-width:460px){ .sort-buckets{grid-template-columns:repeat(2,1fr);} }
  .sort-bucket {
    background: #f9f0ff;
    border: 3px solid #e1bee7;
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--digraph);
    transition: all 0.18s;
    touch-action: manipulation;
  }
  .sort-bucket:hover  { transform: translateY(-3px); border-color: var(--digraph); }
  .sort-bucket:active { transform: scale(0.93); }
  .sort-bucket.correct{ border-color: var(--success); background: #f0faf4; color: var(--success); }
  .sort-bucket.wrong  { border-color: var(--danger);  background: #fff5f5; color: var(--danger); }
</style>
</head>
<body>
<div class="ph-header">
  <h1>🔠 Digraph Practice</h1>
  <p>Two letters — one sound!</p>
  <span class="ph-stage-badge">Stage 3</span>
</div>

<div class="ph-wrap">
  <div class="digraph-grid" id="digraph-grid"></div>

  <div class="detail-panel" id="detail-panel">
    <div class="dp-title" id="dp-title"></div>
    <div style="text-align:center;margin-bottom:14px">
      <button class="ph-btn ph-btn-primary" onclick="playDigraphSound()">🔊 Hear the Sound</button>
    </div>
    <p style="font-size:0.85rem;font-weight:700;color:var(--muted);margin-bottom:10px">Words with this digraph — tap to hear!</p>
    <div class="example-words" id="example-words"></div>
  </div>

  <div class="sort-game" id="sort-game">
    <div class="sort-title">🎯 Which digraph does this word start with?</div>
    <div style="text-align:center">
      <button class="ph-btn ph-btn-primary" onclick="playSortWord()">🔊 Hear the Word</button>
    </div>
    <div class="sort-word-display" id="sort-word">???</div>
    <div class="sort-buckets" id="sort-buckets"></div>
    <div style="text-align:center;margin-top:12px;font-weight:700;color:var(--muted)" id="sort-feedback"></div>
    <div style="text-align:center;margin-top:6px;font-size:0.82rem;font-weight:700;color:var(--muted)" id="sort-score">Score: 0/0</div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const DIGRAPHS = {
  sh: { sound:'sh (as in shh...)',  words:[{w:'sheep',e:'🐑'},{w:'shell',e:'🐚'},{w:'ship',e:'🚢'},{w:'shoe',e:'👟'},{w:'shop',e:'🏪'},{w:'shark',e:'🦈'}] },
  ch: { sound:'ch (as in chips!)',  words:[{w:'chair',e:'🪑'},{w:'cheese',e:'🧀'},{w:'chicken',e:'🐔'},{w:'chin',e:'😊'},{w:'chip',e:'🍟'},{w:'cherry',e:'🍒'}] },
  th: { sound:'th (as in this)',    words:[{w:'the',e:'📖'},{w:'this',e:'👇'},{w:'three',e:'3️⃣'},{w:'thumb',e:'👍'},{w:'think',e:'💭'},{w:'thin',e:'📏'}] },
  ph: { sound:'ph says f (phone!)', words:[{w:'phone',e:'📱'},{w:'photo',e:'📸'},{w:'phrase',e:'💬'},{w:'graph',e:'📊'},{w:'phase',e:'🌗'},{w:'phew',e:'😮‍💨'}] },
  wh: { sound:'wh (as in wheel)',   words:[{w:'whale',e:'🐳'},{w:'wheel',e:'🛞'},{w:'white',e:'⬜'},{w:'when',e:'⏰'},{w:'where',e:'📍'},{w:'wheat',e:'🌾'}] },
  ng: { sound:'ng (as in ring)',    words:[{w:'ring',e:'💍'},{w:'song',e:'🎵'},{w:'king',e:'👑'},{w:'wing',e:'🦅'},{w:'long',e:'📏'},{w:'sing',e:'🎤'}] },
};

const SORT_WORDS = [
  {w:'shell',d:'sh'},{w:'chair',d:'ch'},{w:'thumb',d:'th'},
  {w:'phone',d:'ph'},{w:'whale',d:'wh'},{w:'ring',d:'ng'},
  {w:'ship',d:'sh'},{w:'chin',d:'ch'},{w:'three',d:'th'},
  {w:'photo',d:'ph'},{w:'wheel',d:'wh'},{w:'king',d:'ng'},
  {w:'shoe',d:'sh'},{w:'cheese',d:'ch'},{w:'think',d:'th'},
];

let currentDg = null, sortIdx = 0, sortScore = 0, sortTotal = 0;
let sortShuffled = [...SORT_WORDS].sort(() => Math.random()-0.5);
let practiced = JSON.parse(localStorage.getItem('ph_digraph_done') || '{}');

function buildGrid() {
  const grid = document.getElementById('digraph-grid');
  grid.innerHTML = Object.keys(DIGRAPHS).map(dg => `
    <div class="digraph-card${practiced[dg]?' done':''}" id="card-${dg}" onclick="selectDg('${dg}')">
      <span class="dg-practiced">✅</span>
      <span class="dg-letters">${dg}</span>
      <span class="dg-sound">${DIGRAPHS[dg].sound}</span>
      <span class="dg-emoji">${DIGRAPHS[dg].words[0].e}</span>
      <span class="dg-example">${DIGRAPHS[dg].words[0].w}</span>
    </div>`).join('');
}

function selectDg(dg) {
  currentDg = dg;
  document.querySelectorAll('.digraph-card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-'+dg).classList.add('active');
  const data = DIGRAPHS[dg];
  document.getElementById('dp-title').textContent = `"${dg}" — ${data.sound}`;
  document.getElementById('example-words').innerHTML = data.words.map(wd => {
    const highlighted = wd.w.startsWith(dg)
      ? `<span class="ew-highlight">${dg}</span>${wd.w.slice(dg.length)}`
      : wd.w.slice(0,-dg.length) + `<span class="ew-highlight">${dg}</span>`;
    return `<div class="ew-card" onclick="speak('${wd.w}',0.72)">
      <span class="ew-emoji">${wd.e}</span>
      <span class="ew-word">${highlighted}</span>
    </div>`;
  }).join('');
  document.getElementById('detail-panel').classList.add('visible');
  playDigraphSound();
  practiced[dg] = true;
  localStorage.setItem('ph_digraph_done', JSON.stringify(practiced));
  document.getElementById('card-'+dg).classList.add('done');
  if (Object.keys(practiced).length >= 6) { markComplete('digraphs'); awardStars('digraphs', 3); }
}

function playDigraphSound() {
  if (!currentDg) return;
  speak(DIGRAPHS[currentDg].sound + '... ' + DIGRAPHS[currentDg].words.map(w=>w.w).join(', '), 0.76);
}

function buildSortBuckets() {
  const buckets = document.getElementById('sort-buckets');
  buckets.innerHTML = Object.keys(DIGRAPHS).map(dg => `
    <div class="sort-bucket" onclick="checkSort('${dg}')">${dg}</div>`).join('');
}

function playSortWord() {
  const item = sortShuffled[sortIdx % sortShuffled.length];
  document.getElementById('sort-word').textContent = item.w;
  document.querySelectorAll('.sort-bucket').forEach(b => b.classList.remove('correct','wrong'));
  document.getElementById('sort-feedback').textContent = '';
  speak(item.w, 0.72);
}

function checkSort(chosen) {
  const item = sortShuffled[sortIdx % sortShuffled.length];
  sortTotal++;
  const buckets = document.querySelectorAll('.sort-bucket');
  if (chosen === item.d) {
    sortScore++;
    buckets.forEach(b => { if (b.textContent.trim()===chosen) b.classList.add('correct'); });
    document.getElementById('sort-feedback').textContent = '✅ Correct! "' + item.w + '" starts with ' + item.d + '!';
    speak('Correct! ' + item.w + ' starts with ' + item.d + '!');
    awardStars('digraph-sort', 1);
  } else {
    buckets.forEach(b => { if (b.textContent.trim()===chosen) b.classList.add('wrong'); });
    buckets.forEach(b => { if (b.textContent.trim()===item.d)  b.classList.add('correct'); });
    document.getElementById('sort-feedback').textContent = 'Try again! "' + item.w + '" starts with ' + item.d + '!';
    speak('Try again! ' + item.w + ' starts with ' + item.d);
  }
  sortIdx++;
  document.getElementById('sort-score').textContent = 'Score: ' + sortScore + '/' + sortTotal;
  setTimeout(playSortWord, 2000);
}

document.addEventListener('DOMContentLoaded', () => {
  buildGrid();
  buildSortBuckets();
  injectMascot(["Tap a digraph card to learn it! 🦉","Two letters make one sound!","Try the sorting game below! 🎯"]);
  speak("Digraphs! Two letters together make one special sound!", 0.85);
  setTimeout(playSortWord, 1200);
});
</script>
</body>
</html>
